и тундры. Шириной до 300 км.'],['вечная мерзлота','Вечная мерзлота — слои грунта, не оттаивающие годами, с температурой ниже 0°C. Занимает 25% суши (Сибирь, север Канады, Аляска). При таянии выделяет метан (парниковый газ) и тонет здания.'],['климат','Климат — многолетний режим погоды на данной территории. Классификация Кёппена: 5 основных типов (экваториальный, сухой, умеренный, континентальный, полярный). Формируется под влиянием широты, океанических течений, рельефа, высоты над уровнем моря.'],['тропики','Тропики — жаркий пояс Земли между тропиком Рака (23,5° с.ш.) и тропиком Козерога (23,5° ю.ш.). Солнце в зените дважды в год. Тропические леса (сельва), саванны и пустыни.'],['субтропики','Субтропики — переходный пояс между тропиками и умеренным. Мягкая зима, жаркое лето. Средиземноморский тип (влажная зима, сухое лето) — климат Крыма, Италии, Калифорнии.'],['умеренный пояс','Умеренный пояс — самый большой пояс Земли (40-60° с.ш. и ю.ш.). Четыре сезона. Умеренно-континентальный, континентальный, муссонный (Дальний Восток). Основная часть Европы, России, США.'],['полярный круг','Полярный круг — 66,5° с.ш. (Северный) и 66,5° ю.ш. (Южный). За ним — полярный день и полярная ночь (от 1 суток до полугода на полюсе). Зоны тундры и арктических пустынь.'],['антициклон','Антициклон — область повышенного атмосферного давления с вращением воздуха по часовой стрелке в Северном полушарии (против — в Южном). Связан с ясной безветренной погодой: летом жарко, зимой морозно. Синоптики: на картах обозначается буквой В (высокое давление).'],['атмосферный фронт','Атмосферный фронт — граница между тёплой и холодной воздушными массами. Тёплый фронт (тёплый воздух наступает на холодный) — затяжные моросящие дожди. Холодный фронт — ливни, грозы, шквалы. Связан с циклонами.'],['осадки','Атмосферные осадки — вода, выпадающая из облаков в жидком (дождь, морось) или твёрдом (снег, крупа, град) виде, а также конденсирующаяся на поверхности (роса, иней, изморозь). Измеряются в мм слоя воды.'],['изотерма','Изотерма — линия на карте, соединяющая точки с одинаковой температурой воздуха. Используется в климатологии. Июльские и январские изотермы показывают распределение тепла на Земле.'],['изобара','Изобара — линия на карте, соединяющая точки с одинаковым атмосферным давлением. Используется на синоптических картах. Густота изобар указывает на силу ветра (чем гуще, тем ветер сильнее).'],['засуха','Засуха — продолжительный период (недели, месяцы) с отсутствием или крайне малым количеством осадков, приводящий к иссушению почвы, гибели растений (урожая). Особенно опасна в степной и лесостепной зонах.'],['суверенитет','Суверенитет — верховенство и независимость государственной власти внутри страны и на международной арене. Внутренний суверенитет — монополия на издание законов и применение силы. Внешний — независимость от других государств.'],['государство','Государство — политическая организация общества с суверенной властью, территорией, населением, правовой системой, армией, налогами. Признаки: публичная власть, территория, суверенитет, законодательство, налоги, армия.'],['гражданин','Гражданин — лицо, имеющее гражданство данного государства и обладающее правами и обязанностями, закреплёнными в конституции. В широком смысле — член общества, сознающий свою ответственность перед ним.'],['гражданство','Гражданство — устойчивая правовая связь человека с государством, выражающаяся в совокупности взаимных прав и обязанностей. Приобретается по рождению (право крови или почвы) или натурализацией.'],['конституция','Конституция — основной закон государства, имеющий высшую юридическую силу. Определяет устройство государства, права и свободы граждан, принципы организации власти. В России принята 12 декабря 1993 года всенародным голосованием.'],['референдум','Референдум — форма непосредственного волеизъявления граждан по наиболее важным вопросам государственного значения. Результат референдума обязателен к исполнению и не требует утверждения органами власти.'],['импичмент','Импичмент — процедура отстранения от должности высших должностных лиц (президента, судей) за совершённые ими правонарушения. В США процедура начинается в Палате представителей, затем Сенат судит.'],['вето','Вето — право одной ветви власти (обычно главы государства) отклонить закон, принятый парламентом. Абсолютное вето (не может быть преодолено) и отлагательное вето (преодолевается квалифицированным большинством).'],['легислатура','Легислатура (законодательная власть) — ветвь власти, принимающая законы. Обычно представлена парламентом (двухпалатным или однопалатным). Примеры: Федеральное собрание (Россия), Конгресс (США).'],['исполнительная власть','Исполнительная власть — ветвь власти, реализующая законы и управляющая государством. Включает правительство (премьер-министр, министры), президента (в президентских республиках), губернаторов, мэров.'],['судебная власть','Судебная власть — ветвь власти, осуществляющая правосудие. Независима и подчиняется только закону. Включает суды (Конституционный суд, Верховный суд, областные суды, мировые судьи).'],['федерализм','Федерализм — принцип государственного устройства, при котором власть разделена между центром (федерацией) и субъектами (штатами, землями, республиками). Примеры: Россия, США, Германия, Индия.'],['унитарное государство','Унитарное государство — форма государственного устройства, при которой административно-территориальные единицы (области, департаменты) не имеют политической самостоятельности, действует единая конституция и законы. Примеры: Франция, Япония, Китай.'],['конфедерация','Конфедерация — временный союз суверенных государств для достижения общих целей (оборона, экономика). Участники сохраняют полную независимость. Примеры: США 1776-1789 (Статьи конфедерации), Швейцария (до 1848 года).'],['авторитаризм','Авторитаризм — политический режим с концентрацией власти в руках одного лидера или группы при ограниченном участии населения. Сохраняются частная собственность и рыночная экономика, но политические свободы ограничены.'],['тоталитаризм','Тоталитаризм — крайняя форма авторитаризма с полным контролем государства над всеми сферами жизни: экономикой, идеологией, культурой, личной жизнью. Примеры: нацистская Германия, СССР при Сталине, Северная Корея.'],['охлократия','Охлократия (власть толпы) — форма правления, при которой решения принимаются под давлением возбуждённой, эмоциональной толпы, часто ведущей к насилию, погромам, уничтожению инакомыслящих.'],['олигархия','Олигархия — форма правления, при которой власть принадлежит узкой группе богатых и влиятельных лиц (олигархам). В современном мире — концентрация экономической власти и её влияние на политику.'],['плутократия','Плутократия (власть богатых) — разновидность олигархии, где власть прямо пропорциональна богатству. Решения принимаются в интересах богатейшего класса.'],['анархизм','Анархизм — политическая философия, отрицающая необходимость государства и иерархии. Призывает к добровольному сотрудничеству индивидов. Идеологи: Прудон, Бакунин, Кропоткин. Не путать с хаосом.'],['либерализм','Либерализм — идеология, ставящая во главу угла индивидуальную свободу, права человека, частную собственность, свободный рынок, ограничение государства. Классические либералы: Локк, Смит, Милль.'],['консерватизм','Консерватизм — идеология, отстаивающая традиционные ценности (семья, религия, порядок), постепенность реформ, сохранение культурного наследия. Против резких революций. Эдмунд Бёрк — основоположник.'],['социализм','Социализм — идеология, провозглашающая социальное равенство, общественную собственность на средства производства, регулируемую экономику, перераспределение богатства через налоги и социальные программы.'],['коммунизм','Коммунизм — теоретическая общественно-экономическая формация, следующая за социализмом: отсутствие классов, денег, государства, «от каждого по способностям, каждому по потребностям». Маркс, Энгельс, Ленин.'],['фашизм','Фашизм — ультраправая идеология и политический режим с культом вождя, насилием, подавлением инакомыслия, милитаризмом, этническим национализмом. Италия (Муссолини), Германия (нацизм), Испания (Франко).'],['национализм','Национализм — идеология, ставящая интересы нации выше интересов личности или человечества. В мягкой форме — патриотизм, стремление сохранить культуру. В агрессивной — ксенофобия, шовинизм, этнические чистки.'],['патриотизм','Патриотизм — любовь к Родине, преданность своему народу и культуре, готовность к самопожертвованию ради блага страны. Отличается от национализма отсутствием агрессии к другим народам.'],['космополитизм','Космополитизм — мировоззрение, считающее человека гражданином мира (Homo sum, humani nihil a me alienum puto — «Я человек, и ничто человеческое мне не чуждо»). Противопоставлен национализму.'],['бюрократия','Бюрократия — система управления, основанная на иерархии, формальных правилах и процедурах, письменных отчётах. Макс Вебер считал её наиболее эффективной. В переносном смысле — медлительность, волокита, равнодушие чиновников.'],['коррупция','Коррупция — злоупотребление служебным положением для личной выгоды (взятки, откаты, непотизм). Формы: бытовая (мелкие взятки), верхушечная (крупные хищения), лоббизм (влияние на законы).'],['лоббизм','Лоббизм — давление заинтересованных групп (корпораций, профсоюзов, НКО) на законодательную и исполнительную власть для принятия выгодных решений. В США — легальный и регулируемый. В России — часто полукриминальный.'],['цензура','Цензура — контроль властей за содержанием информации, распространяемой через СМИ, интернет, книги, искусство. Цель — защита государственной тайны, морали, предотвращение призывов к насилию. Свобода слова — отсутствие предварительной цензуры.'],['права человека','Права человека — неотъемлемые права, принадлежащие каждому от рождения: право на жизнь, свободу, личную неприкосновенность, свободу совести, слова, собраний, справедливый суд. Всеобщая декларация прав человека (1948).'],['свобода слова','Свобода слова — право человека выражать своё мнение (устно, письменно, в интернете) без страха быть наказанным государством. Ограничения: клевета, призывы к насилию, разжигание ненависти, государственная тайна.'],['неприкосновенность','Неприкосновенность личности — принцип права: никто не может быть арестован, заключён под стражу или подвергнут обыску без законного основания (судебного решения). Также неприкосновенность жилища, тайна переписки, телефонных переговоров.'],['юстиция','Юстиция (правосудие) — система судебных органов, осуществляющих правосудие. Правосудие осуществляется от имени государства. Девиз: «Судить не по форме, а по справедливости». Министерство юстиции — координирует работу судов и прокуроров.'],['вердикт','Вердикт — решение присяжных заседателей в суде о виновности или невиновности подсудимого. Может быть: «виновен», «не виновен», «не доказано». На основе вердикта судья выносит приговор.'],['амнистия','Амнистия — полное или частичное освобождение от наказания неопределённого круга лиц (например, женщин с детьми, участников войны). Объявляется Государственной Думой. Не реабилитирует, но прекращает уголовное преследование.'],['помилование','Помилование — освобождение от наказания конкретного лица (или смягчение приговора). Осуществляется президентом. Реабилитирует (снимает судимость). Индивидуальный акт.'],['юрисдикция','Юрисдикция — пределы полномочий судебного органа (подсудность) или государства (территориальная юрисдикция). Экстерриториальность — действие законов государства за его пределами (посольства, консульства).'],['прецедент','Прецедент — решение суда по конкретному делу, которое становится обязательным для всех нижестоящих судов при рассмотрении аналогичных дел (судебный прецедент). Характерен для системы общего права (Англия, США).'],['легитимность','Легитимность — признание власти населением (психологическое принятие) и соответствие законам (юридическая легитимность). Отличается от легальности (соответствие формальным законам). Власть может быть легальной, но не легитимной.'],['экватор','Экватор — воображаемая линия, делящая Землю на Северное и Южное полушария (0° широты). Длина около 40 075 км. На экваторе день всегда равен ночи (12 часов), солнце в зените дважды в год.'],['пассат','Пассаты — постоянные ветры от тропиков к экватору (северо-восточные в Сев. полушарии, юго-восточные в Южном). Морские парусники использовали пассаты для трансатлантических переходов.'],['муссон','Муссон — сезонный ветер, меняющий направление. Летом — с океана на сушу (дожди, наводнения), зимой — с суши на океан (сухо). Определяет климат Южной и Юго-Восточной Азии (Индия, Китай, Вьетнам).'],['ратификация','Ратификация — утверждение международного договора высшим органом государства (парламентом, президентом). После ратификации договор становится обязательным для исполнения на территории данного государства.'],['денонсация','Денонсация — официальный отказ государства от международного договора в установленном порядке. Происходит уведомление другой стороны за определённый срок (обычно за 6-12 месяцев).'],['пакт','Пакт — международное соглашение (договор) между государствами, обычно по вопросам мира, ненападения, коллективной безопасности. Примеры: Пакт Молотова-Риббентропа (1939), Пакт Бриана-Келлога (1928).'],['конвенция','Конвенция — многосторонний международный договор, устанавливающий обязательные правила в определённой области. Примеры: Женевские конвенции (о защите жертв войны), Конвенция ООН по морскому праву.'],['делимитация','Делимитация — определение в договоре общего направления государственной границы (на карте, по географическим ориентирам) с описанием её прохождения. Предшествует демаркации.'],['демаркация','Демаркация — установление государственной границы на местности с помощью пограничных знаков (столбы, пирамиды, заграждения). Проводится после делимитации совместными комиссиями.'],['экстрадиция','Экстрадиция (выдача) — передача лица государством, на территории которого оно находится, другому государству для привлечения к уголовной ответственности или исполнения приговора. Основание — международный договор.'],['депортация','Депортация — принудительная высылка лица (иностранца или лица без гражданства) за пределы государства. Отличается от выдворения тем, что применяется в административном порядке, не обязательно за преступление.'],['ураган','Ураган — тропический циклон с ветрами более 33 м/с (119 км/ч). По шкале Саффира-Симпсона — от 1 до 5 категорий. Самый разрушительный — ураган Катрина (2005). В Атлантике — ураганы, в Тихом океане — тайфуны, в Индийском — циклоны.'],['валовой внутренний продукт','ВВП — рыночная стоимость всех конечных товаров и услуг, произведённых на территории страны за год. Измеряет экономическую активность. Бывает номинальный и реальный (с учётом инфляции).'],['валовой национальный доход','ВНД (ранее ВНП) — совокупная стоимость товаров и услуг, произведённых резидентами страны (гражданами и компаниями) как на её территории, так и за рубежом. ВНД = ВВП + сальдо первичных доходов из-за границы.'],['индекс потребительских цен','ИПЦ — показатель изменения цен на потребительские товары и услуги (продукты, одежда, жильё, транспорт, медицина). Основной индикатор инфляции. Рассчитывается как отношение стоимости фиксированной корзины.'],['дефлятор','Дефлятор ВВП — индекс цен, рассчитываемый как отношение номинального ВВП к реальному ВВП. Отражает изменение цен всех товаров и услуг, произведённых в стране (более широкий охват, чем ИПЦ).'],['стагфляция','Стагфляция — парадоксальное сочетание стагнации (спад производства, рост безработицы) и высокой инфляции. Наблюдалась в 1970-х годах после нефтяного кризиса.'],['рецессия','Рецессия — спад экономики, продолжающийся более двух кварталов (6 месяцев) подряд. Характеризуется снижением ВВП, инвестиций, потребительского спроса, ростом безработицы.'],['депрессия','Депрессия — затяжная и глубокая рецессия с длительным падением производства и массовой безработицей. Великая депрессия 1929-1939 (безработица до 25% в США).'],['протекционизм','Протекционизм — экономическая политика защиты внутреннего рынка от иностранной конкуренции путём высоких пошлин, квот, нетарифных барьеров. Цель — поддержка отечественных производителей.'],['фритредерство','Фритредерство (свободная торговля) — политика минимального вмешательства государства во внешнюю торговлю, низкие пошлины, отсутствие квот. Противоположность протекционизму.'],['сальдо','Сальдо — разность между доходами и расходами (бюджетное сальдо), между экспортом и импортом (торговый баланс). Положительное сальдо (профицит) — доходы больше расходов. Отрицательное (дефицит) — расходы больше доходов.'],['профицит','Профицит — превышение доходов бюджета над расходами. Встречается редко. Излишки направляются в резервные фонды или на погашение государственного долга.'],['ликвидность','Ликвидность — способность актива быть быстро проданным по рыночной цене без потери стоимости. Абсолютно ликвидны: наличные деньги, депозиты до востребования. Низколиквидно: недвижимость, уникальное оборудование.'],['рентабельность','Рентабельность — показатель эффективности бизнеса, отношение прибыли к затратам или выручке. Рентабельность продаж = (прибыль / выручка) × 100%. Рентабельность активов = (прибыль / активы) × 100%.'],['амортизация','Амортизация — постепенное перенесение стоимости основных средств (зданий, станков, транспортных средств) на себестоимость продукции по мере их износа. Амортизационные отчисления идут на ремонт и обновление.'],['себестоимость','Себестоимость — совокупные затраты на производство и реализацию единицы продукции (материалы, зарплата, энергия, амортизация). Себестоимость + прибыль = цена.'],['маржа','Маржа — разница между ценой и себестоимостью (торговая наценка). Также маржинальность — доля прибыли в выручке (в %). Банковская маржа — разница между процентными ставками по кредитам и депозитам.'],['диверсификация','Диверсификация — расширение ассортимента (продуктовая), географии деятельности (региональная), направлений инвестиций (инвестиционная) для снижения рисков. «Не класть все яйца в одну корзину».'],['монополия','Монополия — ситуация на рынке, когда один продавец контролирует предложение и цену товара. Естественная монополия (газопроводы, железные дороги) — конкуренция невозможна. Искусственная монополия — сговор производителей.'],['олигополия','Олигополия — рынок с небольшим числом крупных продавцов. Каждый из них влияет на цены. Примеры: рынок сотовой связи (МТС, Билайн, Мегафон), авиаперевозок, нефтяной рынок (ОПЕК).'],['картель','Картель — форма сговора олигополистов: соглашение о ценах, квотах производства, разделе рынков. Запрещён в большинстве стран антимонопольным законодательством. Пример: ОПЕК (страны-экспортёры нефти).'],['трест','Трест — форма монополистического объединения, где входящие предприятия теряют юридическую и хозяйственную самостоятельность. Управляются единым центром. Примеры: тресты в США конца XIX века (Standard Oil, Carnegie Steel).'],['концерн','Концерн — форма объединения предприятий разных отраслей под единым финансовым контролем. Сохраняют юридическую самостоятельность, но финансово зависимы. Пример: «Газпром», Siemens, General Electric.'],['холдинг','Холдинг — головная компания, владеющая контрольными пакетами акций дочерних обществ. Не занимается производством, только управляет. Пример: «Альфа-Групп», «Интеррос».'],['стартап','Стартап — молодая быстрорастущая компания (не старше 3-5 лет), разрабатывающая инновационный продукт или бизнес-модель. Ищет масштабируемую и воспроизводимую модель. Часто работает на венчурные инвестиции.'],['венчур','Венчурное финансирование — инвестиции в стартапы и инновационные проекты на ранних стадиях (High risk, high reward). Венчурные фонды покупают долю в компании и рассчитывают на выход (IPO или продажа).'],['акция','Акция — эмиссионная ценная бумага, дающая право на долю в уставном капитале акционерного общества. Даёт право на дивиденды и участие в управлении (голосование на собраниях). Бывают обыкновенные и привилегированные.'],['дивиденд','Дивиденд — часть прибыли акционерного общества, распределяемая между акционерами пропорционально количеству акций. Размер дивидендов утверждается общим собранием акционеров по рекомендации совета директоров.'],['капитализация','Рыночная капитализация — суммарная рыночная стоимость компании (цена акции × количество акций в обращении). Apple — первая компания, достигшая капитализации 3 трлн долларов (2022 год).'],['фондовая биржа','Фондовая биржа — организованный рынок для торговли ценными бумагами (акциями, облигациями, деривативами). Крупнейшие: NYSE (Нью-Йорк), NASDAQ, Лондонская, Токийская, Московская (MOEX).'],['брокер','Брокер — посредник между инвестором и фондовой биржей. Имеет лицензию. Исполняет поручения клиентов на покупку/продажу ценных бумаг за комиссию. Отличается от дилера (торгует за свой счёт).'],['трейдер','Трейдер — участник финансовых рынков, совершающий краткосрочные операции (от секунд до месяцев) для получения прибыли на колебаниях цен. Спекулянт. Отличается от инвестора (долгосрочные вложения).'],['дериватив','Дериватив (производный финансовый инструмент) — ценная бумага или контракт, цена которого зависит от базового актива (акции, валюты, нефти, золота, индекса). Примеры: фьючерсы, опционы, свопы.'],['опцион','Опцион — контракт, дающий право (но не обязанность) купить (call) или продать (put) базовый актив в будущем по оговорённой цене (страйк). Покупатель платит премию продавцу.'],['фьючерс','Фьючерс — стандартизированный биржевой контракт на покупку/продажу актива в будущем по цене, зафиксированной сегодня. Обязательство для обеих сторон. Хеджирование (страхование) рисков и спекуляции.'],['форвард','Форвард — внебиржевой контракт на поставку актива в будущем. Отличается от фьючерса: нестандартный, не торгуется на бирже, контрагенты несут риск неисполнения.'],['своп','Своп — производный контракт, в котором стороны обмениваются денежными потоками (процентными ставками, валютами, товарами). Процентный своп — фиксированная ставка на плавающую.'],['спот','Спот (спотовая сделка) — сделка с немедленной поставкой актива (обычно в течение 2 рабочих дней). Противоположность фьючерсу и форварду. Цена спот — текущая рыночная цена.'],['котировка','Котировка — цена ценной бумаги, товара или валюты, объявляемая на бирже или брокером. Двусторонняя котировка: bid (цена покупки) и ask (цена продажи). Разница (спред) — доход маркет-мейкера.'],['эмиссия','Эмиссия денег — выпуск в обращение наличных и безналичных денег. Центробанк обладает монополией на эмиссию. Чрезмерная эмиссия ведёт к инфляции. Эмиссия ценных бумаг — выпуск акций или облигаций.'],['денежная масса','Денежная масса — совокупный объём денег в обращении в экономике. Агрегаты: M0 (наличные), M1 (M0 + депозиты до востребования), M2 (M1 + срочные депозиты), M3 (M2 + крупные депозиты).'],['ключевая ставка','Ключевая ставка Центробанка — процентная ставка, под которую ЦБ выдаёт кредиты коммерческим банкам. Инструмент денежно-кредитной политики. Повышение ставки → борьба с инфляцией (кредиты дороже). Снижение стимулирует экономику.'],['кредитование','Кредитование — предоставление денег в долг под процент. Формы: банковский кредит (потребительский, ипотека, автокредит), коммерческий (между юрлицами), государственный, международный.'],['ипотека','Ипотека — долгосрочный (10-30 лет) кредит под залог недвижимости (квартиры, дома, земли). Заёмщик платит первоначальный взнос (10-20%) и проценты. При невыплате банк забирает залог.'],['лизинг','Лизинг — форма кредитования приобретения основных средств (оборудование, автомобили, самолёты). Лизингодатель покупает актив и сдаёт в аренду лизингополучателю с правом выкупа. После выплат актив переходит в собственность.'],['овердрафт','Овердрафт — форма краткосрочного кредитования (обычно до 30 дней), при котором банк разрешает расходовать средства сверх остатка на счёте. Лимит овердрафта устанавливается индивидуально. Погашается автоматически при поступлении денег.'],['дефолт','Дефолт — неспособность заёмщика (государства, компании, частного лица) выполнить обязательства по выплате долга и процентов. Технический дефолт — нарушение сроков (краткосрочный). Суверенный дефолт — отказ страны платить по долгам (Россия в 1998 году).'],['санация','Санация — комплекс мер по финансовому оздоровлению предприятия для предотвращения банкротства. Включает реструктуризацию долгов, продажу части активов, рефинансирование, смену менеджмента.'],['банкротство','Банкротство (несостоятельность) — признанная судом неспособность должника удовлетворить требования кредиторов в полном объёме. Процедуры: наблюдение, финансовое оздоровление, внешнее управление, конкурсное производство, мировое соглашение.'],['аудит','Аудит — независимая проверка бухгалтерской (финансовой) отчётности организации на предмет достоверности и соответствия законодательству. Обязательный аудит — для акционерных обществ, банков, страховых компаний. Инициативный — по желанию руководства.'],['бихевиоризм','Бихевиоризм — направление в психологии (Уотсон, Скиннер), изучающее только наблюдаемое поведение (стимул → реакция). Игнорирует сознание, внутренние психические процессы. «Человек — это то, что он делает».'],['гештальт','Гештальт (нем. Gestalt — форма, образ) — целостная структура, не сводимая к сумме частей. Гештальтпсихология (Вертгеймер, Кёлер, Коффка) изучает законы восприятия: фигура и фон, закон близости, закон замыкания, закон хорошей формы.'],['ассоциация','Ассоциация — связь между психическими явлениями (ощущениями, представлениями, мыслями, эмоциями), при которой появление одного из них влечёт за собой другое. Ассоциативная психология (ассоцианизм) — все психические процессы объясняются ассоциациями.'],['восприятие','Восприятие (перцепция) — психический процесс формирования целостного образа предмета или явления при его непосредственном воздействии на органы чувств. Свойства: предметность, целостность, константность, осмысленность.'],['внимание','Внимание — избирательная направленность сознания на определённый объект или деятельность. Свойства: объём (5±2 объекта), устойчивость, распределение, переключение. Виды: непроизвольное (рефлекторное), произвольное (волевое), послепроизвольное (интерес).'],['память','Память — способность мозга запоминать, сохранять и воспроизводить информацию. Виды: сенсорная (иконическая, эхоическая), кратковременная (15-30 с), долговременная (неограниченно). Процессы: кодирование, хранение, извлечение, забывание.'],['мышление','Мышление — высший психический процесс обобщённого и опосредованного отражения действительности. Формы: понятие, суждение, умозаключение. Виды: наглядно-действенное, наглядно-образное, абстрактно-логическое, словесное.'],['интеллект','Интеллект — общая способность к познанию, решению проблем, обучению, адаптации к новым ситуациям. IQ (коэффициент интеллекта) — тесты (среднее 100, выше 130 — одарённость). Теория множественного интеллекта Гарднера.'],['эмпатия','Эмпатия — способность понимать эмоциональное состояние другого человека, сопереживать ему. Включает когнитивную эмпатию (понимание) и аффективную (сочувствие). Отличается от симпатии (склонность к помощи) и эмоционального заражения.'],['существительное','Имя существительное — часть речи, обозначающая предмет и отвечающая на вопросы кто? что? Имеет род, число, падеж. Бывает одушевлённым (кто?) и неодушевлённым (что?), собственным и нарицательным.'],['прилагательное','Имя прилагательное — часть речи, обозначающая признак предмета и отвечающая на вопросы какой? чей? Изменяется по родам, числам и падежам. Разряды: качественные (красный, умный), относительные (деревянный, вчерашний), притяжательные (лисий, мамин).'],['глагол','Глагол — часть речи, обозначающая действие или состояние и отвечающая на вопросы что делать? что сделать? Имеет вид (совершенный/несовершенный), время, наклонение, число, лицо (в наст./буд. вр.), род (в прош. вр.).'],['наречие','Наречие — неизменяемая часть речи, обозначающая признак действия (быстро), признак другого признака (очень быстро) или признак предмета (яйцо всмятку). Отвечает на вопросы где? когда? куда? откуда? почему? зачем? как?'],['местоимение','Местоимение — часть речи, указывающая на предмет, признак или количество, но не называющая их. Разряды: личные (я, ты, он), возвратное (себя), притяжательные (мой, твой), указательные (этот, тот), вопросительные (кто? что?), отрицательные (никто, ничто), неопределённые (кто-то, что-то).'],['числительное','Имя числительное — часть речи, обозначающая количество предметов или порядок при счёте. Количественные (сколько? пять, двести) и порядковые (который? пятый, двухсотый). Склоняются по падежам.'],['причастие','Причастие — особая форма глагола, обозначающая признак предмета по действию и отвечающая на вопросы какой? какая? какие? Сочетает свойства глагола (вид, время) и прилагательного (род, число, падеж). Действительные (читающий) и страдательные (прочитанный).'],['деепричастие','Деепричастие — особая форма глагола, обозначающая добавочное действие и отвечающая на вопросы что делая? что сделав? Сочетает свойства глагола (вид, возвратность) и наречия (неизменяемость, примыкание). Всегда выделяется запятыми.'],['предлог','Предлог — служебная часть речи, выражающая зависимость существительного, местоимения или числительного от других слов в словосочетании и предложении. Производные (в течение, вследствие) и непроизводные (в, на, под, над, за, до, без, с).'],['союз','Союз — служебная часть речи, связывающая однородные члены предложения или части сложного предложения. Сочинительные (и, а, но, или, либо, да) и подчинительные (что, чтобы, потому что, если, хотя).'],['частица','Частица — служебная часть речи, вносящая различные оттенки значения в предложение или служащая для образования форм слова. Формообразующие (бы, пусть, давай), отрицательные (не, ни), модальные (же, ведь, даже, неужели, только).'],['междометие','Междометие — неизменяемая часть речи, выражающая чувства, побуждения, но не называющая их (ах, ох, увы, ой, браво). Не является членом предложения. Производные (ужас!) и непроизводные (ой!).'],['звукоподражание','Звукоподражание — слова, имитирующие звуки природы или животных (мяу, гав-гав, ку-ку, тик-так, чик-чирик, бах, буль-буль). Не являются междометиями, так как не выражают чувств.'],['подлежащее','Подлежащее — главный член предложения, обозначающий предмет речи (то, о ком или о чём говорится). Отвечает на вопросы кто? что? Чаще всего выражено существительным или местоимением в именительном падеже.'],['сказуемое','Сказуемое — главный член предложения, обозначающий действие или состояние подлежащего. Отвечает на вопросы что делает? каков? кто он такой? Простое глагольное (пишу), составное глагольное (хочу писать), составное именное (был студентом).'],['дополнение','Дополнение — второстепенный член предложения, обозначающий предмет, на который направлено действие или с которым связано действие. Отвечает на вопросы косвенных падежей (кого? чего? кому? чему? что? кем? чем? о ком? о чём?). Прямое (вин. п. без предлога) и косвенное.'],['определение','Определение — второстепенный член предложения, обозначающий признак предмета и отвечающий на вопросы какой? чей? который? Согласованное (согласуется в роде, числе, падеже — синее небо) и несогласованное (управление или примыкание — дом из кирпича).'],['обстоятельство','Обстоятельство — второстепенный член предложения, обозначающий место, время, причину, цель, образ действия, меру и степень. Отвечает на вопросы где? когда? куда? откуда? почему? зачем? как? сколько? Выражается наречием, деепричастием, существительным с предлогом.'],['приложение','Приложение — разновидность определения, выраженная существительным, которое даёт другое название предмету (город-герой, река Волга, газета «Правда», поэт Пушкин). Согласуется в падеже с определяемым словом.'],['именительный падеж','Именительный падеж — начальная форма имени существительного, прилагательного, числительного. Отвечает на вопросы кто? что?. В предложении обычно является подлежащим или именной частью сказуемого.'],['родительный падеж','Родительный падеж — отвечает на вопросы кого? чего?. Значения: принадлежности (дом отца), отсутствия (нет воды), меры (стакан молока), даты (первого мая). С предлогами без, у, от, до, из, с, около, возле, после.'],['дательный падеж','Дательный падеж — отвечает на вопросы кому? чему?. Значения: адресат действия (подарить другу), субъект состояния (ребёнку холодно). С предлогами к, по, благодаря, вопреки, согласно, наперекор.'],['винительный падеж','Винительный падеж — отвечает на вопросы кого? что?. Значения: объект действия (вижу дом), направление (еду в Москву), время (работать неделю). С предлогами в, на, за, под, через, про, сквозь.'],['творительный падеж','Творительный падеж — отвечает на вопросы кем? чем?. Значения: орудие действия (пишу ручкой), образ действия (лететь клином), время (зимним вечером). С предлогами с, за, над, под, перед, между.'],['предложный падеж','Предложный падеж — отвечает на вопросах о ком? о чём? (всегда с предлогом). Значения: место (в лесу), время (в прошлом году), мысль (думать о маме). Предлоги: в, во, на, о, об, обо, при.'],['склонение','Склонение — изменение имён (существительных, прилагательных, числительных, местоимений) по падежам и числам. Типы склонения существительных: 1-е (ж.р. и м.р. на -а/-я), 2-е (м.р. с нулевым окончанием и ср.р. на -о/-е), 3-е (ж.р. с нулевым окончанием на мягкий знак).'],['спряжение','Спряжение — изменение глаголов по лицам и числам в настоящем и будущем времени. I спряжение: -ешь, -ет, -ем, -ете, -ут (-ют) (пить, решать). II спряжение: -ишь, -ит, -им, -ите, -ат (-ят) (дышать, смотреть). Разноспрягаемые: хотеть, бежать, есть, дать.'],['инфинитив','Инфинитив (неопределённая форма глагола) — начальная форма глагола, отвечающая на вопросы что делать? что сделать? Не имеет лица, числа, времени, наклонения, рода, залога. Оканчивается на -ть, -ти, -чь (писать, везти, беречь).'],['вид глагола','Вид глагола — категория, выражающая отношение действия к внутреннему пределу. Несовершенный вид (что делать? что делал? что будет делать?) — действие длительное, повторяющееся. Совершенный вид (что сделать? что сделал? что сделает?) — действие завершённое, однократное.'],['время глагола','Время глагола — категория, выражающая отношение действия к моменту речи. Настоящее время (что делает? — только несов. вид). Прошедшее время (что делал? что сделал? — по суффиксу -л-). Будущее: простое (что сделает? — сов. вид) и сложное (что будет делать? — несов. вид).'],['наклонение','Наклонение глагола — категория, выражающая отношение действия к реальности. Изъявительное (реальное действие — читаю, читал, буду читать). Повелительное (побуждение — читай, пусть читает). Условное (желаемое или возможное действие при условии — читал бы).'],['залог','Залог глагола — категория, выражающая отношение действия к субъекту и объекту. Действительный залог (субъект сам совершает действие — рабочие строят дом). Страдательный залог (объект испытывает действие на себе — дом строится рабочими).'],['лицо','Лицо глагола — категория, указывающая на отношение действия к говорящему. 1-е лицо (я — мы, говорю, говорим). 2-е лицо (ты — вы, говоришь, говорите). 3-е лицо (он, она, оно — они, говорит, говорят). Изменяется в наст. и буд. вр., в повел. накл.'],['число','Число — грамматическая категория, указывающая на количество предметов или лиц. Единственное число (один предмет — дом, пишу, красный). Множественное число (несколько предметов — дома, пишем, красные).'],['род','Род — грамматическая категория (в ед. ч.) у существительных (мужской, женский, средний), прилагательных, глаголов в прош. вр., причастий, местоимений. Определяется по окончанию или смыслу.'],['одушевлённость','Одушевлённость/неодушевлённость — грамматическая категория существительных. Одушевлённые отвечают на вопрос кто? (люди, животные, мифические существа, названия шахматных фигур). Неодушевлённые — на вопрос что? У одушевлённых вин. п. = род. п., у неодушевлённых вин. п. = им. п.'],['падежное окончание','Падежное окончание — окончание существительного, прилагательного, числительного, местоимения, которое изменяется при склонении. Указывает на падеж, число, род. В русском языке 6 падежей, окончания зависят от склонения и типа основы.'],['основа','Основа слова — часть слова без окончания (и формообразующих суффиксов -л- прошедшего времени глагола, -ть инфинитива, -и повелительного наклонения). Носитель лексического значения. Может состоять из корня, приставок, суффиксов.'],['корень','Корень — главная морфема (минимальная значимая часть слова), общая для родственных слов, несущая основное лексическое значение. В русском языке есть корни-омонимы (водить — вода). Однокоренные слова: гора, горный, пригорок, гористый.'],['приставка','Приставка (префикс) — значимая часть слова, стоящая перед корнем. Служит для образования новых слов (делать → сделать, переделать, заделать, выделать). Может вносить пространственное (выехать), временное (зацвести) значение.'],['суффикс','Суффикс — значимая часть слова, стоящая после корня перед окончанием. Служит для образования новых слов и форм слов. Суффиксы: -чик (носильщик), -тель (учитель), -ость (радость), -а-, -и-, -е- (глагольные суффиксы).'],['постфикс','Постфикс — значимая часть слова, стоящая после окончания. В русском языке это -ся (-сь) у возвратных глаголов (умывается), -то, -либо, -нибудь у неопределённых местоимений (кто-то), -те у глаголов повелительного наклонения (пишите).'],['офшор','Офшор — юрисдикция (страна или территория), предоставляющая льготный налоговый режим для нерезидентов (обычно нулевой налог на прибыль, отсутствие отчётности). Используется для оптимизации налогообложения, сокрытия бенефициаров. Примеры: Кипр, Британские Виргинские острова, Панама.'],['онтология','Онтология — раздел философии, изучающий бытие, его фундаментальные принципы, формы и категории (сущность, существование, пространство, время, материя, дух). Аристотель называл её «первой философией».'],['гносеология','Гносеология (эпистемология) — раздел философии о познании: источники, формы, методы, границы познания, соотношение знания и веры, истины и заблуждения. Ключевые вопросы: «Что я могу знать?» (Кант).'],['флексия','Флексия (окончание) — изменяемая значимая часть слова, образующая форму слова и указывающая на грамматические значения (род, число, падеж, лицо). Служит для связи слов в словосочетании и предложении. В русском языке флексии могут быть нулевыми (дом, стул).'],['чередование','Чередование звуков — закономерная замена одного звука другим в одной и той же морфеме при изменении формы слова или образовании новых слов. Примеры: вод/водяной (о/а), друг/дружок (г/ж), носить/ноша (с/ш).'],['согласование','Согласование — вид подчинительной связи, при котором зависимое слово принимает те же грамматические формы (род, число, падеж), что и главное (красивый дом, красивого дома, красивые дома).'],['управление','Управление — вид подчинительной связи, при котором главное слово требует от зависимого определённого падежа с предлогом или без (читать книгу, гордиться сыном, пришёл к другу).'],['примыкание','Примыкание — вид подчинительной связи, при котором зависимое слово (неизменяемое: наречие, деепричастие, инфинитив) связано с главным только по смыслу и интонационно (быстро бежать, идёт улыбаясь, хочу есть).'],['словосочетание','Словосочетание — два или более знаменательных слова, связанных по смыслу и грамматически (подчинительной связью). Не являются словосочетаниями: грамматическая основа, однородные члены, фразеологизмы.'],['простое предложение','Простое предложение — предложение с одной грамматической основой (подлежащим и сказуемым или одним главным членом). Бывает двусоставным (Есть подлежащее и сказуемое) и односоставным (определённо-личным, неопределённо-личным, безличным, назывным).'],['сложное предложение','Сложное предложение — предложение, состоящее из двух или более простых предложений (предикативных частей), объединённых по смыслу, интонационно и с помощью союзов или союзных слов. Бывает сложносочинённым (ССП), сложноподчинённым (СПП) и бессоюзным (БСП).'],['фонема','Фонема — минимальная смыслоразличительная единица звукового строя языка. Фонемы различают слова (дом — том, быт — быть, кот — код). В русском языке 5 гласных фонем (а, о, у, э, и) и 34 согласных.'],['аллофон','Аллофон (вариант фонемы) — конкретное звучание фонемы в определённой позиции. Например, фонема [г] в слове «год» произносится как взрывной [г], в слове «ага» как щелевой [γ] (фрикативный). Носитель языка не замечает аллофонов.'],['транскрипция','Транскрипция — специальная система записи звучащей речи с помощью условных знаков (обычно в квадратных скобках). Фонетическая транскрипция передаёт точное звучание слова [й’эл’ка] (ёлка). Орфоэпическая — произношение. Фонологическая — состав фонем.'],['орфоэпия','Орфоэпия — раздел языкознания, изучающий нормы произношения (ударение, произношение отдельных звуков и их сочетаний). Орфоэпические нормы: [што] (что), [сонце] (солнце), [д’икан’т] (декант).'],['артикуляция','Артикуляция — работа речевого аппарата (губы, зубы, язык, нёбо, голосовые связки) при произнесении звуков речи. Три фазы: экскурсия (приступ к звуку), выдержка, рекурсия (переход к следующему звуку).'],['гласный','Гласные звуки — звуки речи, при произнесении которых воздух свободно проходит через ротовую полость, не встречая преград. Тон (голос) преобладает над шумом. В русском языке 6 гласных звуков: [а], [о], [у], [ы], [э], [и].'],['согласный','Согласные звуки — звуки речи, при произнесении которых воздух встречает преграду (смычку, щель, вибрацию). Шум преобладает над голосом (глухие) или голос и шум равны (звонкие). В русском языке 36 согласных звуков.'],['сонорный','Сонорные согласные (сонорты) — звуки, в которых голос преобладает над шумом, близки к гласным. В русском: [л], [л’], [м], [м’], [н], [н’], [р], [р’], [j] (й). Всегда звонкие, не имеют парных глухих.'],['шипящий','Шипящие согласные — аффрикаты и фрикативные, производимые с поднятым к нёбу языком. В русском: [ш], [ж], [ч’], [щ’]. Создают акустический эффект шипения.'],['свистящий','Свистящие согласные — переднеязычные зубные щелевые и аффрикаты. В русском: [с], [з], [ц], [с’], [з’]. Создают эффект свиста.'],['звонкий','Звонкие согласные — звуки, при произнесении которых голосовые связки вибрируют, голос преобладает над шумом или равен ему. В русском: [б], [б’], [в], [в’], [г], [г’], [д], [д’], [ж], [з], [з’], [л], [л’], [м], [м’], [н], [н’], [р], [р’], [j]. Парные и непарные.'],['глухой','Глухие согласные — звуки, при произнесении которых голосовые связки не вибрируют, шум преобладает. В русском: [п], [п’], [ф], [ф’], [к], [к’], [т], [т’], [ш], [с], [с’], [х], [х’], [ц], [ч’], [щ’]. Парные и непарные.'],['твёрдый','Твёрдые согласные — согласные, произносимые с поднятием средней части спинки языка к нёбу (веляризация или отсутствие палатализации). В русском: большинство согласных имеют твёрдую пару: [б], [в], [г], [д], [з], [к], [л], [м], [н], [п], [р], [с], [т], [ф], [х], [ш], [ж], [ц].'],['мягкий','Мягкие (палатализованные) согласные — согласные, при произнесении которых средняя часть спинки языка поднимается к твёрдому нёбу. В русском: [б’], [в’], [г’], [д’], [з’], [к’], [л’], [м’], [н’], [п’], [р’], [с’], [т’], [ф’], [х’], [ч’], [щ’].'],['ударный','Ударный гласный — гласный звук в слоге, на который падает словесное ударение. Произносится с большей силой, длительностью и отчётливостью. В русском языке ударение разноместное и подвижное.'],['безударный','Безударный гласный — гласный звук в слоге, не несущем ударения. Подвергается редукции (количественной и качественной). Пример: в слове «молоко» [мълако] все гласные, кроме ударного [о], редуцированы.'],['слог','Слог — минимальная произносительная единица речи. Состоит из одного гласного звука (слогообразующего) и одного или нескольких согласных. В русском языке слог обычно строится по принципу восходящей звучности.'],['открытый слог','Открытый слог — слог, оканчивающийся на гласный звук. Примеры: мо-ло-ко, ма-ма, а-том. В русском языке большинство слогов открытые.'],['закрытый слог','Закрытый слог — слог, оканчивающийся на согласный звук. Примеры: дом, лес, кот, ар-буз, май-ка. В конце слова может быть закрытым.'],['редукция','Редукция — изменение звучания гласных и согласных в безударной позиции. Количественная редукция (уменьшение длительности) и качественная (изменение качества звука). Пример: вода [вада], гвозди [гвоз’д’и].'],['аккомодация','Аккомодация — приспособление артикуляции одного звука к артикуляции соседнего. Особенно заметна у гласных рядом с мягкими согласными (мягкая аккомодация). Пример: мат [мат] — мят [м’ат].'],['ассимиляция','Ассимиляция — уподобление одного звука другому в потоке речи (по звонкости/глухости, твёрдости/мягкости, месту образования). Пример: сдать [здат’], отбежать [адб’ижат’], лёгкий [л’охк’ий].'],['диссимиляция','Диссимиляция — расподобление звуков, замена двух одинаковых или похожих звуков разными. Редкое явление. Пример: мягкий [м’ахк’ий] из древнерусского [м’агк’ий], где [г] и [к] — одинаково заднеязычные, [г] перешёл в [х].'],['оглушение','Оглушение — процесс замены звонкого согласного парным глухим в абсолютном конце слова или перед глухим согласным. Пример: дуб [дуп], зуб [зуп], сказка [скаска], ложка [лошка]. Закон конца слова.'],['озвончение','Озвончение — процесс замены глухого согласного парным звонким перед звонким согласным. Пример: просьба [проз’ба], сгорел [згар’эл], вокзал [вагзал].'],['интонация','Интонация — совокупность просодических характеристик речи (мелодика, тон, темп, тембр, паузы, логическое ударение). Выполняет смыслоразличительную функцию: «Я пришёл» (утверждение) и «Я пришёл?» (вопрос).'],['ударение','Ударение — выделение одного из слогов в слове с помощью фонетических средств (силы голоса, длительности, повышения тона). В русском языке словесное ударение разноместное (может падать на любой слог) и подвижное (при изменении формы слова).'],['фразовое ударение','Фразовое ударение — выделение одного из слов во фразе путём усиления словесного ударения для придания фразе большей выразительности. Обычно падает на последнее знаменательное слово перед паузой.'],['логическое ударение','Логическое ударение — выделение наиболее важного по смыслу слова во фразе (не обязательно последнего). Меняет смысл высказывания. «Я люблю тебя» — люблю именно я. «Я люблю тебя» — люблю, а не ненавижу. «Я люблю тебя» — именно тебя.'],['синоним','Синонимы — слова одной части речи, различные по звучанию, но близкие или тождественные по значению. Примеры: смелый — храбрый — отважный, большой — огромный — громадный.'],['антоним','Антонимы — слова одной части речи, противоположные по значению. Примеры: свет — тьма, добро — зло, горячий — холодный, друг — враг, подниматься — опускаться.'],['омоним','Омонимы — слова, одинаковые по звучанию и написанию, но разные по значению. Примеры: ключ (родник) и ключ (инструмент), коса (волосы) и коса (орудие) и коса (географическая).'],['пароним','Паронимы — однокоренные слова, сходные по звучанию, но разные по значению. Примеры: абонент (владелец абонемента) — абонемент (право пользования); эффектный — эффективный; невежа (неуч) — невежда (грубый человек).'],['неологизм','Неологизм — новое слово или выражение, недавно появившееся в языке (обычно связано с новыми технологиями, понятиями). Примеры: интернет, смартфон, блогер, криптовалюта, селфи, хайп.'],['архаизм','Архаизм — устаревшее слово, вытесненное из активного употребления синонимом. Примеры: очи (глаза), ланиты (щёки), выя (шея), чело (лоб), десница (правая рука), пиит (поэт).'],['историзм','Историзм — устаревшее слово, вышедшее из употребления вместе с обозначаемым предметом или явлением. Примеры: кафтан, камзол, царь, боярин, опричник, колхоз, пионер.'],['заимствование','Заимствование — переход слов из одного языка в другой. Причины: культурные, экономические, политические связи. Примеры из русского: компьютер (англ.), сакура (яп.), пицца (ит.), бутерброд (нем.), айсберг (голл.).'],['калька','Калька — слово или выражение, созданное по образцу иноязычного слова или выражения путём поморфемного перевода. Примеры: небоскрёб (англ. skyscraper), водород (фр. hydrogène), впечатление (фр. impression).'],['варваризм','Варваризм — иноязычное слово или выражение, не полностью освоенное языком, воспринимаемое как чужеродное. Примеры: мерси, о’кей, амбассадор, окей, гуд бай. Часто пишется латиницей.'],['экзотизм','Экзотизм — иноязычное слово, обозначающее реалии чужой культуры, жизни. Примеры: сакура (яп.), самурай (яп.), сомбреро (исп.), вигвам (сев.-амер. индейцы), рикша (кит.).'],['идиома','Идиома (фразеологизм) — устойчивое словосочетание, значение которого не выводится из значений составляющих его слов. Примеры: бить баклуши, спустя рукава, попасть впросак, собаку съел.'],['диалектизм','Диалектизм — слово или выражение, употребляемое только жителями определённой местности (диалекта). Примеры: кочет (петух) — на юге России, гутарить (говорить) — на юге, векша (белка) — на севере.'],['жаргонизм','Жаргонизм — слово или выражение, характерное для речи социальной или профессиональной группы. Примеры: компьютерный жаргон (юзер, батон, винт), молодёжный жаргон (хайп, зашквар, краш, лол), уголовный жаргон (фраер, мент, ксива).'],['аксиология','Аксиология — раздел философии о природе ценностей (добро, красота, справедливость, святость). Изучает иерархию ценностей, их обоснование, конфликты ценностей. Связана с этикой и эстетикой.'],['этика','Этика — философская наука о морали и нравственности. Изучает категории добра и зла, долга, совести, чести, справедливости. Нормативная этика предписывает правила поведения (золотое правило нравственности).'],['сленг','Сленг — слова и выражения, употребляемые определёнными возрастными или профессиональными группами, часто с ироничной или грубоватой окраской. Примеры: крутой, тачка, лох, тусовка, оттянуться. Отличается от жаргона более неформальным, разговорным характером.'],['арго','Арго (тайный язык) — речь социально замкнутых групп (например, уголовный жаргон, язык офеней). Характеризуется искусственностью, условными словами, непонятными для посторонних. Пример: ксива (документ), мусор (милиционер), шмон (обыск).'],['табу','Табу — запрет на употребление некоторых слов в силу религиозных, социальных или культурных причин. Например, у славян табу на имя медведя (*веди-мед — «ведающий мёдом»). В современном языке — табуированная лексика (мат, ругательства).'],['эвфемизм','Эвфемизм — нейтральное слово или выражение, заменяющее грубое, неприличное или «страшное» слово. Примеры: скончался (умер), женщина лёгкого поведения (проститутка), уборная (туалет), на выходе (на работе).'],['фразеологизм','Фразеологизм (идиома) — устойчивое словосочетание, значение которого не выводится из значений составляющих его слов. Примеры: бить баклуши, попасть впросак, водить за нос, спустя рукава, когда рак на горе свистнет.'],['крылатое выражение','Крылатое выражение — устойчивое изречение, вошедшее в речь из литературных, исторических или мифологических источников. Примеры: «А Васька слушает да ест», «Слона-то я и не приметил», «А судьи кто?» (Крылов).'],['пословица','Пословица — краткое народное изречение, имеющее назидательный смысл и ритмическую организацию. Примеры: «Без труда не выловишь и рыбку из пруда», «Семь раз отмерь, один раз отрежь», «Делу время, потехе час».'],['поговорка','Поговорка — краткое устойчивое выражение, образное, но не имеющее поучительного смысла (в отличие от пословицы). Часто является частью пословицы. Примеры: «собаку съел», «бить баклуши», «кот наплакал», «медвежья услуга».'],['бить баклуши','Бить баклуши — бездельничать, праздно проводить время. Баклуша — чурка, из которой вытачивали ложки. Работа была лёгкой, её доверяли подросткам, а взрослые «били баклуши» считалось бездельем.'],['спустя рукава','Спустя рукава — работать небрежно, кое-как, лениво. В старину на Руси носили одежду с длинными рукавами, которые можно было опустить, и тогда работать было неудобно.'],['засучив рукава','Засучив рукава — работать усердно, с большим старанием. Противоположность «спустя рукава». Чтобы работа спорилась, длинные рукава засучивали.'],['кот наплакал','Кот наплакал — очень мало (о количестве). Этимология: коты плачут редко, и слёз у них мало. Идиома явно ироническая.'],['собаку съел','Собаку съел — имеет большой опыт в каком-либо деле, мастер. Существует версия происхождения от «собаку заел» (примета: съесть собаку — к болезни), но скорее всего, первоначально было «собаку съел (в чём-то)» — приобрёл необычную сноровку.'],['медвежья услуга','Медвежья услуга — помощь, приносящая в конечном итоге вред. Из басни Крылова «Пустынник и Медведь»: медведь, желая прихлопнуть муху на лбу друга, прихлопнул вместе с мухой и друга.'],['ахиллесова пята','Ахиллесова пята — уязвимое место (человека, плана, организации). Ахиллес был неуязвим, кроме пятки, за которую его держала мать (Фетида), окуная в воды Стикса. Парис попал стрелой именно в пятку.'],['яблоко раздора','Яблоко раздора — причина ссоры, спора. Богиня раздора Эрида не получила приглашения на свадьбу Пелея и Фетиды и подбросила яблоко с надписью «Прекраснейшей». Из-за спора между Герой, Афиной и Афродитой началась Троянская война.'],['троянский конь','Троянский конь — коварный план, подарок с целью погубить врага. Греки оставили под стенами Трои огромного деревянного коня (внутри спрятались воины). Троянцы ввезли коня в город — ночью греки вышли и открыли ворота.'],['авгиевы конюшни','Авгиевы конюшни — сильно загрязнённое место, а также запущенные дела. Царь Авгий владел огромными конюшнями, которые не чистились годами. Геракл очистил их за один день, направив через них воды реки.'],['дамоклов меч','Дамоклов меч — постоянно угрожающая опасность при внешнем благополучии. Сиракузский тиран Дионисий посадил льстеца Дамокла на свой трон, подвесив над ним меч на конском волосе, чтобы показать нелёгкость положения правителя.'],['гордиев узел','Гордиев узел — запутанное, сложное дело. Фригийский царь Гордий завязал сложный узел, и оракул предрёк, что тот, кто развяжет узел, станет владыкой Азии. Александр Македонский разрубил его мечом — «разрубить гордиев узел».'],['сизифов труд','Сизифов труд — бессмысленная и тяжёлая работа. Сизиф за обман богов был обречён вкатывать на гору тяжёлый камень, который каждый раз скатывался вниз, и всё начиналось заново.'],['танталовы муки','Танталовы муки — муки от близости желанного, но недоступного. Тантал стоял по горло в воде под ветвями плодового дерева, но когда хотел пить — вода отступала, а когда хотел есть — ветви поднимались.'],['прокрустово ложе','Прокрустово ложе — насильственное подгонка под один шаблон. Разбойник Прокруст укладывал путников на своё ложе: если был короток — вытягивал ноги, если длинен — отрубал лишнее.'],['между сциллой и харибдой','Между Сциллой и Харибдой — между двумя опасностями, из которых одна неизбежна. Сцилла и Харибда — два чудовища по обе стороны узкого пролива (Мессинский). Проплыть между ними, не попав ни к одному, почти невозможно.'],['вавилонское столпотворение','Вавилонское столпотворение — суматоха, шум, неразбериха, беспорядок. По Библии, люди задумали построить башню до небес (Вавилонскую). Бог смешал их языки, и они перестали понимать друг друга, рассеялись по земле.'],['манна небесная','Манна небесная — неожиданная удача, помощь, нечто желанное. По Библии, во время исхода евреев из Египта Бог посылал им с неба манну (съедобные крупинки) каждое утро.'],['козёл отпущения','Козёл отпущения — человек, которого делают ответственным за чужие грехи, наказывают «за того парня». По ветхозаветному обряду, в день отпущения грехов первосвященник возлагал руки на козла, перенося на него грехи народа, и изгонял его в пустыню.'],['альфа и омега','Альфа и Омега — начало и конец, основа, суть. Альфа — первая буква греческого алфавита, Омега — последняя. В Библии: «Я есмь Альфа и Омега, начало и конец».'],['грамматика','Грамматика — раздел языкознания, изучающий формальный строй языка (словоизменение, словообразование, синтаксис). В широком смысле — правила изменения слов и построения предложений.'],['синтаксис','Синтаксис — раздел грамматики, изучающий строение словосочетаний и предложений, а также правила соединения слов в этих единицах. Включает типы связей, члены предложения, типы предложений (простые, сложные).'],['пунктуация','Пунктуация — система знаков препинания и правила их употребления в письменной речи. Основные знаки: точка, запятая, точка с запятой, двоеточие, тире, многоточие, вопросительный и восклицательный знаки, скобки, кавычки.'],['орфография','Орфография (правописание) — система правил, определяющих единообразное написание слов (включая слитные, раздельные и дефисные написания, употребление прописных букв, правила переноса).'],['морфология','Морфология — раздел грамматики, изучающий части речи, их грамматические категории (род, число, падеж, время, лицо, наклонение) и формы словоизменения.'],['словообразование','Словообразование — раздел языкознания, изучающий способы образования новых слов (аффиксация, сложение, аббревиация, конверсия, субстантивация) и структуру производных слов.'],['лексикология','Лексикология — раздел языкознания, изучающий лексику (словарный состав) языка, его происхождение, функционирование, развитие, отношения между словами (синонимия, антонимия, омонимия, паронимия).'],['этимология','Этимология — раздел языкознания, изучающий происхождение слов и их морфемного состава (историческую структуру). Часто этимология не совпадает с современным словообразованием (корень, суффикс, приставка).'],['фразеология','Фразеология — раздел языкознания, изучающий устойчивые сочетания слов (фразеологизмы, идиомы, пословицы, поговорки, крылатые выражения), их происхождение, структуру и функционирование в речи.'],['ономастика','Ономастика — раздел языкознания, изучающий собственные имена (имена людей, географические названия, клички животных, астронимы). Делится на антропонимику (имена людей), топонимику (географические названия), космонимику (названия космических объектов).'],['топонимика','Топонимика — раздел ономастики, изучающий географические названия (топонимы): их происхождение, историю, значение, написание. Пример: Москва — от гидронима (река Москва), предположительно финно-угорское «мокша» (река).'],['эстетика','Эстетика — философское учение о прекрасном и безобразном, возвышенном и низменном, о сущности и формах творчества по законам красоты. Изучает эстетическое восприятие, искусство, вкус. Гегель — «философия искусства».'],['антропонимика','Антропонимика — раздел ономастики, изучающий происхождение, изменение, географическое распространение и социальное функционирование личных имён (антропонимов): имён, фамилий, отчеств, прозвищ, псевдонимов.'],['диалектология','Диалектология — раздел языкознания, изучающий территориальные варианты языка (диалекты, говоры) — их фонетику, грамматику, лексику. Составляет диалектные карты и словари.'],['стилистика','Стилистика — раздел языкознания, изучающий функциональные стили речи (научный, официально-деловой, публицистический, художественный, разговорный), их языковые средства и выразительные возможности.'],['риторика','Риторика — теория и искусство красноречия, способы убеждения, построения публичной речи. Античная риторика: изобретение (инвенция), расположение (диспозиция), выражение (элокуция), запоминание (меморио), произнесение (акцио).'],['поэтика','Поэтика — раздел теории литературы, изучающий структуру и систему выразительных средств литературных произведений (ритм, стиль, композицию, тропы, фигуры). Общая поэтика и историческая поэтика.'],['просодия','Просодия — раздел фонетики, изучающий сверхсегментные единицы речи: ударение, тон, интонацию, темп, ритм, паузы, тембр. Организует звучащую речь, придаёт ей мелодичность и смысловую выразительность.'],['семантика','Семантика — раздел языкознания, изучающий значение единиц языка (морфем, слов, словосочетаний, предложений). Лексическая семантика — значение слов. Грамматическая семантика — значение грамматических форм.'],['семиотика','Семиотика (семиология) — наука о знаках и знаковых системах (язык, дорожные знаки, жесты, ритуалы, искусство, мода, кино). Разделы: синтактика (отношения между знаками), семантика (отношение знака к значению), прагматика (отношение знака к пользователю).'],['прагматика','Прагматика — раздел семиотики и языкознания, изучающий отношения между знаками (словами) и их пользователями (говорящими и слушающими) — контекст, намерения, импликатуры, речевые акты.'],['фонология','Фонология — раздел языкознания, изучающий структуру и функционирование фонем (минимальных смыслоразличительных единиц) в языке. Отличается от фонетики: фонетика изучает звуки речи, а фонология — их функцию в системе языка.'],['морфонология','Морфонология (морфофонология) — раздел языкознания, изучающий фонологическое строение морфем и чередования звуков на стыках морфем. Пример: уха — уши (чередование х/ш), друг — дружить (г/ж).'],['орфоэпия','Орфоэпия — раздел языкознания, изучающий нормы литературного произношения: правила произнесения гласных и согласных звуков, ударения в словах и грамматических формах.'],['лексикография','Лексикография — раздел языкознания, занимающийся теорией и практикой составления словарей (толковых, орфографических, этимологических, синонимов, переводных, терминологических).'],['палеография','Палеография — историко-филологическая дисциплина, изучающая историю письма, памятники древней письменности (почерк, материал письма, орудия письма, чернила, украшения рукописей, водяные знаки).'],['текстология','Текстология — филологическая дисциплина, изучающая историю текста произведения (авторские рукописи, черновики, списки, издания) с целью установления канонического (критического) текста для публикации.'],['герменевтика','Герменевтика — искусство и теория истолкования текстов (библейских, античных, художественных, юридических). Изначально — толкование Библии. Современная философская герменевтика (Гадамер, Рикёр) — учение о понимании.'],['экзегетика','Экзегетика (экзегеза) — раздел богословия, занимающийся толкованием (комментированием) священных текстов (Библии, Корана). Отличается от герменевтики практической направленностью на конкретный текст.'],['дискурс','Дискурс — связный текст в совокупности с экстралингвистическими (прагматическими, социокультурными, психологическими) факторами. Виды дискурса: политический, научный, медицинский, религиозный, педагогический.'],['идиостиль','Идиостиль (индивидуальный стиль) — система языковых и стилистических особенностей, отличающих произведения данного автора (лексика, синтаксис, ритмика, образность, темы, мотивы).'],['эпос','Эпос — род литературы, повествующий о событиях и героях (объективное, «эпическое» повествование). Крупные формы: роман, эпопея, повесть. Малые формы: рассказ, новелла.'],['лирика','Лирика — род литературы, в котором главное — выражение чувств, переживаний, мыслей автора (субъективное). Жанры: стихотворение, элегия, ода, сонет, послание, романс.'],['драма','Драма — род литературы, предназначенный для постановки на сцене (пьеса). Сочетает эпос (диалоги, монологи) и лирику (песни, монологи). Жанры: трагедия, комедия, драма (средний жанр), водевиль, фарс, мистерия.'],['роман','Роман — большой повествовательный жанр эпоса, в котором развёрнуто изображается жизнь героев на протяжении длительного времени (сюжет включает множество событий). Философский, исторический, любовный, детективный, научно-фантастический.'],['повесть','Повесть — средний эпический жанр (между рассказом и романом). Охватывает несколько событий из жизни героя (одна сюжетная линия). Более подробно, чем рассказ, но менее, чем роман.'],['рассказ','Рассказ — малый эпический жанр, небольшое прозаическое произведение с ограниченным числом персонажей и одной (редко несколькими) сюжетной линией, часто неожиданной развязкой.'],['новелла','Новелла — малый прозаический жанр, близкий к рассказу, но с более острым, динамичным, неожиданным сюжетом (нередко парадоксальной концовкой). Более суха, фактологична (в отличие от рассказа с психологизмом).'],['эссе','Эссе — прозаическое произведение небольшого объёма, свободной композиции, выражающее индивидуальные впечатления и соображения по конкретному поводу и не претендующее на исчерпывающую трактовку.'],['поэма','Поэма — большое стихотворное произведение с повествовательным (эпическим) сюжетом и лирической окраской. Промежуточный жанр между эпосом и лирикой.'],['баллада','Баллада — лиро-эпическое стихотворное произведение с напряжённым, драматическим сюжетом (часто фантастическим, историческим или героическим). Традиционно о любви, предательстве, смерти.'],['сонет','Сонет — стихотворение из 14 строк с определённой рифмовкой (итальянский: две четверостишия (катрены) и два трёхстишия (терцеты); английский: три четверостишия и двустишие).'],['элегия','Элегия — лирический жанр, стихотворение, проникнутое грустью, печалью, размышлениями о жизни и смерти, неразделённой любви (в античности — на любой сюжет, написанное элегическим дистихом).'],['ода','Ода — торжественное, патетическое стихотворение, прославляющее какое-либо событие, героя, государство (Ломоносов, Державин, Пиндар). В классицизме — высокий жанр.'],['сатира','Сатира — способ проявления комического в искусстве, состоящий в уничтожающем осмеянии явлений, которые представляются автору порочными (пороки общества, человеческие недостатки, пороки власти).'],['трагедия','Трагедия — драматический жанр, основанный на остром, неразрешимом конфликте личности с обществом, судьбой, роком, приводящем к гибели героя. Высокий жанр (Аристотель — «очищение через страх и сострадание» — катарсис).'],['комедия','Комедия — драматический жанр, основанный на юморе и сатире, изображающий смешное, нелепое, несоответствие норме. Цель — смех и исправление нравов. Жанры: комедия положений, комедия характеров, комедия нравов.'],['водевиль','Водевиль — лёгкая комедия с куплетами (песнями) и танцами. Возник во Франции (от названия долины Вир в Нормандии — «voix de ville» — городской голос). В России XIX века был очень популярен.'],['монолог','Монолог — развёрнутое высказывание одного действующего лица в драме, эпосе или лирике. В драме монолог часто раскрывает внутренний мир героя, его мысли и чувства (если он один на сцене).'],['dialog','Диалог — форма речи, в которой происходит обмен высказываниями (репликами) между двумя или более лицами. Основная форма драмы. В эпосе — диалоги персонажей.'],['метафора','Метафора — троп, перенос названия с одного предмета на другой на основе сходства (скрытое сравнение). «Горит восток зарёю новой», «круги на воде», «золотая осень».'],['аллегория','Аллегория — иносказание, изображение отвлечённой идеи (добра, зла, справедливости, смерти) через конкретный образ. Баспи: волк — жадность, лиса — хитрость, орёл — власть.'],['гипербола','Гипербола — стилистическая фигура, преувеличение свойств предмета или явления для выразительности. «В сто сорок солнц закат пылал» (Маяковский), «раз увидел — навек запомнил».'],['гротеск','Гротеск — художественный приём, основанный на фантастическом, причудливом, гиперболическом искажении реальности (нередко с элементами абсурда, трагикомичности). Гоголь, Салтыков-Щедрин, Гофман, Булгаков.'],['ирония','Ирония — троп, основанный на употреблении слова или выражения в смысле, противоположном буквальному (скрытая насмешка). «Откуда, умная, бредёшь ты, голова?» (Крылов — ослу).'],['символизм','Символизм — литературно-художественное направление конца XIX — начала XX века (Малларме, Верлен, Рембо, Блок, Белый). Основной принцип — символ (многозначный образ, выражающий мистическую сущность мира).'],['акмеизм','Акмеизм — модернистское течение в русской поэзии 1910-х годов (Гумилёв, Ахматова, Мандельштам). Отказ от мистики символизма, возврат к «вещности», ясности, предметности, «здравому смыслу».'],['футуризм','Футуризм — авангардное направление в искусстве начала XX века (Россия — Маяковский, Бурлюк, Кручёных; Италия — Маринетти). Разрыв с традицией, эксперименты со словом (заумь), формами, ритмом.'],['имажинизм','Имажинизм — литературное направление в России 1910-1920-х годов (Есенин, Мариенгоф, Шершеневич). Основной принцип — самоценность образа («образ — самоцель»). Течение угасло к середине 1920-х.'],['постмодернизм','Постмодернизм в литературе — направление второй половины XX века (Набоков, Эко, Борхес, Каверин, Пелевин). Характерен: цитатность, коллажность, ирония, игра, смешение стилей, жанров, реальности и вымысла, отказ от истины.'],['сюрреализм','Сюрреализм — авангардное направление в искусстве (Бретон, Дали, Магритт, Бунюэль). Сфера психики — бессознательное, сны, галлюцинации, абсурд. Автоматическое письмо — без контроля разума.'],['симфония','Симфония — крупное оркестровое произведение в сонатной форме (обычно из 4 частей: аллегро, анданте, менуэт/скерцо, финал). Классики: Гайдн (108 симфоний), Моцарт (41), Бетховен (9).'],['соната','Соната — камерное произведение для одного или двух инструментов (фортепианная, для скрипки и фортепиано, для виолончели). 3-4 части разного темпа. Классический тип: аллегро, анданте, финал.'],['опера','Опера — музыкально-драматическое произведение, основанное на синтезе музыки (вокал — арии, речитативы, хоры, оркестр), сценического действия и часто балета. Глинка, Мусоргский, Чайковский, Верди, Вагнер, Пуччини.'],['оперетта','Оперетта — музыкально-театральный жанр, лёгкая опера с разговорными диалогами, танцами, куплетами (в отличие от балета). Кальман, И. Штраус, Оффенбах, Дунаевский.'],['кантата','Кантата — вокально-инструментальное произведение для солистов, хора и оркестра, состоящее из нескольких номеров (арий, речитативов, хоров). Отличается от оратории меньшими размерами и отсутствием сюжета.'],['оратория','Оратория — крупное вокально-инструментальное произведение для солистов, хора и оркестра на драматический сюжет (библейский, исторический). Исполняется в концерте (нет сценического действия, в отличие от оперы).'],['концерт','Концерт — виртуозное оркестровое произведение для солирующего инструмента (фортепиано, скрипка, виолончель) с оркестром. 3 части: быстрая — медленная — быстрая. Чайковский, Рахманинов, Прокофьев.'],['сюита','Сюита — циклическая форма из нескольких самостоятельных пьес (танцев, песен, программных пьес), объединённых общим замыслом. Старинная сюита: аллеманда, куранта, сарабанда, жига. Современная сюита — из музыки к кино, балетам.'],['ноктюрн','Ноктюрн (от фр. nocturne — ночной) — инструментальная пьеса лирического, мечтательного характера, обычно для фортепиано. Шопен — 21 ноктюрн, также Глинка, Чайковский, Дебюсси.'],['прелюдия','Прелюдия — короткая инструментальная пьеса (обычно для фортепиано), не имеющая строгой формы. Может быть вступлением к фуге (И.С. Бах) или самостоятельной пьесой (Шопен, Скрябин, Рахманинов, Шостакович).'],['фуга','Фуга — полифоническая форма высшего мастерства, основанная на проведении одной темы (реже 2-3 тем) во всех голосах. Вершина полифонии — И.С. Бах «Хорошо темперированный клавир».'],['токката','Токката (от ит. toccare — касаться, ударять) — виртуозная пьеса для клавишных инструментов (орган, фортепиано) в быстром темпе с аккордовой техникой. Бах, Шуман, Дебюсси, Прокофьев.'],['этюд','Этюд — инструментальная пьеса для развития техники исполнителя (беглость пальцев, октавы, аккорды). Концертные этюды — виртуозные художественные произведения (Шопен, Лист, Рахманинов, Скрябин).'],['ария','Ария — законченный эпизод в опере, оперетте, оратории, исполняемый певцом-солистом в сопровождении оркестра. Характеризует героя, раскрывает его чувства (развёрнутая, кантиленная).'],['речитатив','Речитатив (от ит. recitare — декламировать) — вокальная форма в опере, близкая к декламации. Следует за ритмом и интонацией речи, свободный от регулярной метрики. Служит для развития действия (диалоги, монологи).'],['увертюра','Увертюра — оркестровое вступление к опере, балету, драматическому спектаклю или кинофильму. Концертная увертюра — самостоятельное симфоническое произведение (Чайковский «1812 год», Мендельсон «Сон в летнюю ночь»).'],['аккорд','Аккорд — одновременное звучание трёх и более звуков (нот) разной высоты. Трезвучие (3 звука), септаккорд (4), нонаккорд (5). Мажорный и минорный аккорды — основа тональности.'],['гамма','Гамма — последовательность звуков в восходящем или нисходящем порядке (ступени лада). Мажорная гамма (7 нот), минорная гамма (натуральная, гармоническая, мелодическая). Упражнения для развития техники.'],['тональность','Тональность — высотное положение лада (мажора или минора), определяемое тоникой (главной нотой). Например: до мажор (C-dur), ля минор (a-moll). 24 тональности (12 мажорных + 12 минорных).'],['ритм','Ритм в музыке — чередование длительностей звуков и пауз, создающее временную упорядоченность. Размер (2/4, 3/4, 4/4). Такт — единица метра. Ритмический рисунок — конкретная последовательность длительностей.'],['тембр','Тембр — окраска звука, позволяющая различать звучание разных музыкальных инструментов или голосов даже при одинаковой высоте и громкости. Зависит от обертонов.'],['холст','Холст — ткань (льняная, хлопковая) для живописи маслом, акрилом, темперой. Натягивается на подрамник. Грунтованный холст (клей, меловые белила) — основа для живописного произведения.'],['мольберт','Мольберт — подставка для живописных работ (холста, картона, доски) во время сеанса. Бывает треножный (как у художников) и стационарный (мастерская).'],['палитра','Палитра — доска для смешивания красок. Также — переносное значение: палитра художника — характерный набор красок и цветов, используемых в его произведениях.'],['акварель','Акварель — живопись водорастворимыми красками (пигмент + гуммиарабик). Прозрачность, лёгкость, воздушность. Техники: по-сырому, лессировка, а-ля прима (за один сеанс).'],['гуашь','Гуашь — непрозрачная водорастворимая краска (пигмент + белила + клей). Даёт матовую бархатистую поверхность. Применяется для плакатов, эскизов, детского творчества.'],['пастель','Пастель — живопись сухими или масляными мелками (пигмент + связующее). Мягкая пастель — бархатистая, растушёвка; твёрдая — для прорисовки деталей. Требует фиксации (лак).'],['масло','Масляная живопись — техника с использованием красок на основе растительных масел (льняное, маковое). Позволяет долго работать над картиной (сохнет днями), добиваться лессировок (прозрачные слои).'],['темпера','Темпера — краски на основе эмульсии (желток, казеин, клей). Была основной до изобретения масла (иконы, фрески, средневековая живопись). Сохнет быстро, матовая поверхность.'],['фреска','Фреска (аффреско) — техника настенной живописи по сырой штукатурке. Краски впитываются в поверхность и образуют химически стойкое покрытие (не осыпается веками). Монументальная живопись эпохи Возрождения (Микеланджело, Рафаэль).'],['мозаика','Мозаика — изображение из цветных камешков (смальты), кусочков стекла, керамики, закреплённых на поверхности. Мозаики Софии Киевской, мозаики Равенны, панно из смальты.'],['витраж','Витраж — произведение декоративного искусства из цветного стекла (свинцовый каркас). Храмы (готические розы), светские здания (модерн, ар-деко). Техника Тиффани (медная фольга).'],['гравюра','Гравюра — печатная техника изображения на бумаге с печатной формы (доски). Ксилография (гравюра на дереве), линогравюра (линолеум), резцовая гравюра на металле.'],['литография','Литография — техника плоской печати на известняке (или алюминиевой пластине). Рисунок выполняется жирным карандашом или тушью, затем обрабатывается химическим раствором для восприятия краски только на рисунке.'],['офорт','Офорт — вид гравюры на металле (медь, цинк), при котором рисунок процарапывается иглой сквозь кислотоупорный лак, затем металл травят кислотой, получая углублённые штрихи.'],['пуантилизм','Пуантилизм (дивизионизм) — техника живописи, основанная на разложении цвета на отдельные точки-мазки (чистые цвета смешиваются оптически). Жорж Сёра, Поль Синьяк (конец XIX века).'],['импрессионизм','Импрессионизм — направление в живописи (Моне, Ренуар, Дега). Передача мгновения, игра света и цвета, отказ от чёрного, работа на пленэре (открытый воздух). Название от картины Моне «Впечатление. Восходящее солнце».'],['экспрессионизм','Экспрессионизм — направление (Мунк, Кирхнер, Кокошка). Выражение субъективных эмоций (страха, отчаяния, тревоги) через деформацию, гротеск, яркие контрастные цвета. «Крик» Мунка.'],['кубизм','Кубизм — авангардное направление (Пикассо, Брак). Изображение предметов через геометрические формы (куб, шар, конус), разложение на плоскости, совмещение разных точек зрения.'],['дадаизм','Дадаизм (1916-1922) — авангардное направление (Дюшан, Тцара, Арп). Иррациональность, отрицание эстетики, абсурд, случайность, готовые объекты (ready-made). «Фонтан» Дюшана (писсуар).'],['поп-арт','Поп-арт — направление (1950-1960-е) (Уорхол, Лихтенштейн, Олденбург). Образы массовой культуры: комиксы, банки супа (Уорхол), реклама, известные личности (Мерилин Монро).'],['барокко','Барокко — стиль (XVII-XVIII вв.) в искусстве (живопись, скульптура, архитектура, музыка). Пышность, динамика, контрасты, иллюзорность. Бернини, Караваджо, Рубенс, Бах, Гендель.'],['рококо','Рококо — стиль (XVIII в.) в искусстве, развившийся из барокко. Камерность, изящество, пастельные тона, игривость, асимметрия, «рокайль» (раковина). Ватто, Буше, Фрагонар.'],['ампир','Ампир (фр. Empire — империя) — стиль (первая треть XIX в.) в архитектуре и декоре. Опора на античные образцы (Римская империя), военная символика (орлы, лавры, мечи). Триумфальные арки, колоннады.'],['классицизм','Классицизм — стиль (XVII-XIX вв.), ориентированный на античность как на высший образец. Строгость, симметрия, порядок, разумность, ясность. В живописи — Пуссен, Лоррен. В архитектуре — колонны, фронтоны, ордера.'],['неоклассицизм','Неоклассицизм — художественное направление (конец XVIII — нач. XIX в., а также XX в.) как возврат к античным формам в ответ на барокко и рококо (классицизм). В советской архитектуре 1930-1950-х — сталинский ампир (неоклассицизм).'],['модерн','Модерн (ар-нуво, югендстиль) — стиль (конец XIX — начало XX в.). Плавные, текучие линии (удар хлыста), растительные мотивы, асимметрия. Гауди (архитектура), Климт (живопись), Муха (графика), Тиффани (витражи).'],['ар-нуво','Ар-нуво (фр. Art Nouveau — новое искусство) — французское название модерна. Характерны изогнутые линии, стилизованные цветы и растения, женские фигуры с длинными волосами.'],['ар-деко','Ар-деко — стиль (1920-1930-е гг.) в искусстве и дизайне (от Всемирной выставки 1925 в Париже). Геометрические формы (зигзаги, шевроны), роскошь, экзотика (египетские, африканские мотивы).'],['баухаус','Баухаус — школа искусств (1919-1933, Германия) и художественное направление. Функционализм, минимализм, простота, отсутствие орнамента, принцип «форма следует функции». Основоположники: Гропиус, Кандинский, Клее.'],['конструктивизм','Конструктивизм — авангардное направление (1910-1920-е, Россия, СССР). Искусство должно служить производству (производственное искусство). Геометрические формы, индустриальные материалы (стекло, бетон, металл). Татлин, Родченко, Мельников.'],['минимализм','Минимализм — художественное течение (1960-е, США). Предельная простота форм, монохромность, серийность, повторяющиеся модули. Скульптура (Джадд, Флейвин), живопись (Келли), архитектура, дизайн, музыка (Райх, Гласс).'],['брутализм','Брутализм — архитектурный стиль (1950-1970-е). Грубые фактуры (необработанный бетон), монолитность, массивность, угловатость. Социальное жильё (жилые комплексы), университетские здания.'],['хай-тек','Хай-тек (High-tech) — стиль в архитектуре и дизайне (1970-е — наст. время). Демонстрация инженерных конструкций, металла, стекла, открытые коммуникации (трубы, лифты). Центр Помпиду в Париже (Роджерс, Пиано).'],['деконструктивизм','Деконструктивизм — архитектурный стиль (1980-е — наст. время). Фрагментация, искажение, смещение, нелинейные формы, нарочитый хаос. Хадид (Центр современного искусства в Риме), Гери (Музей Гуггенхайма в Бильбао), Либескинд (Еврейский музей в Берлине).'],['колонна','Колонна — архитектурная опора вертикальной формы, состоящая из базы (основания), ствола (фус
