 главный компонент клеточных стенок растений. Не расщепляется ферментами человека, но необходима для перистальтики (пищевые волокна).'],['камбий','Камбий — образовательная ткань (меристема) в стеблях и корнях растений. Клетки камбия делятся, образуя вторичную ксилему (древесину) внутрь и вторичную флоэму (луб) наружу. Обеспечивает рост в толщину.'],['ксилема','Ксилема (древесина) — проводящая ткань растений, по которой вода и минеральные вещества поднимаются от корней к листьям. Состоит из мёртвых сосудов и трахеид с одревесневшими стенками.'],['флоэма','Флоэма (луб) — проводящая ткань растений, по которой органические вещества (сахароза, аминокислоты) транспортируются от листьев (источников) в другие части растения (акцепторы). Состоит из живых ситовидных трубок с клетками-спутницами.'],['устьице','Устьице — пора в эпидермисе листа и стебля, окружённая двумя замыкающими клетками. Регулирует газообмен (CO₂ внутрь, O₂ и водяной пар наружу) и транспирацию (испарение воды). Открывается при закачке ионов калия.'],['транспирация','Транспирация — испарение воды с поверхности листьев через устьица. Создаёт корневое давление и подъём воды по ксилеме (транспирационная тяга), охлаждает листья. Регулируется открытием и закрытием устьиц.'],['меристема','Меристема — образовательная ткань растений, клетки которой способны к делению. Обеспечивает рост в длину (верхушечная меристема) и толщину (камбий). Клетки мелкие, плотные, без вакуолей.'],['паренхима','Паренхима — основная ткань растений с тонкими стенками. Функции: заполнение пространства, фотосинтез (хлоренхима в листьях), запасание (сердцевина, клубни), транспорт, газообмен (аэренхима).'],['колленхима','Колленхима — механическая ткань растений из живых клеток с неравномерно утолщёнными стенками. Обеспечивает гибкую прочность молодых стеблей и черешков. Встречается по краям листа (нервы).'],['склеренхима','Склеренхима — механическая ткань растений из мёртвых клеток с равномерно утолщёнными одревесневшими стенками. Обеспечивает жёсткость и прочность. Волокна льна, крапивы — склеренхима.'],['эпидермис','Эпидермис (кожица) — покровная ткань растения, однослойная из плотно сомкнутых живых клеток. Защищает от высыхания, механических повреждений, проникновения микроорганизмов. Содержит устьица и трихомы (волоски).'],['корень','Корень — вегетативный орган растения, закрепляющий его в почве. Функции: поглощение воды и минеральных веществ (корневые волоски), проведение, запасание (корнеплоды). Зоны корня: деления, роста, всасывания, проведения.'],['стебель','Стебель — осевая часть побега растения. Соединяет корни и листья, проводит воду и органику, выносит листья к свету, может запасать питательные вещества (клубни, луковицы).'],['лист','Лист — боковой орган растения, выполняющий фотосинтез, газообмен и транспирацию. Состоит из листовой пластинки, черешка и жилок (проводящие пучки). Бывает простым и сложным.'],['цветок','Цветок — орган семенного размножения покрытосеменных растений. Состоит из цветоножки, цветоложа, чашечки (чашелистики), венчика (лепестки), тычинок (мужские) и пестика (женский).'],['пестик','Пестик — женский орган цветка. Состоит из завязи (содержит семязачатки), столбика и рыльца (ловит пыльцу). После оплодотворения из завязи развивается плод, из семязачатков — семена.'],['тычинка','Тычинка — мужской орган цветка. Состоит из тычиночной нити и пыльника (в котором созревает пыльца — мужские гаметофиты с образованием спермиев). Количество тычинок — важный систематический признак.'],['завязь','Завязь — нижняя расширенная часть пестика цветка, содержащая один или несколько семязачатков. После оплодотворения из завязи развивается плод. Завязь может быть верхней, нижней или полунижней.'],['семяпочка','Семяпочка (семязачаток) — образование в завязи пестика, из которого после оплодотворения развивается семя. Содержит зародышевый мешок с яйцеклеткой, центральной клеткой и другими клетками.'],['опыление','Опыление — перенос пыльцы с тычинок на рыльце пестица (у цветковых растений) или на семязачаток (у голосеменных). Бывает самоопыление и перекрёстное (ветром, насекомыми, птицами, водой).'],['семя','Семя — орган размножения и расселения семенных растений. Состоит из семенной кожуры (защита), зародыша (будущее растение) и эндосперма (запас питательных веществ).'],['плод','Плод — орган покрытосеменных растений, развивающийся из завязи цветка после оплодотворения. Содержит семена. Функции: защита семян и их распространение (ветром, животными, водой).'],['прорастание','Прорастание семян — переход семени из состояния покоя к росту. Требует воды (набухание), тепла и кислорода. Первым появляется корешок, затем проросток выносит семядоли на поверхность (надземное) или оставляет в почве (подземное).'],['фитогормон','Фитогормоны (растительные гормоны) — регуляторы роста и развития растений. Вырабатываются в малых количествах. Основные группы: ауксины, гиббереллины, цитокинины, абсцизовая кислота, этилен, брассиностероиды.'],['ауксин','Ауксин (ИУК) — фитогормон, стимулирующий удлинение клеток, рост стебля к свету (фототропизм), рост корня вниз (геотропизм). Вырабатывается в верхушечной меристеме. Высокие концентрации ингибируют боковые почки (апикальное доминирование).'],['гиббереллин','Гиббереллины — фитогормоны, стимулирующие прорастание семян (мобилизация эндосперма), рост стебля в длину, цветение, развитие плодов. Применяются в сельском хозяйстве для увеличения урожая винограда (бессемянные сорта).'],['цитокинин','Цитокинины — фитогормоны, стимулирующие деление клеток (цитокинез), рост боковых почек, задержку старения листьев (регулируют старение). Вырабатываются в корнях и транспортируются вверх по ксилеме.'],['этилен','Этилен C₂H₄ — газообразный фитогормон, ускоряющий созревание плодов, старение цветков и листьев, опадение листьев (абсциссия). Используется для дозаривания бананов и томатов при транспортировке.'],['таксис','Таксис — направленное движение свободноподвижных организмов (бактерий, простейших, сперматозоидов) в ответ на раздражитель (химический — хемотаксис, световой — фототаксис). Может быть положительным (к стимулу) или отрицательным (от стимула).'],['тропизм','Тропизм — ростовое движение растения в ответ на односторонний раздражитель. Фототропизм — к свету (положительный у стебля, отрицательный у корня). Геотропизм — к силе тяжести (корень вниз, стебель вверх). Гидротропизм — к воде (корень).'],['популяция','Популяция — совокупность особей одного вида, длительно обитающих на одной территории, свободно скрещивающихся и относительно изолированных от других популяций. Элементарная единица эволюции.'],['ареал','Ареал — область распространения вида или популяции на земной поверхности. Может быть сплошным, разорванным (дизъюнктивным), реликтовым (остатки более широкого ареала). Размер ареала зависит от экологической пластичности вида.'],['миграция','Миграция животных — закономерное перемещение особей между местообитаниями (сезонные перелёты птиц, нерестовые миграции рыб, ход лососей на нерест). Способствует освоению новых территорий и обмену генами между популяциями.'],['спячка','Спячка (гибернация) — состояние пониженной активности и замедленного метаболизма у теплокровных животных (медведи, суслики, ежи) для переживания зимы с недостатком пищи. Температура тела снижается, сердцебиение замедляется.'],['метаморфоз','Метаморфоз — глубокое превраление личинки во взрослую особь. Полный метаморфоз (яйцо → личинка → куколка → имаго) у бабочек, жуков, мух. Неполный (яйцо → нимфа → имаго) у кузнечиков, тараканов, стрекоз.'],['шерсть','Шерсть — волосяной покров млекопитающих. Состоит из остевых волос (длинные, жёсткие) и подшёрстка (короткие, пушистые, для теплоизоляции). Защищает от холода, травм, участвует в осязании (вибриссы — усы).'],['перья','Перья — роговой покров птиц. Контурные перья (маховые и рулевые) обеспечивают полёт. Пуховые перья и пух — для теплоизоляции. Состоят из стержня и опахала (бородки с крючочками). Перья растут из фолликулов, линька — периодическая смена оперения.'],['чешуя','Чешуя — кожные образования у рыб (костная чешуя), пресмыкающихся (роговые чешуи) и некоторых млекопитающих (ящеры, броненосцы). Защищает от механических повреждений, паразитов, потери влаги.'],['жабры','Жабры — органы дыхания водных животных (рыбы, ракообразные, моллюски). Состоят из лепестков с тонкими стенками и богатой капиллярной сетью. Обеспечивают газообмен: кислород из воды поступает в кровь, углекислый газ выводится наружу.'],['лёгкие','Лёгкие — органы дыхания наземных позвоночных (млекопитающие, птицы, рептилии, амфибии). У млекопитающих — губчатые структуры из альвеол (газообмен). У птиц — сложные лёгкие с воздушными мешками (двойное дыхание).'],['трахеи','Трахеи (дыхательные трубки) — органы дыхания насекомых, паукообразных и других членистоногих. Система разветвлённых трубок, пронизывающих тело. Кислород поступает непосредственно к тканям через дыхальца на поверхности тела.'],['выделительная система','Выделительная система удаляет из организма продукты метаболизма (мочевину, мочевую кислоту, креатинин, избыток воды и солей). У позвоночных включает почки, мочеточники, мочевой пузырь, мочеиспускательный канал.'],['естественный отбор','Естественный отбор — движущий фактор эволюции, открытый Дарвином. Особи с признаками, повышающими приспособленность к среде, оставляют больше потомства. Приводит к адаптации и видообразованию.'],['дарвинизм','Дарвинизм — теория эволюции Чарльза Дарвина. Основные положения: наследственная изменчивость, борьба за существование, естественный отбор, происхождение видов от общих предков, дивергенция.'],['изменчивость','Изменчивость — свойство организмов приобретать новые признаки в процессе индивидуального развития. Наследственная (генотипическая, мутационная) — передаётся потомству. Ненаследственная (модификационная, фенотипическая) — реакция на условия среды.'],['генофонд','Генофонд — совокупность всех генов (аллелей) в популяции или виде. Характеризует генетическое разнообразие. Чем больше генофонд, тем выше адаптивный потенциал популяции.'],['дрейф генов','Дрейф генов — случайное изменение частот аллелей в популяции, особенно выраженное в малых популяциях. Приводит к фиксации или потере аллелей независимо от их приспособленности (эффект основателя, бутылочное горлышко).'],['мутация','Мутация — стойкое изменение последовательности ДНК (генная, хромосомная, геномная). Источник наследственной изменчивости. Большинство мутаций нейтральны или вредны, редко — полезны.'],['адаптация','Адаптация — приспособление строения и функций организма к условиям среды (результат естественного отбора). Примеры: покровительственная окраска (камуфляж), предупреждающая окраска (яркая у ядовитых), мимикрия (подражание другим видам).'],['дивергенция','Дивергенция — расхождение признаков у родственных групп в процессе эволюции, ведущее к образованию новых видов. Причина — адаптация к разным условиям среды (дарвиновы вьюрки на Галапагосах).'],['конвергенция','Конвергенция — независимое возникновение сходных признаков у неродственных групп в одинаковых условиях среды. Примеры: крылья птиц и бабочек, обтекаемая форма тела акул, ихтиозавров и дельфинов.'],['видообразование','Видообразование — возникновение новых видов в процессе эволюции. Аллопатрическое (географическое) — при изоляции популяций географическими барьерами. Симпатрическое (экологическое) — в пределах одного ареала из-за экологической специализации.'],['аллопатрия','Аллопатрия — географическое видообразование, при котором популяции вида изолируются физическими барьерами (горы, пустыни, океаны). Накопление генетических различий приводит к возникновению новых видов.'],['симпатрия','Симпатрия — видообразование в пределах одного ареала без географической изоляции. Механизмы: экологическая специализация (питание разной пищей), полиплоидия (удвоение хромосом у растений), сезонная изоляция (разные сроки размножения).'],['изоляция','Изоляция — ограничение свободного скрещивания между популяциями. Географическая (барьеры). Биологическая (экологическая, этологическая — разное поведение, сезонная, генетическая — несовместимость). Приводит к видообразованию.'],['репродуктивный барьер','Репродуктивный барьер — факторы, препятствующие скрещиванию и получению плодовитого потомства. Презиготические (до оплодотворения — разные брачные ритуалы, несовместимость гамет) и постзиготические (гибриды бесплодны или нежизнеспособны).'],['гибрид','Гибрид — потомство от скрещивания разных видов, родов или сортов. Межвидовые гибриды часто бесплодны (мул — гибрид лошади и осла, стерилен). У растений гибриды могут быть плодовиты (пшенично-ржаные гибриды).'],['филогенез','Филогенез — историческое развитие группы организмов (вида, рода, семейства) в эволюции. Прослеживается по ископаемым остаткам, сравнительной анатомии, молекулярным данным (ДНК, белки).'],['онтогенез','Онтогенез — индивидуальное развитие организма от зиготы до смерти. Включает эмбриональный (зародышевый) и постэмбриональный (послеродовой) периоды. Кратко повторяет этапы эволюции (биогенетический закон Геккеля-Мюллера).'],['рудимент','Рудимент — недоразвитый орган, утративший свою основную функцию в процессе эволюции. Примеры: аппендикс у человека (рудимент слепой кишки), крылья у нелетающих птиц (страусы), тазовые кости у китов и дельфинов.'],['атавизм','Атавизм — появление у особи признаков, характерных для далёких предков, но отсутствующих у большинства современных особей. Примеры: хвост у человека, многососковость, волосатость (гипертрихоз), задние конечности у китов (в эмбриогенезе).'],['гомология','Гомология — сходство строения органов у разных видов, обусловленное общим происхождением. Примеры: передние конечности позвоночных (рука человека, крыло птицы, ласт кита, нога лошади) — одинаковый план строения, но разные функции.'],['аналогия','Аналогия — сходство строения и функции органов у разных видов, возникшее независимо (конвергентно) в одинаковых условиях. Примеры: крыло бабочки и крыло птицы, глаз человека и глаз осьминога, жаберные щели у рыб и личинок амфибий (разное происхождение).'],['эмбриология','Эмбриология — наука о зародышевом развитии организмов (от зиготы до рождения или вылупления). Изучает этапы эмбриогенеза: дробление, гаструляция, органогенез. Данные эмбриологии подтверждают эволюцию (сходство ранних стадий зародышей).'],['биогенетический закон','Биогенетический закон Геккеля-Мюллера: онтогенез (индивидуальное развитие) есть краткое и быстрое повторение филогенеза (исторического развития вида). Пример: зародыши позвоночных на ранних стадиях имеют жаберные щели и хорду.'],['искусственный отбор','Искусственный отбор — выбор человеком особей с желательными признаками для размножения. Привёл к созданию всех пород домашних животных (собаки, лошади, коровы) и сортов культурных растений (пшеница, капуста, розы).'],['селекция','Селекция — наука о выведении новых и улучшении существующих пород животных, сортов растений, штаммов микроорганизмов. Методы: гибридизация, искусственный отбор, мутагенез, клеточная и генная инженерия.'],['борьба за существование','Борьба за существование — совокупность взаимоотношений организма с факторами среды и другими организмами. Формы: внутривидовая (за пищу, территорию, самку), межвидовая (хищник-жертва, паразит-хозяин), борьба с неблагоприятными условиями (холод, засуха).'],['выживание','Выживание — способность организма выживать и оставлять потомство в данных условиях среды. Обратно пропорционально смертности. Выживают наиболее приспособленные (естественный отбор).'],['приспособленность','Приспособленность (адаптированность) — степень соответствия организма условиям среды. Измеряется числом потомков, доживающих до репродуктивного возраста. Приспособленность — результат естественного отбора.'],['макроэволюция','Макроэволюция — эволюционные изменения на надвидовом уровне (образование новых родов, семейств, отрядов, классов, типов). Происходит на основе микроэволюционных процессов (накопление малых изменений).'],['микроэволюция','Микроэволюция — эволюционные изменения внутри вида и популяции (изменение генофонда, образование новых популяций, подвидов). Приводит к видообразованию. Происходит на малых временных масштабах.'],['уайлс','Эндрю Уайлс (1953–) — британский математик. Доказал Великую теорему Ферма в 1994 году (после 7 лет работы в тайне). Решил проблему, не поддававшуюся 358 лет.'],['коэволюция','Коэволюция — взаимное эволюционное влияние видов друг на друга, адаптация к совместному существованию. Примеры: цветы и опыляющие их насекомые, хищник и жертва, паразит и хозяин.'],['вымирание','Вымирание — исчезновение вида с лица Земли. Причины: изменение климата, катастрофы (падение астероида), конкуренция с другими видами, деятельность человека. Массовые вымирания: пермское (96% видов), меловое (динозавры).'],['динозавры','Динозавры — группа вымерших пресмыкающихся, господствовавших на суше 160 млн лет (триас-мел). Вымерли 65 млн лет назад после падения астероида. Предками птиц являются тероподы (хищные динозавры).'],['кембрийский взрыв','Кембрийский взрыв (ок. 541 млн лет назад) — резкое увеличение разнообразия многоклеточных животных. Появились почти все современные типы (членистоногие, моллюски, хордовые). Причина: появление хищников, кислорода, твёрдых скелетов.'],['антропогенез','Антропогенез — процесс эволюционного происхождения человека (Homo sapiens) от общих предков с человекообразными обезьянами. Этапы: австралопитеки → Homo habilis → Homo erectus → Homo sapiens.'],['австралопитек','Австралопитеки (4-2 млн лет назад) — прямоходящие обезьяны, предки человека. Объём мозга 400-500 см³ (как у шимпанзе). Ходили на двух ногах, но сохраняли древесные адаптации. Люси — знаменитый скелет.'],['неандерталец','Неандерталец (Homo neanderthalensis) — вид людей (400-40 тыс. лет назад), обитал в Европе и Азии. Объём мозга больше, чем у современного человека. Изготавливал орудия, хоронил умерших. Вытеснен сапиенсами, следы ДНК неандертальцев есть у европейцев и азиатов.'],['кроманьонец','Кроманьонец (Homo sapiens) — первый современный человек (появился 200-100 тыс. лет назад в Африке). Вытеснил неандертальцев. Пещерная живопись, костяные орудия, бусы — свидетельства символического мышления.'],['сапиенс','Homo sapiens (человек разумный) — единственный ныне живущий вид рода Homo. Появился в Африке 200-300 тыс. лет назад. Характерны: большой мозг, речь, абстрактное мышление, культура, техника.'],['митохондриальная ева','Митохондриальная Ева — последний общий предок всех современных людей по женской линии (по митохондриальной ДНК, передающейся от матери). Жила в Африке 150-200 тыс. лет назад. Это не первая женщина, а единственная, чья линия сохранилась.'],['y-хромосомный адам','Y-хромосомный Адам — последний общий предок всех современных мужчин по мужской линии (по Y-хромосоме, передающейся от отца). Жил в Африке 120-200 тыс. лет назад. Не совпадает по времени с митохондриальной Евой.'],['молекулярные часы','Молекулярные часы — метод определения времени расхождения видов по скорости накопления мутаций в ДНК или белках. Используется для построения филогенетических деревьев и датировки эволюционных событий.'],['палеонтология','Палеонтология — наука об ископаемых остатках организмов. Изучает эволюцию жизни на Земле. Методы: раскопки, анализ окаменелостей, реконструкция внешнего вида и образа жизни вымерших существ.'],['окаменелость','Окаменелость (фоссилия) — остатки организмов или следы их жизнедеятельности, сохранившиеся в осадочных породах. Окаменение (перминерализация) — замещение органики минералами (кремнием, карбонатом кальция).'],['переходная форма','Переходная форма — организм, сочетающий признаки древних и более поздних групп. Подтверждает эволюцию. Примеры: археоптерикс (рептилия + птица), тиктаалик (рыба + четвероногое), зверозубые ящеры (рептилия + млекопитающее).'],['археоптерикс','Археоптерикс (150 млн лет назад) — переходная форма между динозаврами и птицами. Имел зубы, длинный костный хвост, когти на крыльях, но был покрыт перьями. Доказательство происхождения птиц от тероподных динозавров.'],['латимерия','Латимерия (целакант) — кистепёрая рыба, считавшаяся вымершей 65 млн лет назад. Живой экземпляр выловлен в 1938 году у берегов Южной Африки. «Живое ископаемое», близка к предкам наземных позвоночных.'],['сумчатые','Сумчатые — инфракласс млекопитающих, рождающих недоношенных детёнышей, которые донашиваются в сумке. Примеры: кенгуру, коала, опоссум, вомбат. Распространены в Австралии, Южной Америке.'],['плацентарные','Плацентарные — инфракласс млекопитающих, у которых развита плацента — орган для питания и дыхания зародыша внутри матки. Детёныши рождаются развитыми. Большинство млекопитающих, включая человека, — плацентарные.'],['экосистема','Экосистема — совокупность живых организмов (биоценоз) и среды их обитания (биотоп), связанных круговоротом веществ и потоком энергии. Примеры: лес, озеро, луг, океан, пустыня.'],['биосфера','Биосфера — оболочка Земли, населённая живыми организмами. Включает нижнюю атмосферу (до озонового слоя), гидросферу (весь океан) и верхнюю литосферу (до нескольких км). Учение создано Владимиром Вернадским.'],['биоценоз','Биоценоз — совокупность живых организмов (растений, животных, грибов, бактерий), населяющих однородный участок среды (биотоп). Связаны пищевыми и пространственными связями.'],['биотоп','Биотоп — участок среды (почва, водоём, лесная подстилка) с относительно однородными условиями, занятый определённым биоценозом. Неживой компонент экосистемы.'],['вид','Вид — основная систематическая единица. Группа особей со сходным строением, общим происхождением, свободно скрещивающихся и дающих плодовитое потомство, занимающих определённый ареал.'],['пищевая цепь','Пищевая цепь (трофическая цепь) — последовательность организмов, в которой каждый предыдущий служит пищей для последующего. Пример: трава → кузнечик → лягушка → змея → орёл. Обычно 4-5 звеньев.'],['пищевая сеть','Пищевая сеть — переплетение пищевых цепей в экосистеме. Один и тот же организм может входить в разные цепи (лягушка ест и кузнечиков, и жуков; змею едят и орёл, и лиса).'],['трофический уровень','Трофический уровень — положение организма в пищевой цепи. Продуценты (1-й уровень: растения). Консументы 1-го порядка (травоядные), 2-го порядка (хищники, едящие травоядных), 3-го порядка (вершинные хищники). Редуценты (разлагатели).'],['продуценты','Продуценты — автотрофные организмы, создающие органику из неорганических веществ. Фотосинтетики (растения, цианобактерии, фитопланктон) и хемосинтетики (некоторые бактерии). Первое звено пищевой цепи, преобразуют солнечную энергию в химическую.'],['консументы','Консументы — гетеротрофные организмы, потребляющие готовое органическое вещество. Консументы 1-го порядка — травоядные (заяц, корова). Консументы 2-го и высших порядков — хищники (волк, сова, касатка).'],['редуценты','Редуценты (деструкторы) — организмы, разлагающие мёртвую органику (детрит) до минеральных веществ. Бактерии гниения, грибы, дождевые черви, личинки мух. Замыкают круговорот веществ.'],['хемосинтез','Хемосинтез — синтез органических веществ из CO₂ за счёт энергии окисления неорганических соединений. Серобактерии окисляют H₂S, нитрифицирующие — NH₃, железобактерии — Fe²⁺. Открыт Виноградским.'],['биомасса','Биомасса — масса всех живых организмов на единице площади или объёма. Выражается в г/м² или т/га. Наибольшая биомасса — в лесах (тропические леса), наименьшая — в пустынях и тундре.'],['продуктивность','Продуктивность экосистемы — скорость накопления биомассы за единицу времени. Первичная продуктивность (продуценты), вторичная (консументы). Самая высокая — в тропических лесах и коралловых рифах, низкая — в пустынях и тундре.'],['круговорот веществ','Круговорот веществ — многократное использование химических элементов в экосистеме. Основные циклы: углерода (через фотосинтез и дыхание), азота (фиксация, аммонификация, нитрификация, денитрификация), кислорода, воды, фосфора.'],['углеродный цикл','Углеродный цикл — круговорот углерода в биосфере. Растения поглощают CO₂ из атмосферы (фотосинтез). При дыхании, горении, разложении органики CO₂ возвращается в атмосферу. Нарушение цикла (сжигание топлива) — причина парникового эффекта.'],['азотный цикл','Азотный цикл — круговорот азота в биосфере. Фиксация атмосферного N₂ (клубеньковые бактерии, сине-зелёные водоросли) → аммонификация (разложение органики до NH₃) → нитрификация (NH₃→NO₂⁻→NO₃⁻) → денитрификация (NO₃⁻→N₂).'],['кислородный цикл','Кислородный цикл — круговорот кислорода. Основной источник — фотосинтез (O₂). Поглощение — дыхание организмов, окисление (горение, ржавление). Атмосферный кислород поддерживается растениями (около 21%).'],['сукцессия','Сукцессия — последовательная смена одних биоценозов другими на одной территории. Первичная сукцессия — на безжизненных субстратах (скалы, вулканический пепел). Вторичная — на месте уничтоженного леса или поля. Завершается климаксом.'],['климакс','Климакс — конечная устойчивая стадия сукцессии, находящаяся в равновесии со средой. Например, дубовый лес (в лесостепной зоне), где виды сменяют друг друга незначительно. Может сохраняться столетиями.'],['мутуализм','Мутуализм — форма симбиоза, взаимовыгодная для обоих видов. Примеры: пчёлы и цветы (опыление и нектар), клубеньковые бактерии и бобовые (фиксация азота, углеводы), грибы и корни растений (микориза).'],['комменсализм','Комменсализм — форма симбиоза, при которой один вид получает пользу, а другому ни вредно, ни полезно. Примеры: рыба-прилипала на акуле, птицы-волоклюи на носорогах, нахлебничество львов (шакалы доедают остатки).'],['паразитизм','Паразитизм — форма симбиоза, при которой один вид (паразит) живёт за счёт другого (хозяина), нанося ему вред. Примеры: ленточные черви, клещи, гриб трутовик, повилика (растение-паразит), малярийный плазмодий.'],['хищничество','Хищничество — форма трофических отношений, при которой хищник ловит и поедает жертву. Примеры: волк и заяц, сова и мышь, паук и муха. Регулирует численность популяций, способствует естественному отбору.'],['конкуренция','Конкуренция — взаимоотношения между видами (или особями одного вида) за ресурсы (пища, вода, пространство, свет). Внутривидовая конкуренция — самая острая. По принципу Гаузе, два вида не могут занимать одну экологическую нишу.'],['экологическая ниша','Экологическая ниша — совокупность всех условий существования вида (пища, убежища, температура, влажность, конкуренты) и его роль в экосистеме. Два вида не могут занимать одну нишу — один вытесняется.'],['лимитирующий фактор','Лимитирующий фактор (закон минимума Либиха) — фактор, ограничивающий рост популяции, даже если все остальные факторы в избытке. Пример: в пустыне — вода, в тундре — тепло, в океане — азот и фосфор.'],['толерантность','Толерантность (экологическая валентность) — способность организма выдерживать колебания факторов среды (температуры, солёности, pH). Эврибионты — широкий диапазон (крысы, тараканы). Стенотермные — узкий диапазон (пандa, коала).'],['загрязнение','Загрязнение окружающей среды — поступление вредных веществ (токсикантов) в атмосферу, воду, почву. Виды: химическое (пестициды, тяжелые металлы), физическое (радиация, шум), биологическое (инвазивные виды, возбудители болезней).'],['эрозия','Эрозия почвы — разрушение и снос верхнего плодородного слоя ветром (дефляция) или водой (водная эрозия). Причины: вырубка лесов, распашка степей, неправильное земледелие. Опустынивание — крайняя степень эрозии.'],['опустынивание','Опустынивание — деградация земель в засушливых регионах, ведущая к потере растительности и плодородия, образованию пустынь. Причины: перевыпас скота, вырубка лесов, засоление почв. Опустынивание угрожает миллиардам людей.'],['парниковый эффект','Парниковый эффект — нагревание нижних слоёв атмосферы парниковыми газами (CO₂, CH₄, водяной пар, фреоны), задерживающими тепловое излучение Земли. Естественный парниковый эффект поддерживает жизнь (+15°C). Усиленный человеком — глобальное потепление.'],['градиент','Градиент — вектор, указывающий направление наискорейшего возрастания функции скалярного поля. ∇f = (∂f/∂x, ∂f/∂y, ∂f/∂z).'],['озоновый слой','Озоновый слой — слой стратосферы на высоте 20-30 км с повышенной концентрацией озона O₃. Задерживает губительное ультрафиолетовое излучение Солнца (УФ-В, УФ-С). Разрушается фреонами (хлорфторуглеродами). Монреальский протокол (1987) запретил фреоны, слой восстанавливается.'],['кислотные дожди','Кислотные дожди — осадки с pH ниже 5,6 из-за растворения оксидов серы SO₂ и азота NOₓ от сжигания угля, нефти, работы автотранспорта. Приводят к закислению почв, водоёмов, гибели лесов, разрушению памятников архитектуры.'],['эвтрофикация','Эвтрофикация — перенасыщение водоёмов биогенными элементами (азотом и фосфором из удобрений, стоков). Вызывает бурное цветение водорослей (сине-зелёные), которые при разложении поглощают кислород, вызывая замор рыбы.'],['биоразнообразие','Биоразнообразие — разнообразие жизни во всех её проявлениях: генетическое (разнообразие аллелей), видовое (число видов), экосистемное (разнообразие местообитаний). Высокое биоразнообразие обеспечивает устойчивость экосистем.'],['красная книга','Красная книга — официальный список редких и исчезающих видов растений, животных, грибов. Категории: исчезнувшие, находящиеся под угрозой исчезновения, сокращающиеся, редкие, неопределённые, восстановленные.'],['заповедник','Заповедник — охраняемая территория, полностью изъятая из хозяйственного использования. Запрещена любая деятельность человека (охота, рыбалка, вырубка леса, сбор грибов). Только научные исследования.'],['заказник','Заказник — охраняемая территория с частичным ограничением деятельности. Может быть создан на определённый срок для охраны одного вида (охотничий заказник) или экосистемы (ландшафтный заказник).'],['устойчивое развитие','Устойчивое развитие — концепция развития человечества, при которой удовлетворение потребностей нынешнего поколения не ставит под угрозу будущие поколения. Три pillars: экономика, экология, социальная справедливость.'],['возобновляемая энергия','Возобновляемая энергия (зелёная энергия) — энергия из неисчерпаемых источников: солнце (солнечные панели), ветер (ветряные турбины), вода (ГЭС), приливы, геотермальная (тепло земли), биомасса. Альтернатива ископаемому топливу для снижения выбросов CO₂.'],['утилизация','Утилизация отходов — переработка и использование отходов в качестве вторичного сырья или энергии. Методы: переработка (рециклинг), сжигание (с получением энергии), компостирование (органические отходы), захоронение (на полигонах).'],['рециклинг','Рециклинг (вторичная переработка) — повторное использование материалов (стекло, бумага, пластик, металл, резина). Сокращает потребление ресурсов и загрязнение природы. Символ — треугольник из стрелок.'],['инвазивный вид','Инвазивный вид — чужеродный вид (растение, животное, микроорганизм), который прижился в новой экосистеме и наносит ущерб экономике, здоровью человека или местному биоразнообразию. Примеры: борщевик Сосновского, колорадский жук, амброзия.'],['диагноз','Диагноз — медицинское заключение о сущности заболевания и состоянии пациента. Ставится на основе жалоб (анамнез), осмотра, лабораторных и инструментальных исследований. Различают: клинический, дифференциальный, патологоанатомический.'],['симптом','Симптом — отдельный признак болезни. Субъективные (жалобы: боль, тошнота, слабость) и объективные (выявляемые врачом: сыпь, отёк, хрипы, температура). Симптомокомплекс (синдром) — устойчивая совокупность симптомов.'],['синдром','Синдром — совокупность симптомов, характерных для определённого заболевания или состояния. Например, синдром Дауна (генетический), синдром раздражённого кишечника (функциональный), синдром приобретённого иммунодефицита (СПИД).'],['анамнез','Анамнез — совокупность сведений о пациенте и его болезни. Включает анамнез жизни (условия жизни, вредные привычки, перенесённые болезни) и анамнез заболевания (начало, развитие, уже проведённое лечение).'],['пальпация','Пальпация — метод обследования прощупыванием. Определяет форму, размеры, консистенцию органов, болезненность. В гинекологии — бимануальное исследование. В педиатрии — ощупывание родничков.'],['аускультация','Аускультация — метод выслушивания звуков, возникающих в работающих органах (сердце, лёгкие, кишечник). Стетоскоп или фонендоскоп. Позволяет выявить хрипы, шумы, перистальтику.'],['перкуссия','Перкуссия (выстукивание) — метод оценки состояния органов по звуку при постукивании. Тупой звук — над плотными органами (печень, опухоль). Ясный лёгочный — над лёгкими. Коробочный звук — при эмфиземе.'],['термометр','Медицинский термометр (градусник) — прибор для измерения температуры тела. Норма — 36,6°C (под мышкой). Ртутные (точны, но опасны) заменяются электронными и инфракрасными. Лихорадка — выше 38°C (активация иммунитета).'],['тонометр','Тонометр — прибор для измерения артериального давления. Механический (с фонендоскопом, по Короткову) или автоматический (осциллометрический). Норма ~120/80 мм рт.ст. Гипертония >140/90.'],['стетоскоп','Стетоскоп — прибор для аускультации. Изобретён Лаэннеком в 1816 году (свёрнутая трубка). Современный стетоскоп — бинауральный с мембраной и колоколом для разных частот звуков.'],['электрокардиограмма','ЭКГ — запись электрической активности сердца. Зубцы P (возбуждение предсердий), QRS (желудочков), T (восстановление). Позволяет выявить инфаркт (элевация ST), аритмии, блокады, гипертрофию отделов сердца.'],['рентгенография','Рентгенография — метод визуализации внутренних органов с помощью X-лучей. Плотные ткани (кости) — белые, воздух — чёрный. Доза облучения минимальна. Диагностика переломов, пневмонии, опухолей.'],['томография','Томография — послойное изображение внутренних структур. Компьютерная томография (КТ) — рентгеновские срезы. Магнитно-резонансная томография (МРТ) — ядерный магнитный резонанс, лучше видит мягкие ткани.'],['биопсия','Биопсия — взятие образца ткани для микроскопического исследования (гистологии). Пункционная биопсия (игла), инцизионная (кусочек опухоли), эксцизионная (удаление всего образования). Золотой стандарт диагностики рака.'],['анестезия','Анестезия — потеря чувствительности, особенно болевой. Местная анестезия (инфильтрационная, проводниковая) — сознание сохранено. Эпидуральная — в позвоночный канал (роды). Спинномозговая — в субарахноидальное пространство.'],['наркоз','Наркоз (общая анестезия) — искусственно вызванный обратимый сон с потерей сознания, чувствительности, мышечной релаксацией и амнезией. Комбинация внутривенных и ингаляционных препаратов (пропофол, севофлуран).'],['антисептика','Антисептика — уничтожение микроорганизмов на коже и слизистых, в ране. Антисептики: спирт (70%), хлоргексидин, йод (йодонат), перекись водорода, бриллиантовый зелёный. Внедрена Листером (карболовая кислота).'],['асептика','Асептика — метод предотвращения попадания микроорганизмов в рану. Стерилизация инструментов (автоклав, сухожар), перчатки, маски, халаты, обработка операционного поля. Асептика + антисептика — основа современной хирургии.'],['реанимация','Реанимация — комплекс мероприятий по восстановлению жизненно важных функций (сердцебиения и дыхания). Сердечно-лёгочная реанимация (СЛР): 30 нажатий на грудину (глубиной 5-6 см, частота 100-120/мин) и 2 вдоха.'],['дефибриллятор','Дефибриллятор — прибор, наносящий электрический разряд для прекращения фибрилляции желудочков (хаотичных сокращений). Автоматические наружные дефибрилляторы (AED) в общественных местах спасают жизни при внезапной остановке сердца.'],['трансплантация','Трансплантация — пересадка органа или ткани от донора реципиенту. Пересадка почки (самая частая), печени, сердца, поджелудочной железы, легких, костного мозга. Проблемы: отторжение (иммуносупрессоры) и нехватка донорских органов.'],['имплантат','Имплантат — искусственное устройство, вживляемое в организм. Виды: зубные имплантаты (титановый винт в челюсть), эндопротезы тазобедренного сустава, грудные имплантаты, кардиостимуляторы.'],['протез','Протез — искусственная замена отсутствующей части тела (конечности, зуба, глаза). Протезы конечностей — косметические и функциональные (бионические, с миоэлектрическим управлением). Зубные протезы (съёмные, мосты, коронки).'],['диализ','Диализ — очищение крови от продуктов метаболизма при почечной недостаточности. Гемодиализ — через аппарат «искусственная почка» (фильтрация через полупроницаемую мембрану). Перитонеальный диализ — через брюшину.'],['инфаркт','Инфаркт миокарда — некроз участка сердечной мышцы из-за закупорки коронарной артерии тромбом. Симптомы: интенсивная боль за грудиной, иррадиирующая в левую руку, челюсть, холодный пот. Экстренное восстановление кровотока (стентирование, тромболизис).'],['инсульт','Инсульт — острое нарушение мозгового кровообращения. Ишемический (тромб, эмбол) — 85%. Геморрагический (разрыв сосуда с кровоизлиянием) — 15%. Симптомы: асимметрия лица, слабость в руке, нарушение речи (правило «УДАР»). «Золотой час» — экстренная помощь.'],['атеросклероз','Атеросклероз — хроническое заболевание артерий, при котором на стенках откладываются холестериновые бляшки, суживающие просвет. Причина — нарушение липидного обмена (высокий LDL-холестерин). Осложнения: инфаркт, инсульт, перемежающаяся хромота.'],['гипертония','Артериальная гипертония — стойкое повышение артериального давления (систолическое >140, диастолическое >90). Факторы риска: ожирение, соль, стресс, курение, наследственность. При отсутствии лечения приводит к инфаркту, инсульту, почечной недостаточности.'],['диабет','Сахарный диабет — хроническое нарушение обмена веществ, характеризующееся высоким уровнем сахара в крови (гипергликемией). Тип 1 — дефицит инсулина (аутоиммунный). Тип 2 — инсулинорезистентность (ожирение, возраст). Осложнения: слепота, почечная недостаточность, ампутации.'],['астма','Бронхиальная астма — хроническое воспаление дыхательных путей, проявляющееся приступами удушья, свистящими хрипами, кашлем. Триггеры: аллергены, холодный воздух, физическая нагрузка, стресс. Лечение: ингаляционные глюкокортикоиды (базисная терапия) и бронхолитики (сальбутамол).'],['пневмония','Пневмония (воспаление лёгких) — инфекционное заболевание лёгочной ткани с поражением альвеол. Симптомы: кашель с мокротой, лихорадка, одышка, боль в груди. Возбудители: пневмококк (чаще), микоплазма, вирусы, грибы. Лечение — антибиотики.'],['туберкулёз','Туберкулёз — инфекционное заболевание, вызываемое микобактерией (палочка Коха). Поражает чаще лёгкие (кашель с кровью, ночные поты, потеря веса), возможна внелёгочная форма (кости, мозг). Передаётся воздушно-капельно. Лечение длительное (6-9 месяцев, 4-5 антибиотиков).'],['гепатит','Гепатит — воспаление печени. Вирусный гепатит A (фекально-оральный, острый, обычно без последствий), B и C (парентеральный, хронический → цирроз → рак печени). Алкогольный гепатит (токсический). Гепатит C излечим современными противовирусными препаратами.'],['цирроз','Цирроз печени — замещение нормальной ткани печени фиброзной (рубцовой) с утратой функции. Причины: хронический гепатит B и C, алкоголь, жировая болезнь. Осложнения: портальная гипертензия (азит, варикоз пищевода), печёночная недостаточность, рак.'],['аппендицит','Аппендицит — воспаление червеобразного отростка слепой кишки (аппендикса). Симптомы: боль в эпигастрии, смещающаяся в правую подвздошную область, тошнота, повышение температуры. Лечение — экстренная операция (аппендэктомия). Промедление ведёт к перитониту.'],['перитонит','Перитонит — воспаление брюшины (оболочки брюшной полости). Острое жизнеугрожающее состояние — следствие прободения язвы, разрыва аппендикса, кишечной непроходимости, травмы. Лечение: экстренная операция + массивные антибиотики. Без операции смертность 100%.'],['язва','Язвенная болезнь — дефект слизистой оболочки желудка (желудочная язва) или двенадцатиперстной кишки. Основная причина — бактерия Helicobacter pylori и НПВП (аспирин, ибупрофен). Симптомы: голодные боли, ночные боли, изжога. Лечение: антибиотики + ингибиторы протонной помпы.'],['гастрит','Гастрит — воспаление слизистой оболочки желудка. Острый — после отравления, приёма алкоголя, НПВП. Хронический — чаще вызван Helicobacter pylori. Симптомы: боль в эпигастрии, тошнота, тяжесть после еды. Может привести к язве и раку желудка.'],['онкология','Онкология — раздел медицины, изучающий злокачественные опухоли (рак, саркома, лейкоз). Лечение: хирургическое удаление, химиотерапия, лучевая терапия, таргетная терапия, иммунотерапия. Ранняя диагностика (скрининг) ключевая для излечения.'],['метастаз','Метастаз — вторичный очаг злокачественной опухоли, отдалённый от первичного. Раковые клетки распространяются по лимфатическим сосудам (лимфогенно) или кровеносным (гематогенно). Наличие метастазов означает IV стадию рака и прогноз хуже.'],['лейкоз','Лейкоз (рак крови) — злокачественное заболевание кроветворной системы. В костном мозге происходит бесконтрольное размножение незрелых лейкоцитов (бластов), вытесняющих нормальные клетки. Острый лейкоз — агрессивный, быстрый летальный исход без лечения. Хронический — вялотекущий.'],['анемия','Анемия (малокровие) — снижение уровня гемоглобина и/или эритроцитов. Симптомы: бледность, слабость, головокружение, одышка. Железодефицитная анемия — самая частая (кровопотери, недостаток железа в пище). В12-дефицитная анемия (пернициозная) — при недостатке витамина В12.'],['гемофилия','Гемофилия — наследственное заболевание, характеризующееся нарушением свёртывания крови. Недостаток фактора VIII (гемофилия A) или фактора IX (B). Сцеплено с X-хромосомой, болеют мужчины (женщины — носители). Кровоизлияния в суставы (гемартроз) и мышцы.'],['тромбоз','Тромбоз — образование тромба (сгустка крови) в просвете сосуда, препятствующего кровотоку. Глубоких вен — отёк ноги, боль, риск тромбоэмболии лёгочной артерии (отрыв тромба → смерть). Профилактика: антикоагулянты, компрессионный трикотаж, ранняя активизация после операций.'],['варикоз','Варикозное расширение вен — патологическое расширение поверхностных вен, чаще нижних конечностей. Причина: слабость венозных стенок и несостоятельность клапанов. Симптомы: извитые синие вены, отёки, тяжесть в ногах, судороги. Осложнения: трофические язвы, тромбофлебит.'],['матрица','Матрица — прямоугольная таблица чисел, расположенных по строкам и столбцам. Используется для решения систем линейных уравнений, преобразований координат, в компьютерной графике и квантовой механике.'],['аллергия','Аллергия — повышенная чувствительность иммунной системы к обычно безвредным веществам (аллергенам). Проявления: насморк, чихание, сыпь, зуд, отёк Квинке, анафилактический шок. Лечение: антигистаминные препараты, глюкокортикостероиды, АСИТ (аллерген-специфическая иммунотерапия).'],['артрит','Артрит — воспаление сустава. Симптомы: боль, отёк, покраснение, ограничение движений. Ревматоидный артрит — аутоиммунное заболевание (хроническое, симметричное поражение мелких суставов). Подагрический артрит — отложение кристаллов мочевой кислоты.'],['остеопороз','Остеопороз — системное заболевание скелета, характеризующееся снижением плотности костей и повышенным риском переломов. Чаще у пожилых женщин (постменопаузальный остеопороз). Профилактика: кальций, витамин D, физическая нагрузка, бисфосфонаты.'],['мигрень','Мигрень — неврологическое заболевание, проявляющееся приступами интенсивной пульсирующей головной боли (часто односторонней). Сопровождается тошнотой, рвотой, свето- и звукобоязнью. Длится от 4 до 72 часов. Триггеры: стресс, недосып, красное вино, шоколад, сыр.'],['эпилепсия','Эпилепсия — хроническое неврологическое заболевание, характеризующееся повторяющимися эпилептическими приступами (судорогами). Вызвана аномальной электрической активностью нейронов. Лечение: противоэпилептические препараты (вальпроаты, карбамазепин, леветирацетам). 70% пациентов достигают ремиссии.'],['цезарь','Гай Юлий Цезарь (100-44 гг. до н.э.) — древнеримский полководец, политик, диктатор. Реформировал календарь (юлианский). Завоевал Галлию. Убит заговорщиками в сенате. Его имя стало титулом «царь», «кайзер», «цезарь».'],['клеопатра','Клеопатра VII (69-30 гг. до н.э.) — последняя царица Египта из династии Птолемеев. Правила совместно с братом, затем с Марком Антонием (римский полководец). После поражения от Октавиана покончила с собой (укус змеи?). Символ роковой женщины.'],['чингисхан','Чингисхан (ок.1155-1227) — основатель и первый великий хан Монгольской империи. Объединил монгольские племена и создал самую большую в истории сухопутную империю (от Тихого океана до Каспия). Его завоевания сопровождались массовыми убийствами.'],['тамерлан','Тамерлан (Тимур, 1336-1405) — среднеазиатский полководец и завоеватель, основатель империи Тимуридов. Разгромил Золотую Орду, персов, Индию. Известен жестокостью (пирамиды из черепов). Почитался как покровитель искусств (Самарканд, мечеть Биби-Ханым).'],['жанна д\'арк','Жанна д’Арк (Орлеанская Дева, 1412-1431) — национальная героиня Франции. Возглавила французскую армию в Столетней войне, сняла осаду Орлеана. Была захвачена бургундцами, продана англичанам и сожжена на костре как еретичка. Канонизирована в 1920 году.'],['леонардо да винчи','Леонардо да Винчи (1452-1519) — итальянский художник, учёный, изобретатель эпохи Возрождения. Шедевры: «Мона Лиза» (Джоконда), «Тайная вечеря». Оставил анатомические рисунки и проекты (вертолёт, танк, парашют). Символ универсального гения (homo universalis).'],['микеланджело','Микеланджело Буонарроти (1475-1564) — итальянский скульптор, художник, архитектор эпохи Возрождения. Скульптуры: «Давид», «Пьета». Роспись Сикстинской капеллы (создание Адама, Страшный суд). Архитектура: купол собора Святого Петра.'],['лютер','Мартин Лютер (1483-1546) — немецкий богослов, основоположник Реформации. 31 октября 1517 года прибил к дверям Виттенбергской церкви 95 тезисов против индульгенций. Перевёл Библию на немецкий язык. Основал лютеранство (протестантизм).'],['генрих viii','Генрих VIII (1491-1547) — король Англии. Разорвал отношения с Римом и создал Англиканскую церковь (Акт о супрематии 1534), чтобы жениться на Анне Болейн (у него было 6 жён). Казнил двух жён (Анну Болейн и Кэтрин Говард).'],['елизавета i','Елизавета I (1533-1603) — королева Англии и Ирландии, последняя из династии Тюдоров. «Золотой век» Англии: расцвет культуры (Шекспир) и мореплавания (разгром Непобедимой армады 1588). Умерла бездетной (девственная королева).'],['пётр i','Пётр I Великий (1672-1725) — первый император Всероссийский. Провёл реформы: создание флота, переход на юлианский календарь, изменение алфавита, основание Санкт-Петербурга (1712). Победил Швецию в Северной войне (1700-1721). Прорубил «окно в Европу».'],['екатерина ii','Екатерина II Великая (1729-1796) — российская императрица, правила 34 года (1762-1796). Век Просвещения. Расширила границы России (Крым, Украина, Литва, Курилы). Провела губернскую реформу. Подавила восстание Пугачёва. Переписывалась с Вольтером и Дидро.'],['вашингтон','Джордж Вашингтон (1732-1799) — первый президент США (1789-1797). Главнокомандующий Континентальной армией в Войне за независимость. Председатель Конституционного конвента. Его портрет на однодолларовой купюре.'],['наполеон','Наполеон I Бонапарт (1769-1821) — французский император (1804-1814), гениальный полководец. Завоевал почти всю Европу. Ввёл Кодекс Наполеона. Потерпел поражение от России в 1812 году, от союзников при Ватерлоо (1815), сослан на остров Святой Елены.'],['нельсон','Горацио Нельсон (1758-1805) — английский адмирал. Разгромил франко-испанский флот при Трафальгаре (1805), где и погиб (сражение сделало Британию владычицей морей). Его колонна на Трафальгарской площади.'],['бисмарк','Отто фон Бисмарк (1815-1898) — «железный канцлер», первый канцлер Германской империи (1871-1890). Объединил Германию «железом и кровью» (войны с Данией, Австрией, Францией). Создатель системы союзов в Европе.'],['ленин','Владимир Ильич Ленин (1870-1924) — основатель РСДРП(б), руководитель Октябрьской революции 1917 года. Создатель первого в мире социалистического государства (РСФСР, затем СССР). Идеолог марксизма-ленинизма. Ввёл НЭП. Мумифицирован в Мавзолее.'],['сталин','Иосиф Виссарионович Сталин (1878-1953) — руководитель СССР (конец 1920-х — 1953). Провёл индустриализацию, коллективизацию. Победил в Великой Отечественной войне. Организовал массовые репрессии («Большой террор», ГУЛАГ). Культ личности.'],['гитлер','Адольф Гитлер (1889-1945) — фюрер нацистской Германии (1933-1945). Развязал Вторую мировую войну (1939). Организовал Холокост (6 млн евреев). Покончил с собой в бункере 30 апреля 1945 года.'],['черчилль','Уинстон Черчилль (1874-1965) — премьер-министр Великобритании (1940-1945, 1951-1955). Лидер союзников во Второй мировой войне. Автор фразы «Iron Curtain» (железный занавес). Нобелевская премия по литературе (1953).'],['рузвельт','Франклин Делано Рузвельт (1882-1945) — 32-й президент США (1933-1945). Единственный президент, избранный 4 раза. «Новый курс» по выходу из Великой депрессии. Инициатор создания ООН. Руководил США во Второй мировой войне.'],['ганди','Махатма Ганди (1869-1948) — лидер движения за независимость Индии от Великобритании. Философия ненасилия (сатьяграха — сопротивление истиной). Бойкот британских товаров, соляной поход, голодовки. Убит индуистским экстремистом.'],['мартин лютер кинг','Мартин Лютер Кинг (1929-1968) — лидер борьбы за гражданские права чернокожих в США. Сторонник ненасильственного сопротивления. Речь «У меня есть мечта» (1963). Нобелевская премия мира (1964). Убит. День Мартина Лютера Кинга — национальный праздник США.'],['мандела','Нельсон Мандела (1918-2013) — президент ЮАР (1994-1999), борец с апартеидом. Провёл 27 лет в тюрьме (остров Роббен). Нобелевская премия мира (1993) вместе с Фредериком де Клерком. Символ примирения.'],['горбачёв','Михаил Сергеевич Горбачёв (1931-2022) — последний Генеральный секретарь ЦК КПСС, единственный Президент СССР (1990-1991). Перестройка, гласность, ускорение. Вывод войск из Афганистана. Способствовал объединению Германии и окончанию Холодной войны. Нобелевская премия мира (1990).'],['палеолит','Палеолит (древний каменный век, 2,5 млн — 12 тыс. лет назад) — становление человека (Homo habilis, Homo erectus, Homo sapiens). Охота и собирательство. Использование огня. Пещерная живопись (Альтамира, Ласко).'],['неолит','Неолит (новый каменный век, 12-7 тыс. лет назад) — переход от присваивающего хозяйства (охота, собирательство) к производящему (земледелие, скотоводство) — неолитическая революция. Появление глиняной посуды, ткачества, постоянных поселений (Иерихон).'],['античность','Античность — период древней истории (с VIII в. до н.э. по V в. н.э.) — цивилизации Древней Греции и Древнего Рима. Родина демократии, философии (Сократ, Платон, Аристотель), театра, Олимпийских игр, римского права, латыни.'],['средневековье','Средневековье (V-XV вв.) — период от падения Западной Римской империи (476 г.) до начала Возрождения. Феодализм, рыцари, замки, крепостное право. Доминирование католической церкви, крестовые походы, инквизиция, готическая архитектура.'],['возрождение','Возрождение (Ренессанс, XIV-XVI вв.) — эпоха расцвета культуры в Европе после Средневековья. Интерес к античности, гуманизм, наука, искусство. Леонардо да Винчи, Микеланджело, Рафаэль, Тициан. Изобретение книгопечатания Гутенбергом.'],['реформация','Реформация (XVI в.) — религиозное и политическое движение в Европе, направленное на реформирование католической церкви. Начало: 95 тезисов Мартина Лютера (1517). Возникновение протестантизма (лютеранство, кальвинизм, англиканство). Крестьянская война в Германии.'],['просвещение','Просвещение (XVIII в.) — интеллектуальное и философское движение. Вольтер, Руссо, Дидро, Монтескье, Кант. Вера в разум и науку, критика абсолютизма и церкви. Идеи равенства, свободы, демократии. Влияние на Великую французскую революцию и Декларацию независимости США.'],['промышленная революция','Промышленная революция (конец XVIII — начало XIX в.) — переход от ручного труда к машинному, от мануфактуры к фабрике. Изобретения: паровая машина Уатта (1769), прядильная машина, ткацкий станок. Рост городов, капитализм, рабочий класс.'],['первая мировая война','Первая мировая война (1914-1918) — первый глобальный военный конфликт между Антантой (Россия, Франция, Англия, США с 1917) и Тройственным союзом (Германия, Австро-Венгрия, Турция, Болгария). Окопная война, использование танков, отравляющих газов (иприт). Погибло ок. 10 млн военных. Распад 4 империй (Российской, Германской, Австро-Венгерской, Османской).'],['октябрьская революция','Октябрьская революция (25 октября 1917 года по ст. стилю) — захват власти большевиками под руководством Ленина в Петрограде. Свержение Временного правительства. Приняты Декрет о мире и Декрет о земле. Начало гражданской войны в России.'],['вторая мировая война','Вторая мировая война (1939-1945) — крупнейший в истории военный конфликт между Осью (Германия, Италия, Япония) и Антигитлеровской коалицией (СССР, США, Великобритания, Китай, Франция). Погибло ок. 60 млн человек. Атомные бомбардировки Хиросимы и Нагасаки (1945). Окончание: капитуляция Японии 2 сентября 1945 года.'],['холокост','Холокост (1933-1945) — систематическое преследование и уничтожение евреев нацистской Германией и её союзниками. Около 6 млн убитых евреев (1,5 млн детей). Около 3 млн из них — в лагере смерти Освенцим. Другие жертвы: цыгане, славяне, гомосексуалы.'],['холодная война','Холодная война (1946-1991) — глобальное геополитическое противостояние между СССР и его союзниками (Варшавский блок) и США и их союзниками (НАТО). Гонка вооружений (ядерное оружие), космическая гонка. Карибский кризис (1962) — граница ядерной войны. Окончание — распад СССР.'],['берлинская стена','Берлинская стена (1961-1989) — бетонное сооружение, разделявшее Берлин на Западный (ФРГ) и Восточный (ГДР). Символ Холодной войны. Падение стены 9 ноября 1989 года — символическое окончание Холодной войны и начало объединения Германии.'],['распад ссср','Распад СССР произошёл 26 декабря 1991 года (подписание Беловежских соглашений 8 декабря 1991). Образовалось 15 независимых государств. Причины: экономический кризис, приватизация, ослабление центральной власти, неудачная война в Афганистане.'],['европейский союз','Европейский союз (ЕС) — экономическое и политическое объединение 27 европейских стран. Начало — Европейское объединение угля и стали (1951). Маастрихтский договор (1992). Единая валюта евро (2002). Шенгенская зона (свободное передвижение).'],['колониализм','Колониализм — система господства метрополий над колониями (XVI-XX вв.). Европейские державы (Великобритания, Франция, Испания, Португалия, Нидерланды) захватывали земли в Америке, Африке, Азии, эксплуатируя ресурсы и население. Деколонизация после Второй мировой войны.'],['крестовые походы','Крестовые походы (1096-1272) — серия военных походов европейских рыцарей под лозунгом освобождения Святой земли (Иерусалима) от мусульман. Всего 8 походов. Первый (1096-1099) — взятие Иерусалима. Четвёртый (1202-1204) — разграбление Константинополя.'],['реконкиста','Реконкиста (VIII-XV вв.) — отвоевание христианскими королевствами (Испания, Португалия) Пиренейского полуострова у мусульманских государств (мавров). Завершилась взятием Гранады (1492) — королями Фердинандом Арагонским и Изабеллой Кастильской.'],['инквизиция','Инквизиция — судебная система католической церкви (XIII-XIX вв.) для борьбы с ересями. Суд над еретиками, пытки, аутодафе (сожжение на костре). Знаменитые процессы: Жанна д’Арк (1431), Галилей (1633).'],['абсолютизм','Абсолютизм — форма правления, при которой монарху принадлежит неограниченная верховная власть (законодательная, исполнительная, судебная). Примеры: Людовик XIV во Франции («Государство — это я»), Пётр I в России, Екатерина II.'],['рабство','Рабство — система, при которой человек является собственностью другого человека (хозяина). Существовало во всех древних цивилизациях (Египет, Греция, Рим, Китай). Трансатлантическая работорговля (XVI-XIX вв.) — 12-15 млн африканцев вывезено в Америку. Отменено в США 1865 год (13-я поправка).'],['эмансипация','Эмансипация — освобождение от какой-либо зависимости. Эмансипация крестьян — отмена крепостного права (в России — 1861). Женская эмансипация — борьба за равноправие женщин (избирательное право, доступ к образованию, профессии).'],['суфражизм','Суфражизм (от англ. suffrage — избирательное право) — движение за предоставление женщинам избирательных прав (конец XIX — начало XX вв.). Лидеры: Эммелин Панкхёрст (Великобритания), Сьюзен Б. Энтони (США). Россия: 1917 год (временное правительство).'],['апартеид','Апартеид (1948-1991) — официальная политика расовой сегрегации в ЮАР. Белое меньшинство (ок. 20%) угнетало чёрное большинство: раздельное проживание, обучение, браки, неучастие в выборах. Разрушен Нельсоном Манделой и Фредериком де Клерком.'],['евразия','Евразия — крупнейший материк Земли (54,6 млн км²). Объединяет Европу и Азию. Здесь высочайшая гора (Эверест, 8848 м), глубочайшее озеро (Байкал, 1642 м), самая большая страна по площади (Россия).'],['африка','Африка — второй по величине материк (30,3 млн км²), самый жаркий. Здесь Сахара (крупнейшая пустыня), Нил (длиннейшая река, 6650 км). Колыбель человечества: древнейшие ископаемые Homo sapiens найдены в Восточной Африке.'],['северная америка','Северная Америка — третий материк (24,7 млн км²). От Арктики до тропиков. Великие озёра — крупнейшая система пресной воды. Кордильеры — горная система вдоль западного побережья.'],['южная америка','Южная Америка — четвёртый материк (17,8 млн км²). Рекорды: Амазонка (самая полноводная река), Анды (длиннейшая горная цепь, 9000 км), Анхель (высочайший водопад, 979 м).'],['антарктида','Антарктида — пятый материк (14,1 млн км²), покрытый льдом (толщина до 4,8 км). Самое холодное место на Земле (-89,2°C). Нет постоянного населения, только полярные станции. Содержит 70% мировых запасов пресной воды.'],['австралия','Австралия — самый маленький материк (7,7 млн км²), самый сухой и низкий. 70% — пустыни и полупустыни. Уникальная фауна: кенгуру, коала, утконос, ехидна. Большой Барьерный риф — крупнейшая живая структура.'],['тихий океан','Тихий океан — крупнейший океан Земли (178,6 млн км², больше всей суши). Самая глубокая точка — Марианская впадина (ок. 11 022 м). Вокруг Тихого океана — Тихоокеанское огненное кольцо (зона вулканов и землетрясений).'],['атлантический океан','Атлантический океан — второй по величине (91,6 млн км²). Гольфстрим — мощное тёплое течение, влияющее на климат Европы. Срединно-Атлантический хребет — подводная горная система.'],['индийский океан','Индийский океан — третий по величине (76,1 млн км²). Самый тёплый океан. Муссоны определяют климат побережий. Важнейшие морские пути для перевозки нефти из Персидского залива.'],['северный ледовитый океан','Северный Ледовитый океан — самый маленький и холодный океан (14,7 млн км²). Почти полностью покрыт льдами (зимой — 14 млн км², летом — 7 млн км²). Из-за потепления климата льды тают, открывая Северный морской путь.'],['южный океан','Южный океан — условно выделяемая акватория вокруг Антарктиды (к югу от 60° ю.ш.). Холодное течение Западных Ветров — мощнейшее течение в мире.'],['россия','Россия — крупнейшая страна мира (17,1 млн км²). Простирается через 11 часовых поясов. Граничит с 18 странами (самая большая граница в мире). Омывается 3 океанами и 12 морями. Богатства: нефть, газ, уголь, руды, алмазы, лес, пресная вода (Байкал).'],['пропан','Пропан C₃H₈ — третий алкан, бесцветный газ. Сжиженный пропан используется как топливо для автомобилей, в туристических газовых баллонах, отоплении.'],['китай','Китай — третья по площади страна (9,6 млн км²), первая по численности населения (1,4 млрд). Древнейшая непрерывная цивилизация (5 тыс. лет). Родина бумаги, пороха, компаса, книгопечатания. Коммунистическая партия Китая у власти с 1949 года. Вторая экономика мира.'],['индия','Индия — седьмая по площади страна, первая по численности населения (с 2023 года, 1,43 млрд). Родина шахмат, йоги, буддизма, индуизма. Кастовая система (формально отменена). Колония Великобритании до 1947 года. Бурно растущая экономика (IT, фармацевтика).'],['сша','Соединённые Штаты Америки — четвёртая по площади страна (9,8 млн км²), третья по населению (336 млн). 50 штатов. Крупнейшая экономика мира. Федеративная президентская республика. Родина Голливуда, Силиконовой долины, NASA. Технологический и военный лидер.'],['индонезия','Индонезия — крупнейшее островное государство мира (более 17 тыс. островов). Четвёртое по населению (280 млн). Столица — Джакарта (переносится в Нусантару). Крупнейшая экономика Юго-Восточной Азии. Острова: Суматра, Ява, Калимантан, Сулавеси, Папуа.'],['бразилия','Бразилия — пятая по площади страна (8,5 млн км²), седьмая по населению (220 млн). Крупнейшая экономика и страна Южной Америки. Амазонские джунгли — «лёгкие планеты». Португальский язык. Карнавал в Рио, футбол (пентакампеоны), кофе.'],['пакистан','Пакистан — пятая по населению страна (240 млн). Мусульманская республика (97% мусульман). Выделился из Индии в 1947 году (раздел Британской Индии). Ядерная держава. Столица — Исламабад. Вражда с Индией из-за Кашмира.'],['нигерия','Нигерия — самая населённая страна Африки (230 млн). Крупнейшая экономика Африки (нефть). Многообразие этносов (хауса, йоруба, ибо) и религий (ислам, христианство). Столица — Абуджа. Крупнейший город — Лагос.'],['бангладеш','Бангладеш — восьмая по населению страна (170 млн), очень высокая плотность (более 1200 чел/км²). Бывшая часть Пакистана (Восточный Пакистан), независимость 1971 год. Реки Ганг и Брахмапутра. Частые наводнения и циклоны. Текстильная промышленность.'],['япония','Япония — одиннадцатая по населению страна (125 млн), высокоразвитая экономика (третья в мире). Архипелаг из четырёх главных островов (Хоккайдо, Хонсю, Сикоку, Кюсю) и тысяч мелких. Столица — Токио. Родина суши, аниме, караоке, робототехники.'],['германия','Германия — крупнейшая экономика Европы (четвёртая в мире). 84 млн жителей. Федеративная республика (16 земель). Столица — Берлин. Родина автомобилестроения (Mercedes, BMW, Audi, Volkswagen). Объединение ФРГ и ГДР в 1990 году.'],['франция','Франция — вторая экономика Европы (шестая в мире), 68 млн жителей. Полупрезидентская республика. Столица — Париж. Родина виноделия, сыров, высокой моды, парфюмерии. Бывшая колониальная империя. Член постоянной пятёрки СБ ООН.'],['великобритания','Великобритания — островное государство (Англия, Шотландия, Уэльс, Северная Ирландия), 67 млн жителей. Конституционная монархия. Столица — Лондон. Родина Промышленной революции. Выход из ЕС (Brexit) в 2020 году. Бывшая Британская империя.'],['италия','Италия — 58 млн жителей, парламентская республика. Столица — Рим. Родина Древнего Рима, католицизма (Ватикан), Ренессанса. Мировые бренды: Ferrari, Lamborghini, Prada, Gucci, Nutella. Пицца, паста, эспрессо.'],['испания','Испания — 48 млн жителей, парламентская монархия. Столица — Мадрид. Бывшая колониальная империя (испанский язык — второй в мире по числу носителей). Коррида, фламенко, футбол (Реал Мадрид, Барселона).'],['канада','Канада — вторая по площади страна мира (9,98 млн км²), 40 млн жителей. Парламентарная монархия (король Великобритании). Официальные языки: английский и французский (Квебек). Леса, озёра, кленовый сироп, хоккей.'],['мексика','Мексика — 130 млн жителей, федеративная президентская республика. Столица — Мехико (одна из крупнейших агломераций мира). Бывшая колония Испании (Новая Испания). Родина ацтеков, майя, текилы, такос. Крупнейший испаноязычный мир.'],['аргентина','Аргентина — 46 млн жителей, вторая по площади страна Южной Америки (после Бразилии). Президентская республика. Столица — Буэнос-Айрес. Родина танго, Эвиты Перон, Лионеля Месси. Экономический кризис, инфляция.'],['египет','Египет — 112 млн жителей, крупнейшая арабская страна. Президентская республика. Столица — Каир. Древнеегипетская цивилизация (пирамиды Гизы, Сфинкс, фараоны). Река Нил. Суэцкий канал. Туризм.'],['турция','Турция — 85 млн жителей, парламентская республика (президентская с 2018). Расположена на двух континентах (Европа и Азия). Столица — Анкара. Крупнейший город — Стамбул (бывший Константинополь). Член НАТО, кандидат в ЕС.'],['иран','Иран — 89 млн жителей, исламская республика (шиитский ислам). Бывшая Персия. Столица — Тегеран. Ядерная программа, богат нефтью и газом. Вражда с США и Израилем.'],['саудовская аравия','Саудовская Аравия — абсолютная монархия (династия Саудитов). 36 млн жителей. Крупнейший экспортёр нефти. Мекка и Медина — священные города ислама. Столица — Эр-Рияд. Видение 2030 (реформы, диверсификация).'],['юар','Южно-Африканская Республика — 60 млн жителей, парламентская республика. Три столицы: Претория (административная), Кейптаун (законодательная), Блумфонтейн (судебная). Апартеид (1948-1991). Алмазы, золото. 11 официальных языков.'],['украина','Украина — 41 млн жителей (без учёта оккупированных территорий). Президентско-парламентская республика. Столица — Киев. Война с Россией с 2014 года (аннексия Крыма, Донбасс), полномасштабное вторжение с 2022 года. Чернозёмы, пшеница.'],['польша','Польша — 38 млн жителей, парламентская республика. Столица — Варшава. Член НАТО (1999) и ЕС (2004). Бывший социалистический блок, «Восточный блок». Родина Коперника, Шопена, Марии Склодовской-Кюри.'],['швеция','Швеция — 10,5 млн жителей, конституционная монархия. Столица — Стокгольм. Социал-демократическая модель «скандинавского социализма». Нейтралитет во время мировых войн. Член ЕС (1995) и НАТО (2024).'],['норвегия','Норвегия — 5,5 млн жителей, конституционная монархия. Столица — Осло. Фьорды, нефть и газ (один из крупнейших экспортёров), гигантский суверенный фонд (около 1,5 трлн долларов). Не входит в ЕС, но в Шенген и НАТО.'],['финляндия','Финляндия — 5,6 млн жителей, парламентская республика. Столица — Хельсинки. Сотни тысяч озёр («страна тысячи озёр»). Бывший член Российской империи (до 1917). Член ЕС (1995) и НАТО (2023). Образование, качество жизни, сауны.'],['токио','Токио — столица Японии, крупнейшая городская агломерация мира (более 37 млн человек). Экономический, финансовый, культурный центр. Императорский дворец. Технологии, небоскрёбы, Синдзюку, Сибуя, храм Мэйдзи. Принимал Олимпиады 1964 и 2020.'],['дели','Дели — столица Индии (официально Национальный столичный регион Дели). Вторая по величине агломерация Индии после Мумбаи (около 30 млн человек). Старый Дели (Красный форт) и Новый Дели (правительственные здания).'],['шанхай','Шанхай — крупнейший по населению город Китая (около 27 млн). Финансовый центр страны, мегаполис с небоскрёбами (Шанхайская башня, 632 м). Крупнейший порт мира. Бунд, Хуанпу, Disneyland.'],['сан-паулу','Сан-Паулу — крупнейший город Бразилии и всей Южной Америки (около 22 млн в агломерации). Деловой и финансовый центр. Мегаполис с небоскрёбами, контрасты богатства и бедности. Музей искусства, собор.'],['мехико','Мехико — столица Мексики, крупнейший испаноязычный город мира (около 22 млн). Построен на месте ацтекского Теночтитлана. Археологические зоны, собор, музеи (Фрида Кало). Проблемы смога и землетрясений.'],['каир','Каир — столица Египта, крупнейший город арабского мира и Африки (около 22 млн). Расположен на реке Нил. Рядом — древние пирамиды Гизы и Сфинкс. Исламский Каир (мечети), Коптский Каир (церкви).'],['нью-йорк','Нью-Йорк — крупнейший город США (по населению — 8,4 млн, с агломерацией — 20 млн). Финансовая столица мира (Уолл-стрит), штаб-квартира ООН. Статуя Свободы, Бродвей, Таймс-сквер, Центральный парк, Метрополитен-музей.'],['лос-анджелес','Лос-Анджелес — второй по величине город США (около 3,8 млн, с агломерацией — 13 млн). Столица мировой киноиндустрии (Голливуд, «Аллея славы»). Гриффит-обсерватория, пляжи (Санта-Моника), Disneyland.'],['лондон','Лондон — столица Великобритании, один из крупнейших финансовых центров мира (около 9 млн, с агломерацией — 14 млн). Биг-Бен, Тауэр, Букингемский дворец, Лондонское око, Британский музей, метро (Tube).'],['париж','Париж — столица Франции, «город света» (около 2,1 млн, с агломерацией — 11 млн). Эйфелева башня, Лувр, Нотр-Дам, Триумфальная арка, Ёлисейские поля. Центр моды, искусства, кулинарии.'],['берлин','Берлин — столица Германии (около 3,7 млн, с агломерацией — 6 млн). Бранденбургские ворота, Рейхстаг, Берлинская стена (Ист-Сайд-галерея), Музейный остров. Клубная культура, техно.'],['москва','Москва — столица России (около 13 млн, с агломерацией — 18 млн). Политический, экономический, культурный центр. Кремль, Красная площадь, Мавзолей Ленина, ГУМ, Большой театр, МГУ, Третьяковская галерея.'],['стамбул','Стамбул — крупнейший город Турции (около 16 млн). Расположен на двух континентах (Европа и Азия). Бывший Константинополь, столица Византии и Османской империи. Айя-София, Голубая мечеть, Гранд-базар, Босфор.'],['дубай','Дубай — крупнейший город Объединённых Арабских Эмиратов (около 3,5 млн). Самый высокий небоскрёб мира (Бурдж-Халифа, 828 м). Искусственные острова (Пальма Джумейра), роскошь, туризм. Зимние Олимпийские игры 2036?'],['сингапур','Сингапур — город-государство в Юго-Восточной Азии (6 млн). Крупнейший финансовый центр, порт. Бывшая британская колония, независимость 1965 (от Малайзии). Авторитарная демократия (народное действие). Чистота, зелёные насаждения, аэропорт Чанги.'],['бангкок','Бангкок — столица Таиланда (около 11 млн). Крупнейший туристический центр Юго-Восточной Азии. Храмы (Ват Пхо, Ват Арун), плавучие рынки, шопинг. Пробки, жара.'],['сеул','Сеул — столица Республики Корея (около 9,7 млн, с агломерацией — 25 млн). Технологии (Самсунг, LG), K-pop, корейская косметика. Дворец Кёнбоккун, башня Намсан. Высокоскоростной интернет.'],['рим','Рим — столица Италии (2,8 млн, с агломерацией — 4,3 млн). «Вечный город», бывшая столица Римской империи. Колизей, Римский форум, Пантеон, фонтан Треви, Ватикан (Собор Святого Петра, Сикстинская капелла).'],['мадрид','Мадрид — столица Испании (3,3 млн, с агломерацией — 6,7 млн). Королевский дворец, музей Прадо (Гойя, Веласкес), стадион Сантьяго Бернабеу (Реал Мадрид). Культура, ночная жизнь, тапас.'],['барселона','Барселона — второй по величине город Испании (1,6 млн, с агломерацией — 5,5 млн). Архитектура Антонио Гауди (Саграда Фамилия, Парк Гуэль). Пляжи, футбольный клуб Барселона. Каталонский язык и культура.'],['амстердам','Амстердам — столица Нидерландов (921 тыс., с агломерацией — 2,5 млн). Каналы, велосипеды, тюльпаны, музеи (Рейксмюзеум — Рембрандт, Ван Гог). Красные фонари, кофешопы. Столица, но правительство в Гааге.'],['вена','Вена — столица Австрии (1,9 млн, с агломерацией — 2,8 млн). Бывшая столица империи Габсбургов. Классическая музыка (Моцарт, Бетховен, Шуберт, Штраус). Дворец Шёнбрунн, собор Святого Стефана. Высокое качество жизни.'],['пекин','Пекин — столица Китая (21 млн, с агломерацией — 23 млн). Запретный город, Великая Китайская стена (ближайший участок — Бадалин), Храм Неба. Политический и культурный центр. Принимал летние Олимпийские игры 2008 и зимние 2022.'],['гонконг','Гонконг — специальный административный район Китая (7,5 млн). Бывшая британская колония (до 1997). Финансовый центр, порт, небоскрёбы, Виктория-Харбор, пик Виктория. «Одна страна — две системы» (сохраняет свою правовую систему).'],['сидней','Сидней — крупнейший город Австралии (5,5 млн). Оперный театр (вид на мост Харбор-Бридж), пляжи (Бонди, Мэнли). Порт, пляжи, солнечная погода. Столица штата Новый Южный Уэльс.'],['торонто','Торонто — крупнейший город Канады (6,4 млн). Столица провинции Онтарио. Си-Эн-Тауэр (CN Tower), Королевский музей Онтарио. Мультикультурализм, экономический центр.'],['чикаго','Чикаго — третий по величине город США (2,7 млн, с агломерацией — 9,6 млн). Ветряной город, небоскрёбы (Уиллис-Тауэр, бывшая Сирс-Тауэр), озеро Мичиган. Архитектура, пицца deep-dish, блюз.'],['буэнос-айрес','Буэнос-Айрес — столица Аргентины (3 млн, с агломерацией — 15 млн). Родина танго, район Ла-Бока (цветные дома), кладбище Реколета (могила Эвиты Перон). Европейская архитектура, широкие проспекты.'],['рио-де-жанейро','Рио-де-Жанейро — второй по величине город Бразилии (6,7 млн, с агломерацией — 13 млн). Статуя Христа-Искупителя на горе Корковаду, пляжи Копакабана и Ипанема, гора Сахарная Голова. Карнавал, самба.'],['лагос','Лагос — крупнейший город Нигерии (около 15 млн в агломерации, по разным оценкам). Экономический и финансовый центр. Перенаселён, пробки, контрасты богатства и нищеты. Бывшая столица (до 1991).'],['киншаса','Киншаса — столица Демократической Республики Конго (около 12 млн). Крупнейший франкоязычный город мира (опережая Париж). Прямо через реку Конго — Браззавиль (столица Республики Конго).'],['лима','Лима — столица Перу (около 10 млн). Расположена на побережье Тихого океана. Колониальная архитектура (монастырь Сан-Франциско). Гастрономическая столица Южной Америки (севиче).'],['богота','Богота — столица Колумбии (около 8 млн, с агломерацией — 11 млн). Расположена в Андах на высоте 2600 м. Музей золота, граффити, район Ла-Канделария.'],['сантьяго','Сантьяго — столица Чили (около 6 млн, с агломерацией — 7 млн). В долине, на фоне Анд. Площадь Конституции, музей изящных искусств, винодельни.'],['каракас','Каракас — столица Венесуэлы (около 3 млн, с агломерацией — 5 млн). Расположен в долине, недалеко от Карибского моря. Экономический кризис, гиперинфляция.'],['гавана','Гавана — столица Кубы (около 2,1 млн). Колониальная архитектура Старой Гаваны (объект Всемирного наследия ЮНЕСКО). Капитолий, малекон. Социалистическое государство, эмбарго США.'],['тегеран','Тегеран — столица Ирана (около 9 млн, с агломерацией — 15 млн). Расположен у подножия гор Эльбурс. Горы Тучал, дворец Голестан, Башня Азади. Проблемы смога.'],['багдад','Багдад — столица Ирака (около 8 млн). Расположен на реке Тигр. Древний центр исламской науки («Дом мудрости»). Разрушен войнами (вторжение 2003, ИГИЛ).'],['иерусалим','Иерусалим — столица Израиля (не признана многими странами, 970 тыс.). Священный город трёх религий: иудаизм (Стена Плача), христианство (Храм Гроба Господня), ислам (Купол Скалы, мечеть Аль-Акса).'],['афины','Афины — столица Греции (около 3 млн, с агломерацией — 3,7 млн). Колыбель демократии, философии (Сократ, Платон, Аристотель), театра. Акрополь (Парфенон), Агора, Национальный археологический музей.'],['гора','Гора — положительная форма рельефа, возвышающаяся над окружающей местностью. Имеет вершину, склоны и подножие. По высоте: низкие (до 1000 м), средние (1000-2000 м), высокие (более 2000 м).'],['равнина','Равнина — обширный участок земной поверхности с небольшими колебаниями высот (до 200 м). Бывают низменности (до 200 м), возвышенности (200-500 м) и плоскогорья (выше 500 м). Великая Китайская равнина, Западно-Сибирская равнина.'],['плоскогорье','Плоскогорье — обширная равнина с высотой более 500 м над уровнем моря, часто с глубокими долинами. Примеры: Среднесибирское плоскогорье, Тибетское нагорье (высота 4000-5000 м).'],['низменность','Низменность — равнина с абсолютной высотой не более 200 м над уровнем моря. Могут быть ниже уровня моря (Прикаспийская низменность, -28 м). Самые обширные: Амазонская, Западно-Сибирская, Прикаспийская.'],['возвышенность','Возвышенность — равнина с высотой от 200 до 500 м над уровнем моря. Примеры: Валдайская возвышенность (321 м), Среднерусская возвышенность (293 м).'],['плато','Плато — возвышенная равнина с ровной или волнистой поверхностью, чётко ограниченная уступами от соседних территорий. Примеры: плато Путорана (Россия), плато Колорадо (США).'],['холм','Холм — положительная форма рельефа с относительной высотой до 200 м, с пологими склонами. Курганы — искусственные холмы.'],['долина','Долина — вытянутое понижение рельефа (часто с рекой). Формы: V-образная (речная эрозия), корытообразная (ледниковая), террасовая. Пример: Йосемитская долина (США).'],['каньон','Каньон — глубокая речная долина с крутыми, часто отвесными склонами и узким дном. Примеры: Гранд-Каньон (река Колорадо, США, глубина 1600 м), каньон Маринер на Марсе.'],['ущелье','Ущелье — глубокая и узкая горная долина с почти отвесными склонами. Отличается от каньона меньшими размерами. Часто образовано трещиной в горах.'],['котловина','Котловина — замкнутое понижение рельефа. Бывают озёрные (Байкал), ледниковые (Финляндия), тектонические, карстовые. Впадина Дэд-Си (самое низкое место суши, -430 м).'],['хребет','Хребет — вытянутое поднятие рельефа с чётко выраженными склонами и гребнем. Примеры: Уральский хребет, Срединный хребет (Камчатка), Анды (длиннейший хребет мира).'],['пик','Пик — остроконечная вершина горы. Примеры: пик Коммунизма (7495 м, Таджикистан), пик Ленина (7134 м). Эверест (Джомолунгма) — высочайший пик мира (8848 м).'],['перевал','Перевал — понижение в гребне горного хребта, пригодное для перехода. Примеры: перевалы Кавказа (Крестовый перевал, 2384 м), перевал Дятлова (Северный Урал).'],['вулкан','Вулкан — геологическое образование, из которого на поверхность выходит магма, пепел, газы. Действующие (Этна, Ключевская сопка), уснувшие, потухшие. Самый высокий на суше — Охос-дель-Саладо (6893 м, Чили/Аргентина).'],['кратер','Кратер — чашеобразное или воронкообразное углубление на вершине вулкана (жерло). Также метеоритный кратер — результат падения метеорита (Аризонский кратер).'],['кальдера','Кальдера — обширная циркообразная котловина вулканического происхождения, образовавшаяся при провале вершины вулкана после извержения. Пример: кальдера Йеллоустоуна (США).'],['гейзер','Гейзер — горячий источник, периодически фонтанирующий паром и водой. Связан с вулканической деятельностью. Известные поля гейзеров: Йеллоустоун (США), Долина гейзеров (Камчатка), Исландия.'],['ледник','Ледник — многолетняя масса льда на суше, движущаяся под собственной тяжестью. Покровные (ледниковые щиты, Антарктида) и горные (Гималаи, Альпы). Ледниковый период — оледенение.'],['морена','Морена — скопление обломков горных пород (валуны, галька, песок), переносимое и откладываемое ледником. Бывает конечная, боковая, донная, срединная. Характерна для ландшафтов, подвергавшихся оледенению.'],['фьорд','Фьорд — узкий, глубокий, извилистый морской залив со скалистыми берегами, образованный ледником. Самые знаменитые — в Норвегии (Согне-фьорд), Новой Зеландии, Чили, Аляске.'],['айсберг','Айсберг — крупный свободно плавающий кусок льда в океане или море, отколовшийся от ледника. Над водой видно только 1/10 часть (лед менее плотный). Опасны для судоходства («Титаник» 1912).'],['пустыня','Пустыня — территория с крайне засушливым климатом (осадки <250 мм/год). Крупнейшие: Сахара (Африка), Антарктическая пустыня (холодная). Растительность скудная, животные ведут ночной образ жизни.'],['бархан','Бархан — серповидная форма рельефа из песка, характерная для пустынь с преобладанием ветров одного направления. «Рога» направлены по ветру. Высота до 150-200 м.'],['оазис','Оазис — островок зелени в пустыне вокруг источника воды (родник, колодец). Финиковые пальмы — источник пищи. Караванные пути веками связывали оазисы (Великий шёлковый путь).'],['степь','Степь — безлесная равнина умеренного пояса с травянистой растительностью (ковыль, типчак). Чернозёмы — самые плодородные почвы. Евразийская степь, прерии (Северная Америка), пампасы (Южная Америка).'],['прерия','Прерия — североамериканская степь с высокими травами (до 2 м). Зона между лесами и пустынями. Основной сельскохозяйственный регион США (кукуруза, пшеница).'],['саванна','Саванна — тропическая степь с отдельными деревьями (баобабы, акации) и кустарниками. Два сезона: влажный (лето) и сухой (зима). Африканская саванна — место обитания слонов, жирафов, львов.'],['сельва','Сельва — влажные экваториальные леса Южной Америки (бассейн Амазонки). Самое большое биоразнообразие на планете. Ярусы деревьев (до 60 м), эпифиты, лианы. Дожди почти ежедневно.'],['тайга','Тайга — крупнейшая природная зона Земли (хвойные леса севера). Занимает 10% суши (Россия, Канада, Скандинавия). Деревья: ель, сосна, лиственница, пихта, сибирский кедр. Дремучие леса.'],['тундра','Тундра — безлесная зона за полярным кругом. Вечная мерзлота (грунт не оттаивает). Растительность: мхи, лишайники (ягель — олений мох), карликовые кустарники (берёза, ива). Летом — царство комаров.'],['лесотундра','Лесотундра — переходная зона между тундрой и тайгой. Редкостойные леса (лиственница, берёза) чередуются с участкам
