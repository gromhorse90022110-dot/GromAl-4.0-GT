поля.'],['проводник','Проводник — вещество, в котором есть свободные заряды, способные перемещаться под действием электрического поля (металлы, электролиты).'],['диэлектрик','Диэлектрик (изолятор) — вещество, в котором свободные заряды практически отсутствуют. Не проводит электрический ток.'],['полупроводник','Полупроводник — вещество, занимающее промежуточное положение между проводником и диэлектриком. Примеси сильно меняют его проводимость.'],['сверхпроводник','Сверхпроводник — материал, у которого электрическое сопротивление полностью исчезает ниже критической температуры. Открыт Камерлинг-Оннесом.'],['напряжение','Напряжение — работа электрического поля по перемещению единичного заряда. Измеряется в вольтах (В). Напряжение в розетке 220 В.'],['сопротивление','Электрическое сопротивление — свойство проводника препятствовать прохождению тока. Измеряется в омах (Ом). Зависит от материала, длины и сечения.'],['сила тока','Сила тока — количество заряда, проходящего через поперечное сечение проводника за 1 секунду. Измеряется в амперах (А).'],['мощность','Электрическая мощность — работа электрического тока за единицу времени. P = U·I = I²R = U²/R. Измеряется в ваттах (Вт).'],['конденсатор','Конденсатор — устройство для накопления электрического заряда, состоящее из двух проводников (обкладок), разделённых диэлектриком.'],['индуктивность','Индуктивность — свойство проводника с током создавать магнитный поток. Измеряется в генри (Гн). Катушка индуктивности — элемент электрической цепи.'],['трансформатор','Трансформатор — устройство для изменения напряжения переменного тока. Состоит из двух обмоток на общем магнитопроводе.'],['генератор','Генератор — устройство, преобразующее механическую энергию в электрическую. Работает на основе электромагнитной индукции.'],['электродвигатель','Электродвигатель — устройство, преобразующее электрическую энергию в механическую (вращение вала под действием магнитного поля).'],['катушка','Катушка индуктивности — винтовая спираль из провода. Создаёт магнитное поле при протекании тока и препятствует его изменению.'],['реостат','Реостат — переменный резистор для плавного регулирования силы тока в цепи. Изменяет сопротивление перемещением ползунка.'],['потенциометр','Потенциометр — переменный резистор, используемый как делитель напряжения для регулировки выходного напряжения.'],['вольтметр','Вольтметр — прибор для измерения напряжения. Подключается параллельно участку цепи. Идеальный вольтметр имеет бесконечное сопротивление.'],['амперметр','Амперметр — прибор для измерения силы тока. Подключается последовательно в цепь. Идеальный амперметр имеет нулевое сопротивление.'],['омметр','Омметр — прибор для измерения электрического сопротивления. Работает по закону Ома, пропуская через измеряемый резистор известный ток.'],['мультиметр','Мультиметр (тестер) — комбинированный прибор, измеряющий напряжение, ток, сопротивление и другие параметры электрических цепей.'],['электросеть','Электрическая сеть — совокупность устройств и линий для передачи и распределения электроэнергии от источника к потребителям.'],['постоянный ток','Постоянный ток (DC) — электрический ток, не меняющий своего направления и силы во времени. Пример: ток от батарейки.'],['переменный ток','Переменный ток (AC) — ток, периодически меняющий направление и величину по синусоидальному закону. В розетке частота 50 Гц.'],['частота','Частота переменного тока — число полных циклов изменения тока за 1 секунду. Измеряется в герцах (Гц). В России стандарт 50 Гц.'],['фаза','Фаза — аргумент синусоидальной функции, определяющий мгновенное значение тока или напряжения в данный момент времени.'],['импеданс','Импеданс — полное электрическое сопротивление в цепи переменного тока, учитывающее активное, индуктивное и ёмкостное сопротивления.'],['активное сопротивление','Активное сопротивление — часть полного сопротивления, на которой электрическая энергия превращается в теплоту (резисторы, провода).'],['реактивное сопротивление','Реактивное сопротивление — сопротивление, обусловленное индуктивностью и ёмкостью. Не выделяет тепла, а запасает энергию в полях.'],['полное сопротивление','Полное сопротивление (импеданс) — векторная сумма активного и реактивного сопротивлений. Z = √(R² + X²).'],['резонанс','Резонанс в электрической цепи — резкое возрастание амплитуды тока или напряжения при совпадении частоты источника с собственной частотой контура.'],['электромагнит','Электромагнит — устройство, создающее магнитное поле при протекании тока через катушку с железным сердечником. Магнитное поле исчезает при отключении тока.'],['постоянный магнит','Постоянный магнит — тело, сохраняющее намагниченность длительное время без внешнего магнитного поля. Пример: неодимовый магнит.'],['ферромагнетик','Ферромагнетик — вещество с сильными магнитными свойствами (железо, никель, кобальт). Может быть постоянно намагничено.'],['парамагнетик','Парамагнетик — вещество, слабо намагничивающееся по направлению внешнего магнитного поля. После выключения поля намагниченность исчезает.'],['диамагнетик','Диамагнетик — вещество, намагничивающееся против направления внешнего магнитного поля. Пример: вода, медь, висмут.'],['домен','Домен — микроскопическая область в ферромагнетике, где магнитные моменты атомов направлены одинаково. Домены определяют намагниченность материала.'],['гистерезис','Гистерезис — запаздывание изменения намагниченности ферромагнетика от изменения внешнего магнитного поля. Проявляется в виде петли гистерезиса.'],['магнитный поток','Магнитный поток — величина, равная произведению магнитной индукции на площадь контура и косинус угла между ними. Единица — вебер (Вб).'],['индукция','Магнитная индукция — силовая характеристика магнитного поля, показывающая силу, с которой поле действует на движущийся заряд. Единица — тесла (Тл).'],['самоиндукция','Самоиндукция — возникновение ЭДС индукции в катушке при изменении силы тока в ней самой. Противодействует изменению тока.'],['взаимоиндукция','Взаимоиндукция — возникновение ЭДС индукции в одной катушке при изменении тока в другой, расположенной рядом. Основа работы трансформатора.'],['вихревые токи','Вихревые токи (токи Фуко) — индукционные токи, возникающие в массивных проводниках при изменении магнитного поля. Вызывают нагрев и потери энергии.'],['скин-эффект','Скин-эффект — явление вытеснения переменного тока к поверхности проводника на высоких частотах. Эффективное сечение проводника уменьшается.'],['диэлектрическая проницаемость','Диэлектрическая проницаемость — величина, показывающая, во сколько раз электрическое поле в веществе слабее, чем в вакууме. Характеризует поляризацию диэлектрика.'],['магнитная проницаемость','Магнитная проницаемость — величина, показывающая, во сколько раз магнитное поле в веществе сильнее, чем в вакууме. Характеризует намагничивание материала.'],['электродвижущая сила','ЭДС — работа сторонних сил по перемещению единичного положительного заряда внутри источника тока. Измеряется в вольтах (В).'],['короткое замыкание','Короткое замыкание — соединение двух точек цепи с разными потенциалами через очень малое сопротивление. Возникает сверхток, опасный для проводки.'],['предохранитель','Предохранитель — устройство для защиты цепи от перегрузки и короткого замыкания. Плавкая вставка перегорает при превышении тока.'],['волновая функция','Волновая функция (Ψ) — основная характеристика квантовой системы, описывающая её состояние. Квадрат модуля Ψ² даёт вероятность нахождения частицы.'],['суперпозиция','Суперпозиция — свойство квантовых систем находиться одновременно во всех возможных состояниях, пока не произведено измерение. Кот Шрёдингера одновременно жив и мёртв.'],['запутанность','Квантовая запутанность — явление, при котором состояния двух или более частиц связаны так, что измерение одной мгновенно определяет состояние другой, независимо от расстояния.'],['туннелирование','Туннельный эффект — квантовое явление прохождения частицы сквозь потенциальный барьер, который она не могла бы преодолеть по законам классической физики.'],['корпускулярно-волновой дуализм','Корпускулярно-волновой дуализм — универсальное свойство микрообъектов (электронов, фотонов) проявлять одновременно свойства частиц и волн.'],['принцип неопределённости','Принцип неопределённости Гейзенберга — невозможность одновременно точно измерить координату и импульс частицы. Δx·Δp ≥ ħ/2.'],['уравнение шрёдингера','Уравнение Шрёдингера — основное уравнение нерелятивистской квантовой механики, описывающее изменение волновой функции во времени.'],['матрица плотности','Матрица плотности — математический оператор для описания квантовых систем в смешанном состоянии (неполная информация о системе).'],['наблюдаемая','Наблюдаемая — физическая величина, которую можно измерить в квантовой системе (энергия, импульс, координата). В квантовой механике описывается оператором.'],['оператор','Оператор — математический объект, действующий на волновую функцию и соответствующий физической наблюдаемой. Результат действия — собственное значение.'],['собственное значение','Собственное значение — число, которое получается при действии оператора на собственную волновую функцию. Это возможный результат измерения физической величины.'],['квантовое число','Квантовое число — целое или полуцелое число, определяющее возможные значения физических величин в квантовой системе (энергию, момент импульса).'],['энергетический уровень','Энергетический уровень — дискретное значение энергии, которое может иметь квантовая система (атом, молекула). Переходы возможны только между уровнями.'],['основное состояние','Основное состояние — состояние квантовой системы с наименьшей возможной энергией. Атом в основном состоянии устойчив и не излучает.'],['возбуждённое состояние','Возбуждённое состояние — состояние квантовой системы с энергией выше основной. Атом в возбуждённом состоянии нестабилен и может самопроизвольно перейти в основное, излучив фотон.'],['квантовый переход','Квантовый переход — скачкообразный переход квантовой системы с одного энергетического уровня на другой. Сопровождается поглощением или испусканием кванта энергии.'],['вероятность','Вероятность в квантовой механике — квадрат модуля волновой функции, определяющий шанс обнаружить частицу в данной точке пространства.'],['амплитуда вероятности','Амплитуда вероятности — комплексная величина (волновая функция), квадрат модуля которой даёт вероятность. Может интерферировать (в отличие от самой вероятности).'],['коллапс волновой функции','Коллапс волновой функции — мгновенное изменение квантового состояния при измерении. Суперпозиция схлопывается в одно определённое состояние.'],['декогеренция','Декогеренция — процесс потери квантовой когерентности системой при взаимодействии с окружающей средой. Объясняет переход от квантового к классическому поведению.'],['интерференция','Квантовая интерференция — явление, при котором амплитуды вероятностей складываются или вычитаются, создавая характерную волновую картину даже для отдельных частиц.'],['дифракция','Квантовая дифракция — отклонение потока частиц (электронов, нейтронов) от прямолинейного распространения при прохождении через щели или кристаллы. Подтверждает волновые свойства.'],['комптоновское рассеяние','Комптоновское рассеяние — упругое рассеяние фотона на свободном электроне. Длина волны фотона увеличивается, что подтверждает корпускулярные свойства света.'],['фотоэффект','Фотоэффект — выбивание электронов из вещества под действием света. Объяснён Эйнштейном: свет поглощается порциями (квантами) с энергией E = hν.'],['дуализм','Дуализм в квантовой физике — наличие у микрообъектов одновременно волновых и корпускулярных свойств. Проявляется в зависимости от экспериментальной установки.'],['постоянная Планка','Постоянная Планка (h) — фундаментальная константа, квант действия. h = 6,626×10⁻³⁴ Дж·с. Часто используют ħ = h/2π.'],['квантование','Квантование — дискретность физических величин в микромире. Энергия, момент импульса, заряд могут принимать только определённые порции (кванты).'],['фокус','Фокус — точка на оптической оси, в которой собираются параллельные лучи после прохождения линзы или отражения от зеркала.'],['гармонический осциллятор','Гармонический осциллятор — квантовая система, совершающая малые колебания около положения равновесия. Энергия квантуется: En = ħω(n+1/2).'],['потенциальная яма','Потенциальная яма — область пространства с пониженной потенциальной энергией, где частица может находиться в связанных состояниях с дискретным спектром энергий.'],['потенциальный барьер','Потенциальный барьер — область повышенной потенциальной энергии, разделяющая две области пространства. Частица может преодолеть его квантовым туннелированием.'],['блоховская волна','Блоховская волна — волновая функция электрона в периодическом потенциале кристаллической решётки. Имеет вид плоской волны, модулированной периодической функцией.'],['зона Бриллюэна','Зона Бриллюэна — элементарная ячейка в обратном пространстве кристалла, содержащая все разрешённые значения волнового вектора электрона.'],['квантовая электродинамика','КЭД — квантовая теория электромагнитного взаимодействия. Описывает взаимодействие фотонов с заряженными частицами (электронами, позитронами).'],['виртуальные частицы','Виртуальные частицы — частицы-переносчики взаимодействия, существующие в промежуточных состояниях в ничтожно малые доли времени. Их энергия и импульс не связаны обычным законом E = mc².'],['поляризация вакуума','Поляризация вакуума — квантово-электродинамический эффект рождения и аннигиляции виртуальных пар частица-античастица в вакууме, что приводит к экранированию заряда.'],['лэмбовский сдвиг','Лэмбовский сдвиг — очень малое смещение энергетических уровней атома водорода относительно предсказаний уравнения Дирака. Объясняется взаимодействием электрона с виртуальными фотонами.'],['казимировский эффект','Эффект Казимира — притяжение двух незаряженных проводящих пластин в вакууме из-за давления виртуальных фотонов, длина волны которых ограничена зазором между пластинами.'],['квантовая хромодинамика','КХД — квантовая теория сильного взаимодействия. Описывает взаимодействие кварков и глюонов, несущих цветовой заряд. Объясняет удержание кварков внутри адронов (конфайнмент).'],['конфайнмент','Конфайнмент (удержание) — свойство сильного взаимодействия, не позволяющее кваркам существовать в свободном состоянии. Кварки «заперты» внутри адронов.'],['асимптотическая свобода','Асимптотическая свобода — свойство сильного взаимодействия: на малых расстояниях (при высоких энергиях) кварки взаимодействуют всё слабее, почти как свободные частицы.'],['слабое взаимодействие','Слабое взаимодействие — одно из четырёх фундаментальных, ответственное за бета-распад и другие превращения частиц. Переносится W и Z бозонами.'],['электрослабое взаимодействие','Электрослабое взаимодействие — единая теория, объединяющая электромагнитное и слабое взаимодействия при высоких энергиях (выше 100 ГэВ).'],['бозон хиггса','Бозон Хиггса — элементарная частица, отвечающая за механизм появления массы у других частиц. Открыта на Большом адронном коллайдере в 2012 году.'],['поле Хиггса','Поле Хиггса — фундаментальное поле, пронизывающее всё пространство. Взаимодействие частиц с этим полем придаёт им массу. Бозон Хиггса — квант этого поля.'],['спонтанное нарушение симметрии','Спонтанное нарушение симметрии — явление, при котором симметричные уравнения имеют несимметричные решения. Объясняет появление масс у W и Z бозонов в теории электрослабого взаимодействия.'],['суперсимметрия','Суперсимметрия — гипотетическая симметрия между фермионами (частицами материи) и бозонами (переносчиками взаимодействий). Предсказывает для каждой известной частицы суперпартнёра.'],['квантовый компьютер','Квантовый компьютер — вычислительное устройство, использующее кубиты и принципы квантовой механики (суперпозицию, запутанность) для решения задач, недоступных классическим компьютерам.'],['кубит','Кубит (квантовый бит) — элементарная единица информации в квантовом компьютере. Может находиться в суперпозиции состояний |0⟩ и |1⟩ одновременно.'],['гейт','Квантовый гейт (вентиль) — элементарная операция над одним или несколькими кубитами. Аналог логических элементов в классических компьютерах.'],['квантовая телепортация','Квантовая телепортация — передача квантового состояния частицы на расстояние с помощью запутанной пары и классического канала связи. Сама частица не перемещается.'],['изотоп','Изотопы — разновидности атомов одного химического элемента с одинаковым числом протонов, но разным числом нейтронов в ядре.'],['нуклон','Нуклон — общее название для протонов и нейтронов — частиц, из которых состоит атомное ядро.'],['дейтрон','Дейтрон — ядро тяжёлого водорода (дейтерия), состоящее из одного протона и одного нейтрона. Стабильная частица.'],['тритий','Тритий — радиоактивный изотоп водорода с ядром из одного протона и двух нейтронов. Период полураспада около 12,3 года.'],['альфа-частица','Альфа-частица — ядро атома гелия-4, состоящее из двух протонов и двух нейтронов. Испускается при альфа-распаде тяжёлых ядер.'],['бета-распад','Бета-распад — тип радиоактивного распада, при котором нейтрон в ядре превращается в протон с испусканием электрона и антинейтрино (или наоборот).'],['гамма-излучение','Гамма-излучение — коротковолновое электромагнитное излучение с очень высокой энергией, испускаемое возбуждёнными атомными ядрами.'],['позитронный распад','Позитронный распад (β⁺-распад) — тип бета-распада, при котором протон в ядре превращается в нейтрон с испусканием позитрона и нейтрино.'],['электронный захват','Электронный захват (K-захват) — ядро захватывает электрон с ближайшей оболочки (K-оболочки), протон превращается в нейтрон с испусканием нейтрино.'],['период полураспада','Период полураспада — время, за которое распадается половина исходного количества радиоактивных ядер. Характеристика каждого радиоактивного изотопа.'],['активность','Радиоактивная активность — число распадов в радиоактивном источнике за единицу времени. Измеряется в беккерелях (Бк) или кюри (Ки).'],['цепная реакция','Ядерная цепная реакция — самоподдерживающаяся реакция деления ядер, при которой нейтроны, испущенные при одном акте деления, вызывают деление следующих ядер.'],['критическая масса','Критическая масса — минимальная масса делящегося вещества, при котором цепная реакция становится самоподдерживающейся. Для урана-235 около 52 кг.'],['деление ядра','Деление ядра — процесс расщепления тяжёлого ядра (урана, плутония) на два более лёгких ядра при захвате нейтрона, сопровождающийся выделением энергии и нейтронов.'],['синтез ядра','Термоядерный синтез — процесс слияния лёгких ядер (водорода, гелия) в более тяжёлые, сопровождающийся выделением огромной энергии. Источник энергии звёзд.'],['термоядерная реакция','Термоядерная реакция — реакция слияния лёгких атомных ядер, протекающая при сверхвысоких температурах (миллионы градусов). Требует преодоления кулоновского барьера.'],['tokamak','Токамак — тороидальная установка для магнитного удержания плазмы с целью управляемого термоядерного синтеза. Название от «тороидальная камера с магнитными катушками».'],['плазма','Плазма — четвёртое агрегатное состояние вещества, представляющее собой полностью или частично ионизированный газ. Состоит из свободных электронов и ионов.'],['ускоритель','Ускоритель заряженных частиц — устройство для разгона элементарных частиц до высоких энергий с помощью электрических и магнитных полей.'],['коллайдер','Коллайдер — тип ускорителя, в котором встречные пучки частиц сталкиваются друг с другом, обеспечивая максимальную энергию столкновения.'],['мишень','Мишень в ядерной физике — вещество, облучаемое пучком частиц (протонов, электронов, нейтронов) для изучения ядерных реакций.'],['детектор','Детектор элементарных частиц — прибор для регистрации и измерения свойств частиц (энергии, импульса, заряда, массы).'],['радионуклид','Радионуклид — радиоактивный изотоп, ядра которого нестабильны и самопроизвольно распадаются с испусканием излучения. Примеры: уран-238, йод-131.'],['ядерный реактор','Ядерный реактор — устройство для осуществления управляемой цепной реакции деления ядер. Преобразует ядерную энергию в тепловую для выработки электричества.'],['замедлитель','Замедлитель нейтронов — вещество (вода, графит, тяжёлая вода), снижающее скорость быстрых нейтронов до тепловых для повышения вероятности деления урана-235.'],['поглотитель','Поглотитель нейтронов — вещество (кадмий, бор), эффективно захватывающее нейтроны. Используется в регулирующих стержнях ядерного реактора для управления мощностью.'],['теплоноситель','Теплоноситель — жидкость или газ (вода, натрий, гелий), отводящий тепло от активной зоны ядерного реактора к турбине или парогенератору.'],['отражатель','Отражатель нейтронов — слой материала (графит, бериллий), окружающий активную зону реактора и возвращающий часть вылетающих нейтронов обратно.'],['обогащение урана','Обогащение урана — технологический процесс увеличения концентрации изотопа уран-235 в природном уране (с 0,7% до 3-5% для реакторов или до 90% для оружия).'],['ядерное топливо','Ядерное топливо — материал, содержащий делящиеся изотопы (уран-235, плутоний-239), использующийся в ядерных реакторах для поддержания цепной реакции.'],['отработанное топливо','Отработанное ядерное топливо — топливо, выгруженное из реактора после использования. Содержит радиоактивные продукты деления и требует длительного хранения.'],['радиационная защита','Радиационная защита — комплекс мер для уменьшения облучения людей и окружающей среды. Принципы: время, расстояние, экранирование (свинец, бетон).'],['радиоактивные отходы','Радиоактивные отходы (РАО) — материалы, содержащие радионуклиды и не подлежащие дальнейшему использованию. Требуют изоляции на сотни и тысячи лет.'],['дезактивация','Дезактивация — удаление радиоактивных загрязнений с поверхностей, оборудования, одежды или кожи. Методы: мытьё, механическая очистка, химическая обработка.'],['мгновенные нейтроны','Мгновенные нейтроны — нейтроны, испускаемые ядром непосредственно в момент деления (за время менее 10⁻¹⁴ с). Составляют основную массу нейтронов деления.'],['запаздывающие нейтроны','Запаздывающие нейтроны — нейтроны, испускаемые продуктами деления через некоторое время (от долей секунд до минут). Именно они делают возможным управление реактором.'],['сечение реакции','Сечение реакции — эффективная площадь взаимодействия частицы с ядром. Измеряется в барнах (1 барн = 10⁻²⁸ м²). Характеризует вероятность взаимодействия.'],['резонансный захват','Резонансный захват — интенсивное поглощение нейтрона ядром при определённых (резонансных) энергиях, когда сечение захвата резко возрастает.'],['быстрые нейтроны','Быстрые нейтроны — нейтроны с высокой энергией (более 0,1 МэВ, обычно 1-14 МэВ). Вызывают деление урана-238 и используются в быстрых реакторах.'],['тепловые нейтроны','Тепловые нейтроны — нейтроны, находящиеся в тепловом равновесии со средой (энергия около 0,025 эВ). Наиболее эффективно вызывают деление урана-235.'],['водородная бомба','Водородная (термоядерная) бомба — оружие, основанное на неконтролируемой реакции синтеза лёгких ядер (дейтерия и трития). Мощность может достигать мегатонн в тротиловом эквиваленте.'],['нейтронная бомба','Нейтронная бомба — разновидность ядерного оружия с усиленным выходом быстрых нейтронов. Поражает живую силу при относительно малых разрушениях зданий.'],['трансурановые элементы','Трансурановые элементы — химические элементы с атомным номером больше 92 (урана). Все они радиоактивны и не встречаются в природе в заметных количествах. Примеры: нептуний, плутоний, америций.'],['инвариант','Инвариант — величина, не меняющаяся при преобразованиях системы координат или отсчёта. В релятивистской физике интервал между событиями является инвариантом.'],['собственное время','Собственное время — время, измеренное часами, движущимися вместе с телом. Это наименьший промежуток времени между двумя событиями в системе отсчёта, где они произошли в одной точке.'],['замедление времени','Замедление времени — релятивистский эффект, при котором время в движущейся системе отсчёта течёт медленнее, чем в неподвижной. Δt = Δt₀/√(1 - v²/c²).'],['сокращение длины','Сокращение (лоренцево) длины — уменьшение длины движущегося тела в направлении движения. L = L₀·√(1 - v²/c²). Максимально проявляется при скоростях, близких к световой.'],['преобразования лоренца','Преобразования Лоренца — формулы, связывающие координаты и время события в разных инерциальных системах отсчёта. Учитывают конечность скорости света.'],['мировая линия','Мировая линия — линия в пространстве-времени, описывающая движение частицы. Каждая точка мировой линии — событие (координаты x, y, z, t).'],['световой конус','Световой конус — область пространства-времени, содержащая все события, которые могут быть причинно связаны с данным событием (прошлое) или на которые оно может повлиять (будущее).'],['причинность','Причинность — принцип, согласно которому причина всегда предшествует следствию. В теории относительности причинная связь возможна только внутри светового конуса.'],['одновременность','Одновременность — относительное понятие в теории относительности. Два события, одновременные в одной системе отсчёта, могут быть неодновременными в другой.'],['интервал','Пространственно-временной интервал — релятивистский инвариант между двумя событиями: s² = c²Δt² - Δx² - Δy² - Δz². Одинаков во всех системах отсчёта.'],['пространство Минковского','Пространство Минковского — четырёхмерное псевдоевклидово пространство, объединяющее три пространственные координаты и время как четвёртую координату.'],['четырёхвектор','Четырёхвектор — вектор в пространстве-времени Минковского, имеющий четыре компоненты. Примеры: четырёхскорость, четырёхимпульс.'],['энергия покоя','Энергия покоя — энергия, которой обладает тело в состоянии покоя. E₀ = mc². Колоссальная энергия, заключённая даже в малой массе (1 г ~ 90 трлн джоулей).'],['релятивистская масса','Релятивистская масса — устаревшее понятие, обозначавшее зависимость массы тела от скорости: m = m₀/√(1 - v²/c²). В современной физике предпочитают говорить об энергии.'],['скорость света','Скорость света в вакууме — фундаментальная физическая постоянная c = 299 792 458 м/с. Максимальная скорость передачи информации и движения материальных тел.'],['предел скорости','Предел скорости — согласно теории относительности, ни одно материальное тело не может достичь скорости света. Для этого потребовалась бы бесконечная энергия.'],['общая теория относительности','ото — геометрическая теория гравитации Эйнштейна, описывающая гравитацию как искривление пространства-времени массивными телами.'],['специальная теория относительности','сто — теория относительности для инерциальных систем отсчёта. Постулирует постоянство скорости света и независимость физических законов от выбора системы отсчёта.'],['гравитационное линзирование','Гравитационное линзирование — искривление лучей света массивными телами (галактиками, чёрными дырами), создающее искажённые или кратные изображения далёких источников.'],['гравитационное красное смещение','Гравитационное красное смещение — уменьшение частоты (увеличение длины волны) света при выходе из гравитационной ямы. Подтверждено экспериментально с помощью атомных часов.'],['гравитационные волны','Гравитационные волны — рябь пространства-времени, порождаемая ускоряющимися массивными телами (слиянием чёрных дыр). Впервые зарегистрированы LIGO в 2015 году.'],['горизонт событий','Горизонт событий — граница чёрной дыры, за которой гравитация настолько сильна, что даже свет не может вырваться наружу. Информация из-за горизонта недоступна.'],['сингулярность','Сингулярность — область в центре чёрной дыры, где плотность и кривизна пространства-времени становятся бесконечными. Законы физики там перестают работать.'],['машина времени','Машина времени — гипотетическое устройство для путешествий в прошлое или будущее. Путешествие в будущее реально (замедление времени), в прошлое — под вопросом.'],['кротовая нора','Кротовая нора (червоточина) — гипотетический туннель в пространстве-времени, соединяющий удалённые области Вселенной или разные вселенные.'],['эргосфера','Эргосфера — область вокруг вращающейся чёрной дыры, где пространство-время увлекается во вращение. Из эргосферы можно извлечь энергию (процесс пенроуза).'],['излучение Хокинга','Излучение Хокинга — гипотетическое квантовое излучение чёрных дыр, вызванное рождением виртуальных частиц у горизонта событий. Приводит к постепенному испарению чёрной дыры.'],['детектор LIGO','LIGO — лазерно-интерферометрическая гравитационно-волновая обсерватория в США. В 2015 году впервые зарегистрировала гравитационные волны от слияния чёрных дыр.'],['эксперимент хафеле-китинга','Эксперимент Хафеле-Китинга (1971) — перевозка атомных часов на самолётах вокруг Земли. Подтвердил замедление времени и влияние гравитации на темп времени.'],['парадокс близнецов','Парадокс близнецов — мысленный эксперимент: брат-путешественник возвращается моложе земного близнеца из-за замедления времени. Кажущееся противоречие разрешается неинерциальностью путешественника.'],['эйнштейновское искривление','Искривление пространства-времени — центральное понятие ОТО: массивные тела изменяют геометрию пространства-времени, что воспринимается как гравитация.'],['метрика','Метрика — математическая величина, определяющая способ измерения расстояний и промежутков времени в искривлённом пространстве-времени.'],['тензор','Тензор — математический объект, используемый в ОТО для описания гравитационного поля (тензор Риччи, тензор кривизны, метрический тензор).'],['геодезическая','Геодезическая — линия кратчайшего расстояния в искривлённом пространстве-времени. По геодезическим движутся свободные тела в гравитационном поле.'],['принцип эквивалентности','Принцип эквивалентности Эйнштейна — неразличимость гравитации и ускорения в малой области пространства. Лёг в основу общей теории относительности.'],['космологическая постоянная','Космологическая постоянная (Λ) — член в уравнениях Эйнштейна, ответственный за ускоренное расширение Вселенной. Соответствует тёмной энергии.'],['тёмная энергия','Тёмная энергия — загадочная форма энергии, составляющая около 68% Вселенной и вызывающая ускоренное расширение космоса. Природа неизвестна.'],['ускоренное расширение','Ускоренное расширение Вселенной — открытие 1998 года (Нобелевская премия 2011). Галактики удаляются от нас со всё возрастающей скоростью из-за тёмной энергии.'],['сверхновая типа Ia','Сверхновая типа Ia — взрыв белого карлика в двойной системе. Используется как стандартная свеча для измерения космических расстояний (открытие ускоренного расширения).'],['нейтронная звезда','Нейтронная звезда — сверхплотный остаток массивной звезды после взрыва сверхновой. Масса как у Солнца, диаметр всего 20-30 км, состоит из нейтронов.'],['пульсар','Пульсар — быстро вращающаяся нейтронная звезда, испускающая узкие пучки радиоизлучения. Период вращения от миллисекунд до секунд.'],['квазар','Квазар — активное ядро далёкой галактики, питающееся сверхмассивной чёрной дырой. Светит ярче всей галактики, виден на расстоянии миллиардов световых лет.'],['реликтовое излучение','Реликтовое излучение — микроволновое фоновое излучение, оставшееся от ранней Вселенной (через 380 000 лет после Большого взрыва). Температура около 2,7 К.'],['большой взрыв','Большой взрыв — космологическая теория происхождения Вселенной около 13,8 млрд лет назад из сингулярного состояния. Вселенная расширяется и остывает до сих пор.'],['инфляция','Космологическая инфляция — фаза сверхбыстрого экспоненциального расширения Вселенной в первые доли секунды после Большого взрыва.'],['мультивселенная','Мультивселенная — гипотетическое множество параллельных вселенных, каждая со своими физическими законами и константами. Вытекает из теории инфляции и квантовой механики.'],['брана','Брана (мембрана) — многомерный объект в теории струн. Наша Вселенная может быть 3-браной, плавающей в многомерном пространстве (балке).'],['теория струн','Теория струн — кандидат на «теорию всего», где фундаментальные частицы — не точки, а одномерные колеблющиеся струны. Требует 10 или 11 измерений.'],['меркурий','Меркурий — ближайшая к Солнцу планета, самая маленькая. Дневная температура до +430°C, ночью до -180°C. Год длится 88 земных дней.'],['венера','Венера — вторая планета от Солнца, самая горячая (+470°C) из-за парникового эффекта. Вращается в обратную сторону. Атмосфера из CO₂ с облаками серной кислоты.'],['земля','Земля — третья планета от Солнца, единственная известная обитаемая. Имеет жидкую воду, атмосферу с кислородом, магнитное поле. Спутник — Луна.'],['марс','Марс — красная планета, четвёртая от Солнца. Вулкан Олимп (26 км) — высочайшая гора в Солнечной системе. Атмосфера разрежена, есть полярные шапки из льда.'],['юпитер','Юпитер — крупнейшая планета, газовый гигант. Масса больше всех остальных планет вместе. Большое красное пятно — гигантский шторм, бушующий веками.'],['сатурн','Сатурн — шестая планета, газовый гигант. Знаменит системой колец из льда и пыли. Плотность меньше плотности воды — мог бы плавать в океане.'],['Уран','Уран — седьмая планета, ледяной гигант. Вращается «лёжа на боку» (ось наклонена на 98°). Открыт Уильямом Гершелем в 1781 году.'],['нептун','Нептун — восьмая планета, ледяной гигант. Самые сильные ветры в Солнечной системе (до 2100 км/ч). Открыт математически по возмущениям орбиты Урана.'],['плутон','Плутон — карликовая планета в поясе Койпера, лишён статуса планеты в 2006 году. Имеет пять спутников, крупнейший — Харон.'],['церера','Церера — карликовая планета в поясе астероидов между Марсом и Юпитером. Крупнейший объект пояса астероидов (диаметр около 940 км).'],['эрида','Эрида — карликовая планета за орбитой Плутона, крупнее Плутона по массе. Открыта в 2005 году, спровоцировала пересмотр определения планеты.'],['Макемаке','Макемаке — карликовая планета в поясе Койпера. Названа в честь бога-творца из мифологии острова Пасхи. Открыта в 2005 году.'],['хаумеа','Хаумеа — карликовая планета в поясе Койпера, вытянутой формы из-за быстрого вращения. Имеет два спутника и кольца (открыты в 2017 году).'],['экзопланета','Экзопланета — планета, находящаяся за пределами Солнечной системы. Открыто более 5500 экзопланет (на 2024 год). Многие вращаются вокруг других звёзд.'],['газовый гигант','Газовый гигант — большая планета, состоящая в основном из водорода и гелия. Примеры: Юпитер, Сатурн. Не имеют твёрдой поверхности.'],['ледяной гигант','Ледяной гигант — тип планеты, богатой летучими веществами (водой, аммиаком, метаном). Примеры: Уран, Нептун. Мантия из горячих льдов.'],['каменная планета','Каменная (землеподобная) планета — планета, состоящая в основном из силикатных пород и металлов. Примеры: Земля, Марс, Венера, Меркурий.'],['суперземля','Суперземля — экзопланета с массой больше земной (до 10 масс Земли), но значительно меньше газовых гигантов. Может быть каменной или водной.'],['горячий юпитер','Горячий юпитер — экзопланета, похожая на Юпитер по массе, но вращающаяся очень близко к своей звезде (период менее 10 дней). Температура может превышать 1000°C.'],['атмосфера','Атмосфера планеты — газовая оболочка, удерживаемая гравитацией. У Земли — азот и кислород, у Венеры и Марса — углекислый газ, у Юпитера — водород и гелий.'],['магнитосфера','Магнитосфера — область пространства вокруг планеты, где магнитное поле доминирует над солнечным ветром. Защищает атмосферу от космического излучения.'],['ионосфера','Ионосфера — верхний слой атмосферы (50-1000 км), ионизированный солнечным излучением. Отражает радиоволны, обеспечивая дальнюю радиосвязь.'],['литосфера','Литосфера — твёрдая внешняя оболочка планеты, включающая кору и верхнюю часть мантии. Разбита на тектонические плиты.'],['ядро','Ядро планеты — центральная часть, обычно металлическая (железо, никель). У Земли внешнее ядро жидкое, внутреннее твёрдое. Создаёт магнитное поле.'],['мантия','Мантия — оболочка планеты между корой и ядром. Состоит из силикатных пород. В мантии происходят конвекционные течения, движущие тектонические плиты.'],['кора','Кора — внешняя твёрдая оболочка планеты. Океаническая кора тонкая (5-10 км), континентальная толстая (30-70 км). Самый верхний слой литосферы.'],['орбита','Орбита — траектория движения небесного тела вокруг другого тела под действием гравитации. У планет орбиты близки к эллипсам (первый закон Кеплера).'],['эксцентриситет','Эксцентриситет — мера вытянутости эллиптической орбиты. e=0 — окружность, 0<e<1 — эллипс. У Земли e≈0,0167, у Меркурия e≈0,2056.'],['наклонение','Наклонение орбиты — угол между плоскостью орбиты тела и плоскостью отсчёта (обычно эклиптики). У планет солнечной системы наклонение небольшое.'],['перигелий','Перигелий — ближайшая к Солнцу точка орбиты небесного тела. Земля проходит перигелий в начале января.'],['афелий','Афелий — самая удалённая от Солнца точка орбиты небесного тела. Земля проходит афелий в начале июля.'],['сидерический период','Сидерический (звёздный) период — время полного оборота планеты вокруг звезды относительно далёких звёзд. Земной сидерический год = 365,256 суток.'],['синодический период','Синодический период — время между одинаковыми конфигурациями планет относительно Солнца и Земли (например, между двумя противостояниями).'],['ретроградное вращение','Ретроградное вращение — вращение планеты вокруг оси в направлении, противоположном её движению по орбите. Венера и Уран вращаются ретроградно.'],['приливный захват','Приливный захват — синхронизация вращения спутника с орбитальным движением, когда он всегда повёрнут к планете одной стороной. Пример: Луна к Земле.'],['спутник','Спутник — небесное тело, вращающееся вокруг планеты или другого более крупного тела. Естественные спутники: Луна, Европа, Титан. Искусственные созданы человеком.'],['планетные кольца','Планетные кольца — плоские скопления льда, пыли и камней, вращающиеся вокруг планеты. Самые известные — у Сатурна, есть также у Юпитера, Урана и Нептуна.'],['система колец','Система колец Сатурна — сложное образование из тысяч узких колец, разделённых щелями. Состоит в основном из водяного льда. Основные кольца: А, В, С.'],['большой красный шторм','Большое красное пятно — гигантский антициклон на Юпитере, бушующий не менее 350 лет. Размер превышает диаметр Земли.'],['большой белый овал','Большой белый овал — атмосферный шторм на Сатурне, периодически появляющийся в северном полушарии. Значительно меньше Большого красного пятна Юпитера.'],['полярное сияние','Полярное сияние — свечение атмосферы при взаимодействии с заряженными частицами солнечного ветра. Бывает на Земле и на других планетах с магнитным полем (Юпитер, Сатурн).'],['вулканизм','Вулканизм — процессы извержения магмы на поверхность планеты. Активный вулканизм есть на Земле, Ио (спутник Юпитера), Венере, Марсе.'],['тектоника плит','Тектоника плит — теория о движении литосферных плит земной коры. Ответственна за землетрясения, вулканизм, образование гор и континентов.'],['кратер','Кратер — углубление на поверхности планеты от удара метеорита (ударный) или жерло вулкана (вулканический). На Луне и Меркурии много ударных кратеров.'],['каньон маринер','Каньон Маринер — гигантская система каньонов на Марсе (длина 4000 км, глубина до 7 км). Названа в честь космического аппарата «Маринер-9», открывшего её.'],['гора олимп','Олимп — потухший щитовой вулкан на Марсе высотой около 26 км — высочайшая гора Солнечной системы. Диаметр основания около 600 км.'],['вода на Марсе','Вода на Марсе — марсоходы и орбитальные аппараты подтвердили наличие льда в полярных шапках и под поверхностью. Жидкая вода неустойчива из-за разреженной атмосферы.'],['колонизация Марса','Колонизация Марса — концепция создания постоянного человеческого поселения на Марсе. Обсуждается SpaceX (Илон Маск) и NASA. Главные проблемы: радиация и низкая гравитация.'],['терраформирование','Терраформирование — гипотетическое изменение климата и условий на планете (обычно Марса) для создания среды, пригодной для жизни человека без скафандра.'],['зона обитаемости','Зона обитаемости (Goldilocks zone) — область вокруг звезды, где температура позволяет воде существовать в жидком виде на поверхности планеты. Ключевое условие для возникновения жизни.'],['ганимед','Ганимед — крупнейший спутник Юпитера и всей Солнечной системы (больше Меркурия). Единственный спутник с собственным магнитным полем. Имеет подземный солёный океан.'],['каллисто','Каллисто — второй по величине спутник Юпитера, почти такой же, как Меркурий. Сильно кратерирован, один из древнейших ландшафтов. Возможен подземный океан.'],['ио','Ио — самый вулканически активный объект в Солнечной системе (более 400 действующих вулканов). Спутник Юпитера, поверхность покрыта серой и лавой.'],['европа','Европа — спутник Юпитера с гладкой ледяной поверхностью. Под льдом предположительно находится жидкий солёный океан — одно из лучших мест для поиска внеземной жизни.'],['тритон','Тритон — крупнейший спутник Нептуна, вращается в ретроградном направлении. Имеет азотный вулканизм (гейзеры). Поверхность из азотного льда.'],['энцелад','Энцелад — маленький спутник Сатурна, бьющий мощными водяными гейзерами. Под южной полярной шапкой — глобальный жидкий океан. Присутствуют сложные органические молекулы.'],['миранда','Миранда — спутник Урана с самой хаотичной поверхностью в Солнечной системе: гигантские разломы, уступы высотой до 20 км. Сильно разрушен древним ударом.'],['феба','Феба — внешний спутник Сатурна неправильной формы, вращается ретроградно. Вероятно, захваченный кентавр или объект из пояса Койпера.'],['деймос','Деймос — меньший и более далёкий спутник Марса (около 12 км). Имеет гладкую поверхность из реголита. Вместе с Фобосом — вероятно, захваченные астероиды.'],['фобос','Фобос — ближайший к Марсу спутник, приближается к планете (через 30-50 млн лет разрушится или упадёт). Размер около 22 км, поверхность в бороздах.'],['харон','Харон — крупнейший спутник Плутона (почти половина размера самой планеты). Центр масс системы Плутон-Харон находится вне Плутона — это двойная карликовая планета.'],['ариэль','Ариэль — четвёртый по величине спутник Урана, самый яркий. Поверхность с каньонами и ледяными равнинами. Предположительно, геологически активен.'],['умбриэль','Умбриэль — третий по величине спутник Урана, самый тёмный (покрыт углеродистым материалом). Сильно кратерирован, признаков активности мало.'],['титания','Титания — крупнейший спутник Урана. Поверхность смесь из кратеров, каньонов (длиной до 1500 км) и ледяных равнин. Есть признаки криовулканизма.'],['оберон','Оберон — второй по величине спутник Урана, самый внешний из крупных. Сильно кратерирован, на дне некоторых кратеров — тёмное вещество неизвестной природы.'],['рея','Рея — второй по величине спутник Сатурна. Предположительно имеет тонкое кольцо (первый обнаруженный спутник с кольцами). Ледяная поверхность с кратерами.'],['япет','Япет — спутник Сатурна с уникальной двухцветной окраской: одно полушарие тёмное, другое яркое. Имеет экваториальный хребет высотой до 20 км.'],['диона','Диона — спутник Сатурна, имеющий следы геологической активности. На поверхности — ледяные скалы и уступы. Возможен подповерхностный жидкий океан.'],['тефия','Тефия — спутник Сатурна с огромным кратером Одиссей (почти треть диаметра спутника). Имеет большой каньон Итака — гигантскую трещину.'],['мимас','Мимас — спутник Сатурна, известен огромным кратером Гершель (диаметр 1/3 спутника). Из-за кратера похож на Звезду Смерти из «Звёздных войн».'],['гиперион','Гиперион — спутник Сатурна неправильной формы (похож на губку). Хаотично вращается из-за влияния Титана. Поверхность пористая, как пемза.'],['ларисса','Ларисса — небольшой внутренний спутник Нептуна неправильной формы. Обнаружена при пролёте «Вояджера-2» в 1989 году.'],['протей','Протей — второй по величине спутник Нептуна, неправильной формы. Сильно кратерирован, почти не имеет геологической активности.'],['нереида','Нереида — спутник Нептуна с очень вытянутой орбитой. Открыта в 1949 году. Второй по величине спутник Нептуна после Тритона.'],['наяда','Наяда — ближайший к Нептуну спутник, открыт «Вояджером-2». Очень маленький (около 60 км). Совершает оборот всего за 7 часов.'],['таласса','Таласса — второй внутренний спутник Нептуна, открыт «Вояджером-2». Находится на почти круговой орбите.'],['деспина','Деспина — третий внутренний спутник Нептуна, названа в честь нимфы. Открыта по снимкам «Вояджера-2» в 1989 году.'],['галатея','Галатея — внутренний спутник Нептуна, находится рядом с кольцами. Своей гравитацией удерживает частицы в кольце Адамса.'],['пан','Пан — маленький спутник Сатурна, обитающий внутри щели Энке в кольце А. Формой напоминает пельмень, расчищает щель от частиц.'],['атлас','Атлас — спутник Сатурна, похожий на летающую тарелку. Находится на внешнем краю кольца А. Помогает удерживать частицы.'],['прометей','Прометей — спутник Сатурна, взаимодействует с кольцом F, создавая в нём сгустки и извивы. Слегка вытянутой формы.'],['эпиметей','Эпиметей — спутник Сатурна, движется по орбите, почти совпадающей с орбитой Януса. Они меняются орбитами каждые 4 года (танцующие спутники).'],['янус','Янус — спутник Сатурна, орбитальный партнёр Эпиметея. Вместе удерживают кольцо. Открыт по снимкам «Вояджера-1».'],['пандора','Пандора — спутник Сатурна, внешний пастух кольца F. Движется за Янусом и Эпиметеем.'],['калипсо','Калипсо — маленький спутник Сатурна, троянец Тефии (находится в точке Лагранжа L5 позади неё). Телесто — троянец в точке L4.'],['телесто','Телесто — маленький спутник Сатурна, троянец Тефии (в точке Лагранжа L4). Вместе с Калипсо находятся в одинаковых орбитах с Тефией.'],['елена','Елена — троянский спутник Дионы (в точке L4), открыт на снимках «Кассини». Находится впереди Дионы на 60°.'],['полидевк','Полидевк — второй троянский спутник Дионы (в точке L5, позади). Открыт «Кассини» в 2005 году. Значительно меньше Елены.'],['гималия','Гималия — нерегулярный спутник Юпитера, шестой по величине. Открыт в 1904 году. Входит в группу Гималии (проградные нерегулярные спутники).'],['элара','Элара — нерегулярный спутник Юпитера, открыт в 1905 году. Входит в группу Гималии. Диаметр около 80 км.'],['пасифе','Пасифе — нерегулярный спутник Юпитера, член группы Пасифе (ретроградные). Открыт в 1908 году. Диаметр около 60 км.'],['синопе','Синопе — ретроградный спутник Юпитера, член группы Пасифе. Открыт в 1914 году. Один из самых дальних спутников Юпитера.'],['лиситея','Лиситея — проградный спутник Юпитера, входит в группу Гималии. Открыт в 1938 году. Диаметр около 40 км.'],['карме','Карме — ретроградный спутник Юпитера, главный в группе Карме. Открыт в 1938 году. Диаметр около 50 км.'],['Ананке','Ананке — ретроградный спутник Юпитера, главный в группе Ананке. Открыт в 1951 году. Диаметр около 30 км.'],['леда','Леда — проградный спутник Юпитера, входит в группу Гималии. Открыт в 1974 году. Диаметр около 20 км.'],['гиппокамп','Гиппокамп — маленький спутник Нептуна, открыт в 2013 году на старых снимках «Хаббла». Назван в честь морского коня из мифологии.'],['стикс','Стикс — маленький спутник Плутона, открыт «Хабблом» в 2012 году. Имеет вытянутую форму, размер около 16 км.'],['никта','Никта — спутник Плутона, открыт в 2005 году одновременно с «Хабблом». Размер около 42 км. Обращается между Хароном и Стиксом.'],['аполлон','Аполлон — программа пилотируемых полётов США (1961-1972). Цель — высадка человека на Луну. 20 июля 1969 года Нил Армстронг и Базз Олдрин ступили на Луну.'],['восток','Восток — серия советских пилотируемых кораблей. 12 апреля 1961 года Юрий Гагарин на «Востоке-1» совершил первый полёт человека в космос (108 минут).'],['союз','Союз — советский и российский пилотируемый корабль, эксплуатируется с 1967 года. Самый надёжный в истории — более 140 полётов, 2 аварии.'],['спейс шаттл','Спейс Шаттл — американский многоразовый космический корабль (1981-2011). 5 шаттлов: «Колумбия», «Челленджер», «Дискавери», «Атлантис», «Индевор». Два погибли с экипажами.'],['меркурий','Меркурий — первая пилотируемая программа США (1958-1963). Цель — выход человека на орбиту Земли. Алан Шепард — первый американец в космосе.'],['джемини','Джемини — вторая пилотируемая программа США (1961-1966). Отработка стыковки, выход в открытый космос, длительные полёты для подготовки к «Аполлону».'],['восход','Восход — серия советских многоместных кораблей. «Восход-2» — первый выход человека в открытый космос (Алексей Леонов, 1965 год).'],['салют','Салют — серия первых в мире орбитальных станций СССР (1971-1986). «Салют-1» — первая станция. Эксперименты, рекорды длительности.'],['мир','Мир — советская и российская орбитальная станция (1986-2001). Первая модульная станция. Находилась в космосе 15 лет, пережила 175 космонавтов.'],['скайлэб','Скайлэб — первая американская орбитальная станция (1973-1979). Сгорела в атмосфере над Австралией. Посещена тремя экипажами.'],['мкс','Международная космическая станция — крупнейший пилотируемый объект (с 1998 года). Совместный проект 15 стран. Находится на высоте 400 км.'],['тяньгун','Тяньгун — китайская орбитальная станция. «Тяньгун-1» (2011). «Тяньгун-2» (2016). Постоянная станция «Тяньгун» строится.'],['артемида','Артемида — программа NASA по возвращению человека на Луну (планируется 2025-2026). Включает лунную орбитальную станцию Gateway.'],['луна-1','Луна-1 — первый советский аппарат, достигший окрестностей Луны (1959). Пролетел в 6000 км от поверхности, вышел на гелиоцентрическую орбиту.'],['луна-2','Луна-2 — первый аппарат, достигший поверхности Луны (1959). Жёсткая посадка. Подтвердила отсутствие магнитного поля у Луны.'],['луна-3','Луна-3 — первый аппарат, сфотографировавший обратную сторону Луны (1959). Снимки низкого качества, но исторически уникальные.'],['луна-9','Луна-9 — первая мягкая посадка на Луну (1966). Передала первые панорамы лунной поверхности. Подтвердила, что поверхность твёрдая.'],['луна-16','Луна-16 — первая автоматическая доставка лунного грунта на Землю (1970). Привезла 101 г реголита.'],['луноход','Луноход-1 — первый в мире планетоход (1970-1971). Проработал 11 месяцев, проехал 10,5 км. Управлялся с Земли.'],['чанъэ','Чанъэ — китайская лунная программа. «Чанъэ-4» — первая посадка на обратной стороне Луны (2019). «Чанъэ-5» — доставка грунта на Землю.'],['викинг','Викинг — два американских аппарата (1975). Первая успешная мягкая посадка на Марс, поиск жизни (результаты неоднозначные), цветные снимки поверхности.'],['марс-3','Марс-3 — советский аппарат (1971). Первая мягкая посадка на Марс, но передача прекратилась через 14,5 секунд из-за пылевой бури.'],['спирит','Спирит — марсоход NASA (2004-2010). Проработал 6 лет вместо запланированных 3 месяцев. Нашёл признаки древней воды на Марсе.'],['чёрная дыра','Чёрная дыра — область пространства-времени, гравитационное притяжение которой настолько сильно, что её не могут покинуть даже фотоны. Образуется при коллапсе массивных звёзд.'],['сцинтиллятор','Сцинтиллятор — материал, излучающий вспышку света при прохождении ионизирующей частицы. Используется в сцинтилляционных детекторах.'],['счётчик Гейгера','Счётчик гейгера-мюллера — газоразрядный прибор для регистрации ионизирующих излучений (альфа, бета, гамма). Издаёт характерные щелчки.'],['камера Вильсона','Камера вильсона — прибор для наблюдения треков заряженных частиц, основанный на конденсации перенасыщенного пара вдоль траектории частицы.'],['дозиметр','Дозиметр — прибор для измерения дозы ионизирующего излучения или мощности дозы. Используется для радиационного контроля.'],['поглощённая доза','Поглощённая доза — энергия ионизирующего излучения, поглощённая единицей массы вещества. Измеряется в греях (Гр). 1 Гр = 1 Дж/кг.'],['эквивалентная доза','Эквивалентная доза — поглощённая доза, умноженная на коэффициент качества излучения. Учитывает разную биологическую опасность разных видов излучения. Измеряется в зивертах (Зв).'],['эффективная доза','Эффективная доза — сумма эквивалентных доз в разных органах с учётом их радиочувствительности. Основная дозиметрическая величина для оценки радиационного риска.'],['рефракция','Рефракция — преломление света на границе двух сред с разной оптической плотностью, например воздуха и воды.'],['дисперсия','Дисперсия — разложение белого света в спектр цветов из-за зависимости показателя преломления от длины волны (цвета).'],['дифракция','Дифракция — огибание светом препятствий и отклонение от прямолинейного распространения. Особенно заметна на малых отверстиях и щелях.'],['поляризация','Поляризация — упорядочение колебаний световой волны. Обычный свет колеблется во всех направлениях, поляризованный — только в одном.'],['фотон','Фотон — элементарная частица, квант электромагнитного излучения (света). Не имеет массы покоя и движется со скоростью света.'],['спектр','Спектр — разложение света на составные цвета. Непрерывный спектр дают раскалённые твёрдые тела, линейчатый — разреженные газы.'],['монохроматичность','Монохроматичность — свойство света иметь одну строго определённую длину волны (один цвет). Пример — лазерный луч.'],['когерентность','Когерентность — согласованное протекание волновых процессов. Для интерференции нужны когерентные волны (одинаковая частота и постоянная разность фаз).'],['голография','Голография — метод записи и восстановления объёмного изображения объекта с помощью интерференции лазерных лучей.'],['радуга','Радуга — атмосферное оптическое явление, возникающее при преломлении и отражении солнечного света в каплях воды.'],['мираж','Мираж — оптическое явление в атмосфере, при котором возникают мнимые изображения удалённых объектов из-за искривления световых лучей.'],['телескоп','Телескоп — оптический прибор для наблюдения удалённых небесных объектов. Собирает и фокусирует свет звёзд и планет.'],['микроскоп','Микроскоп — оптический прибор для получения увеличенных изображений мелких объектов, невидимых невооружённым глазом.'],['объектив','Объектив — линза или система линз, обращённая к объекту наблюдения. Формирует первичное изображение.'],['окуляр','Окуляр — линза или система линз, обращённая к глазу наблюдателя. Служит для увеличения изображения, даваемого объективом.'],['апертура','Апертура — действующее отверстие оптической системы, ограничивающее световой поток. Влияет на яркость и глубину резкости.'],['диафрагма','Диафрагма — механическое устройство, изменяющее апертуру. Регулирует количество света, проходящего через объектив.'],['светофильтр','Светофильтр — оптическое устройство, пропускающее свет только определённых длин волн (цветов) и задерживающее остальные.'],['световод','Световод — нить из прозрачного материала, направляющая свет благодаря полному внутреннему отражению.'],['оптоволокно','Оптоволокно — тонкие стеклянные или пластиковые волокна для передачи света. Применяется в интернете, медицине, связи.'],['лазер','Лазер — источник когерентного монохроматического света с малой расходимостью луча. Используется в медицине, технике, науке.'],['люминесценция','Люминесценция — свечение веществ под действием внешнего излучения (света, электронов, ультрафиолета).'],['флуоресценция','Флуоресценция — вид люминесценции, при которой свечение прекращается сразу после выключения возбуждения. Пример — светильники дневного света.'],['фосфоресценция','Фосфоресценция — вид люминесценции, при которой свечение продолжается некоторое время после выключения возбуждения. Пример — светящиеся в темноте краски.'],['фотометрия','Фотометрия — раздел оптики, измеряющий световые величины: силу света, освещённость, яркость, световой поток.'],['освещённость','Освещённость — световая величина, равная отношению светового потока к площади освещаемой поверхности. Измеряется в люксах.'],['яркость','Яркость — световая величина, характеризующая свечение поверхности в заданном направлении. Воспринимается глазом как светлота.'],['контраст','Контраст — различие в яркости или цвете между соседними участками изображения. Высокий контраст означает чёткую границу.'],['каустика','Каустика — световая линия или узор, образованный отражёнными или преломлёнными лучами. Пример — блики на дне бассейна.'],['аберрация','Аберрация — искажение изображения в оптических системах из-за несовершенства линз или зеркал. Бывает хроматическая и сферическая.'],['аксикон','Аксикон — коническая линза, преобразующая параллельный пучок света в кольцевой или фокусирующая вдоль оси в линию.'],['коллиматор','Коллиматор — оптическое устройство, формирующее параллельный пучок лучей. Используется в прицелах и измерительных приборах.'],['интерферометр','Интерферометр — измерительный прибор, работающий на основе интерференции волн. Позволяет измерять малые расстояния и длину волны.'],['дифракционная решётка','Дифракционная решётка — оптический элемент с множеством параллельных штрихов. Разлагает свет в спектр для точных измерений.'],['брюстеровский угол','Угол Брюстера — угол падения света, при котором отражённый луч полностью поляризован. Связан с показателем преломления.'],['двойное лучепреломление','Двойное лучепреломление — явление расщепления светового луча на два в анизотропных кристаллах (например, исландский шпат).'],['плеохроизм','Плеохроизм — разная окраска кристалла при наблюдении в поляризованном свете под разными углами. Свойство многих минералов.'],['поляроид','Поляроид — плёночный поляризатор, пропускающий свет только одной поляризации. Применяется в очках для уменьшения бликов.']]);
