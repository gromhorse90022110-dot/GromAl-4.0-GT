та) и капители (верхняя часть). В архитектуре ордеров. Колоннада — ряд колонн.'],['пилястра','Пилястра (пилястр) — плоский вертикальный выступ на стене, имеющий базу, ствол и капитель (как колонна). Декоративный элемент, расчленяет стену.'],['капитель','Капитель — верхняя часть колонны или пилястры, на которую опирается балка или арка. В ордерной архитектуре различают дорическую, ионическую, коринфскую капители.'],['арка','Арка — криволинейное перекрытие проёма в стене или пролёта между опорами (полукруглая, стрельчатая, лучковая). Аркада — ряд арок.'],['свод','Свод — пространственная конструкция перекрытия из клинчатых камней или кирпичей (цилиндрический, крестовый, купольный, нервюрный). Перекрывает большие пролёты (храмы, базилики).'],['купол','Купол (полусферическое или эллиптическое перекрытие) — свод, имеющий форму вращения кривой (полусферы, параболы) вокруг вертикальной оси. Пантеон в Риме, собор Святой Софии, купол Санта-Мария-дель-Фьоре.'],['фронтон','Фронтон — завершение фасада здания (портик, колоннада, вход) в виде треугольника, ограниченного карнизом и двумя скатами. Часто украшен скульптурой.'],['портик','Портик — галерея, перекрытая на колоннах (или пилястрах). Открытая часть здания (входной портик). В античной архитектуре — пронаос (вход перед храмом).'],['балюстрада','Балюстрада — ограждение лестницы, балкона, террасы, состоящее из ряда фигурных столбиков (балясин), соединённых сверху перилами. Декоративный элемент.'],['ротонда','Ротонда — круглое в плане здание или зал, перекрытое куполом. Окружено колоннадой. Пантеон в Риме (ротонда). В парковой архитектуре — беседка-ротонда.'],['шпиль','Шпиль — вертикальное остроконечное завершение здания (колокольни, башни), часто на башне или на куполе. Устремлённость вверх (готический собор, ратуша).'],['контрфорс','Контрфорс — вертикальная опора снаружи здания, воспринимающая распор (боковое давление) сводов (в готике). Расположен перпендикулярно стене.'],['аркбутан','Аркбутан (от франц. arc-boutant — подпорная арка) — наружная каменная полуарка, передающая распор от свода на контрфорс. Элемент готической архитектуры.'],['нервюра','Нервюра (от фр. nervure — жилка) — выступающее ребро (профилированное) готического каркасного крестового свода. Диагональные (ожива), поперечные (щипцовые).'],['роза','Роза (роза-окно) — круглое окно в готических и романских храмах с радиальными переплётами (напоминает розу). Витраж, часто над порталом главного фасада.'],['анфилада','Анфилада — ряд комнат, расположенных друг за другом, с дверными проёмами на одной оси. Создаёт перспективу глубины. Характерна для дворцовой архитектуры барокко и классицизма.'],['футбол','Футбол — командный вид спорта (11×11, вратарь). Цель — забить мяч в ворота соперника ногами или головой. Игра таймами по 45 минут. Крупнейшие турниры: Чемпионат мира (каждые 4 года), Лига чемпионов УЕФА.'],['баскетбол','Баскетбол — командная игра (5×5). Цель — забросить мяч руками в корзину (кольцо с сеткой). Игра 4 четвертями по 10-12 минут (в НБА — 12). Изобретён Джеймсом Нейсмитом в 1891 году.'],['волейбол','Волейбол — командная игра (6×6). Цель — отбить мяч через сетку так, чтобы он упал на площадку соперника. Игра до 25 очков (в партии). Родился в 1895 году (Уильям Морган).'],['теннис','Теннис — игра с ракеткой и мячом на корте с сеткой. Цель — отбить мяч так, чтобы соперник не смог его принять. Счёт: 15, 30, 40, гейм. Сет (до 6 геймов, с разницей 2). Турниры Большого шлема.'],['хоккей','Хоккей (с шайбой) — командная игра на льду (6×6, вратарь). Клюшками забить шайбу в ворота соперника. Игра 3 периода по 20 минут. НХЛ — лучшая лига мира. Матч-звёзды, Кубок Стэнли.'],['бейсбол','Бейсбол — командная игра с битой и мячом (9×9). Цель: бьющий отбивает мяч и обегает 3 базы, возвращаясь в «дом». Популярен в США, Японии, Кубе, Корее. МЛБ — высшая лига.'],['гандбол','Гандбол — командная игра с мячом (7×7, вратарь). Забросить мяч руками в ворота соперника. Игра 2 тайма по 30 минут. Популярен в Европе (Германия, Франция, Россия, Дания).'],['водное поло','Водное поло — командная игра в бассейне (7×7, вратарь). Забросить мяч в ворота соперника руками (кроме вратаря). Требует отличного плавания и выносливости. Олимпийский вид спорта.'],['флорбол','Флорбол (хоккей в зале) — командная игра с пластиковым мячом и клюшками (5 полевых + вратарь). Играется в зале на паркете. Без силовых приёмов. Популярен в Скандинавии, Швейцарии, Финляндии.'],['сквош','Сквош — игра с ракеткой и резиновым мячом в закрытом корте (4 стены). Удары о стены, пол, потолок. Мяч должен отскочить от передней стены выше жёлтой линии. Популярен в Великобритании, Египте, США.'],['бадминтон','Бадминтон — игра с ракетками и воланом на корте с сеткой (одиночные или парные). Волан весит 4-5 г, скорость до 300 км/ч. Олимпийский вид (с 1992). Родина — Великобритания (индийское происхождение).'],['настольный теннис','Настольный теннис (пинг-понг) — игра с ракетками и целлулоидным мячом на столе (2,74×1,525 м), разделённом сеткой. Одиночные и парные. Олимпийский вид. Популярен в Китае (доминирует).'],['регби','Регби — контактная командная игра с овальным мячом (15 на 15). Цель: приземлить мяч в зачётной зоне (попытка) или забить в ворота (штрафной). Названа в честь школы в Англии (1823). Кубок мира (с 1987).'],['крикет','Крикет — английская игра с битой и мячом на овальном поле (11 на 11). Цель: набрать больше ранов (перебежек). Матч длится до 5 дней (тестовый) или 20 оверов (T20). Популярен в Англии, Индии, Австралии, Пакистане.'],['гольф','Гольф — игра, цель — загнать мяч в лунку минимальным числом ударов разными клюшками (драйвер, айрон, паттер). Поле 18 лунок. Родина — Шотландия (XV в.). Турниры: Masters, British Open, Ryder Cup.'],['фехтование','Фехтование — единоборство на спортивных шпагах, рапирах или саблях. Цель: нанести укол (удар — для сабли) в поражаемую поверхность. Электрофиксация уколов. Олимпийский вид с 1896 года.'],['дзюдо','Дзюдо — японское единоборство (Дзигоро Кано, 1882). Броски, удержания, болевые и удушающие приёмы (только на татами). Цель — чистая победа (иппон). Олимпийский вид (с 1964).'],['самбо','Самбо (самозащита без оружия) — вид борьбы, созданный в СССР (1930-е). Сочетает дзюдо и национальные виды борьбы. Болевые приёмы (на руки, ноги), броски. Соревновательное самбо, боевое самбо.'],['греко-римская борьба','Греко-римская (классическая) борьба — вид единоборств, запрещающий захваты ног и подсечки. Только броски и удержания (руками, корпусом). Олимпийский вид (с 1896).'],['вольная борьба','Вольная борьба — вид единоборств, разрешающий захваты ног, подсечки, проходы в ноги. Отличается от греко-римской более динамичным стилем. Олимпийский вид (с 1904).'],['карате','Карате (карате-до) — японское боевое искусство (удары руками, ногами, блоки). Ката (формальные упражнения) и кумите (спарринг). Олимпийский вид (2020). Стили: сётокан, киокусинкай, годзю-рю.'],['тхэквондо','Тхэквондо — корейское боевое искусство с акцентом на удары ногами (особенно высокие, в голову). Олимпийский вид (с 2000). Цель — попадание в туловище (электронная система фиксации) или в голову (с ручным контролем).'],['ушу','Ушу (кунг-фу) — китайское боевое искусство. Соревновательные дисциплины: таолу (формальные комплексы движений) и саньда (свободные поединки с ударами руками, ногами, бросками).'],['айкидо','Айкидо — японское боевое искусство (Морихэй Уэсиба). Использует энергию противника (броски, захваты, болевые). Без соревнований. Цель — нейтрализация, а не повреждение.'],['джиу-джитсу','Джиу-джитсу (бразильское) — боевое искусство, акцент на борьбу в партере и болевые приёмы (рычаги, узлы, удушения). MMA — основа. Турниры: ADCC (абсолютный чемпионат по грапплингу).'],['кикбоксинг','Кикбоксинг — единоборство, объединяющее бокс и удары ногами (лоу-кики, мидл-кики, хай-кики). Дисциплины: фулл-контакт, лайт-контакт, семи-контакт (поинт-файтинг).'],['мма','MMA (Mixed Martial Arts, смешанные единоборства) — полноконтактное единоборство с минимальными ограничениями (удары локтями, коленями, борьба, болевые, удушающие). UFC — крупнейшая организация.'],['пауэрлифтинг','Пауэрлифтинг (силовое троеборье) — три упражнения: приседание со штангой, жим лёжа, становая тяга. Соревнования — сумма веса в трёх упражнениях. Категории весовые.'],['модуль','Модуль — файл с программным кодом, содержащий функции, классы или переменные, предназначенный для повторного использования и логической группировки. Позволяет организовать код, избежать конфликтов имён. Примеры: import math в Python, require в Node.js.'],['библиотека','Библиотека — коллекция готовых модулей, классов, функций, собранных для решения определённых задач (работа с графикой, математика, сеть). Код библиотеки вызывается вашим кодом. Примеры: React, jQuery, NumPy, Pandas.'],['фреймворк','Фреймворк — каркас приложения, который диктует архитектуру и управляет потоком выполнения (инверсия управления). Вы встраиваете свой код в фреймворк, а не вызываете его. Примеры: Django (Python), Spring (Java), Angular, Vue.js.'],['компилятор','Компилятор — программа, переводящая исходный код (на языке высокого уровня) в машинный код (или байт-код) целиком. Создаёт исполняемый файл (.exe, .out). Примеры: gcc (C), javac (Java), TypeScript компилируется в JavaScript.'],['интерпретатор','Интерпретатор — программа, выполняющая исходный код построчно (без создания отдельного исполняемого файла). Удобно для отладки и скриптов, но медленнее компиляции. Примеры: интерпретатор Python, PHP, Ruby.'],['байт-код','Байт-код — промежуточное представление кода, исполняемое виртуальной машиной (JVM, CLR). Байт-код получается из исходника компилятором, а затем интерпретируется или компилируется в машинный код JIT (Just-In-Time).'],['синтаксис','Синтаксис языка программирования — набор правил, определяющих структуру корректных программ (как писать операторы, выражения, блоки). Примеры: завершение строки точкой с запятой в C++ и Java, отступы в Python.'],['отладка','Отладка (debugging) — процесс поиска и исправления ошибок в программе. Инструменты: отладчик (debugger), точки останова (breakpoints), пошаговое выполнение, просмотр переменных, логирование.'],['исключение','Исключение (exception) — событие, нарушающее нормальный ход выполнения программы (ошибка, деление на ноль, отсутствие файла). Обработка исключений — конструкции try-catch-finally (throw).'],['рефакторинг','Рефакторинг — изменение внутренней структуры кода без изменения его внешнего поведения. Цели: улучшить читаемость, уменьшить связанность, упростить поддержку, устранить дублирование.'],['git','Git — распределённая система контроля версий (Л. Торвальдс, 2005). Отслеживает изменения файлов, позволяет работать в ветках, сливать их, возвращаться к предыдущим версиям. Команды: commit, push, pull, branch, merge.'],['репозиторий','Репозиторий (хранилище) — директория (локальная или удалённая), в которой Git отслеживает историю изменений файлов. Хранит все версии файлов, комментарии к коммитам, ветки. Примеры: локальный репозиторий, GitHub, GitLab, Bitbucket.'],['коммит','Коммит (commit) — сохранение текущего состояния файлов в репозитории Git (фиксация изменений). Каждый коммит имеет уникальный хеш (SHA), комментарий (message), автора, дату.'],['ветка','Ветка (branch) — изолированная линия разработки в Git. Позволяет вести параллельную работу (новая фича, исправление бага) без влияния на основную ветку (обычно main/master или develop).'],['слияние','Слияние (merge) — объединение изменений из одной ветки Git в другую (обычно в основную). Может быть автоматическим (fast-forward) или с созданием коммита слияния (merge commit). При конфликте решается вручную.'],['база данных','База данных (БД) — организованная структура для хранения и управления данными. Типы: реляционные (SQL: MySQL, PostgreSQL), NoSQL (MongoDB, Redis), графовые (Neo4j), объектно-ориентированные.'],['реляционная модель','Реляционная модель — организация данных в виде двумерных таблиц (отношений) со строками (кортежами) и столбцами (атрибутами). Связи между таблицами через ключи. Разработана Эдгаром Коддом в 1970 году.'],['первичный ключ','Первичный ключ — столбец (или комбинация столбцов) в реляционной таблице, уникально идентифицирующий каждую строку. Не может быть NULL. Пример: id пользователя, номер паспорта, код товара.'],['внешний ключ','Внешний ключ — столбец в одной таблице, ссылающийся на первичный ключ другой таблицы. Обеспечивает ссылочную целостность: запрещает вставку значения, отсутствующего в родительской таблице.'],['индексация','Индексация — создание дополнительной структуры (индекса) для ускорения поиска и выборки строк в таблице БД. Индексы похожи на предметный указатель в книге. Замедляют вставку и обновление, но ускоряют SELECT.'],['нормализация','Нормализация — процесс проектирования реляционной БД для устранения избыточности (дублирования) и аномалий обновления. Формы: 1НФ, 2НФ, 3НФ, нормальная форма Бойса-Кодда (BCNF).'],['транзакция','Транзакция — последовательность операций с БД, выполняемая как единое целое (или все выполняются, или ни одной). Гарантии ACID. Пример: перевод денег между счетами (списание с одного, зачисление на другой).'],['acid','ACID — свойства транзакций: Atomicity (атомарность — выполняются все или ни одной), Consistency (согласованность — не нарушаются ограничения), Isolation (изоляция — независимость параллельных транзакций), Durability (устойчивость — после фиксации данные сохранены).'],['sql','SQL (Structured Query Language) — язык структурированных запросов для управления реляционными БД. Подмножества: DDL (создание таблиц), DML (вставка, обновление, удаление), DQL (SELECT), DCL (выдача прав).'],['nosql','NoSQL (Not only SQL) — класс БД, не использующих реляционную модель и SQL. Типы: документо-ориентированные (MongoDB), ключ-значение (Redis), колоночные (Cassandra), графовые (Neo4j). Хорошо масштабируются горизонтально.'],['api','API (Application Programming Interface) — набор правил, протоколов, методов для взаимодействия программных компонентов. Web API (REST, GraphQL, SOAP) — точки доступа к серверу через HTTP.'],['rest','REST (Representational State Transfer) — архитектурный стиль для построения веб-API. Использует HTTP-методы: GET (получить), POST (создать), PUT/PATCH (обновить), DELETE (удалить). Данные обычно в формате JSON.'],['json','JSON (JavaScript Object Notation) — текстовый формат обмена данными (на основе JavaScript). Человекочитаем, лёгкий для парсинга. Структура: пары «ключ: значение», массивы, числа, строки, булевы, null.'],['xml','XML (Extensible Markup Language) — язык разметки (как HTML), используемый для обмена структурированными данными. Более тяжеловесный, чем JSON, но поддерживает валидацию через XSD (схемы).'],['парсинг','Парсинг — процесс синтаксического анализа структурированных данных (HTML, JSON, XML) и извлечения нужной информации. HTML-парсинг (web scraping) — библиотеки: BeautifulSoup (Python), Cheerio (Node.js), Jsoup (Java).'],['сериализация','Сериализация — процесс преобразования объекта в поток байтов (или строку) для сохранения на диск или передачи по сети (например, в JSON или XML). Десериализация — обратный процесс.'],['протокол','Сетевой протокол — набор правил и форматов для обмена данными между устройствами. Примеры: HTTP/HTTPS (веб), FTP (передача файлов), SMTP (почта), TCP (транспорт), IP (сетевой).'],['сервер','Сервер — компьютер или программа, предоставляющая услуги (веб-сервер, файловый сервер, БД) по запросам клиентов. Ожидает подключения, обрабатывает запросы, отправляет ответы.'],['клиент','Клиент — устройство или программа, запрашивающая услуги у сервера. Примеры: веб-браузер (клиент для веб-сервера), почтовый клиент (Outlook, Thunderbird), приложение на телефоне.'],['хостинг','Хостинг — услуга предоставления дискового пространства, вычислительных ресурсов, сетевого доступа для размещения сайтов, БД, приложений. Виды: shared (общий), VPS (виртуальный выделенный), dedicated (выделенный), cloud (облачный).'],['домен','Домен (доменное имя) — символьное имя, идентифицирующее веб-сайт (например, example.com). Система DNS преобразует домен в IP-адрес. Домены первого уровня: .com, .org, .ru, .рф и др.'],['облачные вычисления','Облачные вычисления (cloud computing) — модель предоставления вычислительных ресурсов (серверы, хранилища, БД, ПО) по запросу через интернет с оплатой за фактическое использование. Модели: IaaS, PaaS, SaaS.'],['виртуализация','Виртуализация — технология, позволяющая запускать несколько изолированных операционных систем (гостевых) на одном физическом сервере с помощью гипервизора (VMware, VirtualBox, KVM).'],['контейнеризация','Контейнеризация — метод виртуализации на уровне ОС, при котором ядро ОС используется для запуска изолированных экземпляров (контейнеров). Легче, быстрее, чем виртуальные машины (не эмулируют ОС целиком).'],['docker','Docker — платформа для создания, доставки и запуска приложений в контейнерах. Контейнер упаковывает приложение и все его зависимости (библиотеки, конфиги). Docker-образы, Docker Hub, docker-compose.'],['kubernetes','Kubernetes (K8s) — система для оркестровки (автоматизации развёртывания, масштабирования, управления) контейнеров. Управляет кластерами (поды, сервисы, репликации, роллинг-апдейты).'],['микросервис','Микросервисная архитектура — подход, при котором приложение строится как набор небольших слабосвязанных сервисов (каждый со своей БД, языком, отвечает за свою бизнес-функцию). Коммуникация через API (REST, gRPC, очереди).'],['монолит','Монолит (монолитная архитектура) — приложение, в котором все компоненты (UI, бизнес-логика, БД) собраны в одном исполняемом файле или развёртываются вместе. Проще на старте, но сложно масштабировать и поддерживать.'],['шифрование','Шифрование — преобразование данных (открытый текст) в нечитаемый вид (шифротекст) с помощью ключа. Симметричное (один ключ — AES) и асимметричное (пара: открытый и закрытый ключ — RSA).'],['токен','Токен (token) — строка данных, используемая для аутентификации и авторизации, как правило, на основе JWT (JSON Web Token). Содержит информацию о пользователе (claims) и подпись для защиты от подделки.'],['аутентификация','Аутентификация — процесс проверки подлинности пользователя (кто ты). Факторы: знание (пароль), владение (токен, смарт-карта), свойство (биометрия: отпечаток пальца, Face ID). Результат: пользователь идентифицирован (получен ID).'],['авторизация','Авторизация — процесс проверки прав пользователя (что тебе разрешено делать) после успешной аутентификации. Определяет доступ к ресурсам (страницам, функциям, данным). Модели: RBAC (роли), ABAC (атрибуты).'],['брандмауэр','Брандмауэр (межсетевой экран, firewall) — система, фильтрующая сетевой трафик по правилам (IP-адреса, порты, протоколы). Защищает внутреннюю сеть от несанкционированного доступа из интернета.'],['кэширование','Кэширование — временное хранение часто используемых данных в быстром хранилище (кэш) для ускорения доступа и снижения нагрузки на основное хранилище (БД, диск). Redis, Memcached, HTTP-кэш (браузер, CDN).'],['балансировщик','Балансировщик нагрузки (load balancer) — устройство или программа, распределяющая входящий сетевой трафик между несколькими серверами для обеспечения отказоустойчивости и масштабирования (round-robin, least connections, IP hash).'],['прокси','Прокси-сервер (proxy) — промежуточный сервер между клиентом и целевым сервером. Прямой прокси (от клиента к интернету) для обхода блокировок, кэширования, анонимизации. Обратный прокси (перед серверами приложений) для балансировки, кэширования, защиты.'],['веб-сокет','WebSocket — протокол полнодуплексной связи поверх TCP для реального времени (чат, игры, биржевые котировки). Устанавливает постоянное соединение между браузером и сервером (в отличие от HTTP «запрос-ответ»).'],['cookie','Cookie — небольшие фрагменты данных, хранящиеся в браузере и отправляемые на сервер с каждым HTTP-запросом. Используются для сессий (session ID), аутентификации, отслеживания пользователей.'],['сессия','Сессия (session) — временное хранилище данных о пользователе на сервере между HTTP-запросами (сохраняет авторизацию, корзину). Идентификатор сессии хранится в cookie или в URL. Завершается через timeout или logout.'],['html','HTML (HyperText Markup Language) — язык разметки веб-страниц. Использует теги (элементы): <html>, <head>, <body>, <h1>, <p>, <a>, <div>, <span>. Определяет структуру и семантику контента.'],['css','CSS (Cascading Style Sheets) — язык стилей для описания внешнего вида веб-страниц (цвета, шрифты, отступы, позиционирование, анимация). Отделяет содержание (HTML) от оформления.'],['dom','DOM (Document Object Model) — программный интерфейс (дерево объектов), представляющий HTML/XML документ, через который JavaScript может динамически изменять содержимое, стили и структуру веб-страницы.'],['кроссфит','Кроссфит — высокоинтенсивная функциональная тренировка (WOD — workout of the day). Комбинация гимнастики, тяжёлой атлетики, кардио. Игры CrossFit (с 2007) — всемирные соревнования.'],['селектор','Селектор в CSS — правило, определяющее, к каким элементам HTML будут применены стили. Типы: по тегу (div), по классу (.class), по id (#id), универсальный (*), атрибутам ([type="text"]), псевдоклассам (:hover), псевдоэлементам (::before).'],['flexbox','Flexbox (Flexible Box Layout) — технология CSS для построения гибких и адаптивных макетов. Основа: контейнер (display: flex), внутри — флекс-элементы. Свойства: flex-direction, justify-content, align-items, flex-wrap, gap.'],['grid','CSS Grid Layout — двухмерная система компоновки (строки и столбцы) для создания сложных сетчатых макетов. Контейнер (display: grid). Свойства: grid-template-columns, grid-template-rows, grid-template-areas, gap, justify-items, align-items.'],['адаптивность','Адаптивность (responsive design) — подход к веб-дизайну, при котором страница корректно отображается на разных устройствах (ПК, планшет, смартфон) с разными размерами экрана. Используются медиа-запросы (media queries), резиновая сетка, адаптивные изображения.'],['препроцессор','Препроцессор CSS — инструмент, расширяющий возможности CSS (переменные, вложенность, миксины, функции). Компилируется в обычный CSS. Примеры: SASS/SCSS, LESS, Stylus.'],['сборщик','Сборщик (module bundler) — инструмент для объединения JavaScript, CSS, изображений и других ресурсов в один или несколько бандлов для оптимизации загрузки веб-приложений. Примеры: Webpack, Vite, Parcel, Rollup, esbuild.'],['npm','npm (Node Package Manager) — менеджер пакетов для Node.js (крупнейший реестр программного обеспечения). Устанавливает библиотеки и зависимости, управляет версиями. Команды: npm install, npm init, npm run.'],['пакет','Пакет (package) — единица распространения программного обеспечения в экосистемах языков (npm, pip, Maven). Содержит код, метаданные (версия, зависимости, лицензия), конфигурационные файлы (package.json для npm).'],['фреймворк react','React — JavaScript-библиотека (Meta/Facebook, 2013) для построения пользовательских интерфейсов (UI). Использует компонентный подход, JSX (синтаксис JS + HTML), виртуальный DOM. Поддерживается хуками (hooks).'],['компонент','Компонент в React — независимая, переиспользуемая часть интерфейса (UI-блок), которая может иметь своё состояние (state) и получать данные от родителя (props). Функциональные компоненты (с хуками) и классовые.'],['хук','Хук (Hook) — функция в React, позволяющая использовать состояние (useState), эффекты (useEffect), контекст (useContext), редукторы (useReducer) и другие возможности без написания классов. Правила: только на верхнем уровне, только в функциональных компонентах.'],['ингредиент','Ингредиент — составная часть кулинарного блюда (продукт: мука, яйца, сахар, соль, овощи, мясо, специи). Рецепт — перечень ингредиентов с указанием количества.'],['рецепт','Рецепт — документ, описывающий технологию приготовления блюда: перечень ингредиентов (с количеством), последовательность операций (действий), время, температура, подача.'],['порция','Порция — количество блюда, рассчитанное на одного едока. В рецепте указывается выход (в граммах, штуках, миллилитрах) на определённое число порций.'],['подготовка','Подготовка (mise en place) — предварительная обработка продуктов перед приготовлением: мытьё, чистка, сортировка, замачивание, нарезка, взвешивание.'],['нарезка','Нарезка — измельчение продуктов на куски определённой формы и размера ножом или овощерезкой. Влияет на время готовки и эстетику блюда.'],['кубик','Кубик — форма нарезки (примерно одинаковые кубики: мелкие (брунуаз) 2-5 мм, средние (маседуан) 5-10 мм, крупные (карман) 1-2 см). Используется для овощей, мяса, сыра.'],['соломка','Соломка — форма нарезки в виде длинных тонких полосок (длина в несколько раз больше ширины). Классический пример: картофель фри. Также лук соломкой.'],['ломтик','Ломтик (slice) — плоский кусок продукта, нарезанный поперёк волокон (мяса, хлеба, колбасы, сыра). Толщина может варьироваться.'],['измельчение','Измельчение — механическое разрушение продукта до мелкой фракции (крупность зависит от задачи). Способы: рубка ножом, тёрка, блендер, мясорубка.'],['шинковка','Шинковка — нарезка капусты или других овощей на тонкие (2-5 мм) полоски. Выполняется широким ножом или специальной тёркой-шинковкой.'],['маринование','Маринование — выдерживание продуктов (мяса, овощей) в растворе (маринаде) из уксуса, лимонного сока, масла, специй, соли, сахара для размягчения, придания аромата и консервации.'],['бланширование','Бланширование — кратковременная (1-5 мин) обработка продукта кипятком или паром с последующим охлаждением в ледяной воде. Сохраняет цвет (овощи), удаляет горечь, облегчает чистку.'],['варка','Варка — нагревание продукта в большом количестве жидкости (вода, бульон, молоко) при температуре кипения (около 100°C). Применяется для круп, макарон, овощей, мяса, яиц.'],['кипячение','Кипячение — интенсивное парообразование по всему объёму жидкости при достижении температуры кипения (100°C для воды). Убивает микроорганизмы (стерилизация), уваривает жидкость.'],['тушение','Тушение — длительное (часы) нагревание продукта в небольшом количестве жидкости (вода, бульон, соус) под крышкой при слабом кипении. Размягчает мясо, соединяет вкусы.'],['припускание','Припускание — варка продукта в небольшом количестве жидкости (или в собственном соку) под крышкой при слабом нагреве. Щадящий метод для рыбы, овощей.'],['пассерование','Пассерование — обжаривание муки или овощей (лук, морковь) в жире при средней температуре без образования корочки для выделения эфирных масел и красителя (в суп, рагу).'],['обжаривание','Обжаривание (жарка) — термическая обработка продукта на сковороде или во фритюре при высокой температуре (160-200°C) с образованием румяной корочки (реакция Майяра).'],['фритюр','Фритюр — жарка продукта в большом количестве горячего жира (масла) при температуре 160-190°C до полного погружения (картофель фри, пончики, курица).'],['гриль','Гриль — жарка продукта на решётке (над углями или газом) или в электроприборе (гриль-сковороде). Характерны полосы от решётки и аромат дымка.'],['соте','Соте — блюдо из овощей (баклажаны, перец, кабачки) обжаренных до мягкости с добавлением томатов и чеснока. Также способ быстрого обжаривания продуктов встряхиванием сковороды.'],['фламбирование','Фламбирование — эффектное поджигание спиртного (коньяк, ром) в блюде (например, в блинах или мясе) для выжигания алкоголя и придания аромата.'],['карамелизация','Карамелизация — нагрев сахара до плавления и потемнения с образованием карамели. Также — длительное обжаривание овощей (лук, морковь) для выделения естественных сахаров.'],['эмульгирование','Эмульгирование — создание устойчивой смеси (эмульсии) двух несмешивающихся жидкостей (например, масла и уксуса/воды) с помощью эмульгатора (горчица, яичный желток — соус майонез).'],['запекание','Запекание — приготовление продукта в духовке (или на углях) под воздействием сухого жара. Может быть в фольге, рукаве, форме.'],['томление','Томление — длительный нагрев продукта при температуре ниже точки кипения (90-95°C) в закрытой посуде в духовке или русской печи. Мясо становится очень нежным (томлёная говядина).'],['су-вид','Су-вид (sous-vide) — метод вакуумной низкотемпературной готовки: продукт герметично упаковывается в пакет и нагревается в водяной бане при точно контролируемой температуре (50-80°C) длительное время (часы, сутки).'],['ферментация','Ферментация (сквашивание) — процесс разложения органических веществ под действием ферментов (бактерий, грибков). Примеры: квашение капусты, тесто (дрожжи), сыры, йогурт, кефир, чай (ферментированный).'],['консервирование','Консервирование — способ заготовки продуктов впрок, подавляющий рост микроорганизмов. Методы: стерилизация (герметичные банки), засолка, квашение, маринование, копчение, вяление, замораживание, сушка.'],['стерилизация','Стерилизация — термическая обработка продукта при температуре выше 100°C (в автоклаве, паром) для уничтожения всех микроорганизмов (включая споры). Консервы в герметичных банках.'],['пастеризация','Пастеризация — нагрев жидкости (молока, пива, сока) до 60-85°C для уничтожения вегетативных форм бактерий (без спор). Сохраняет вкус. Изобретена Луи Пастером.'],['соус','Соус (фр. sauce — подливка) — жидкая приправа к блюду (мясо, рыба, макароны), улучшающая вкус, аромат, внешний вид. Основа: бульон, молоко, сметана, сливки, масло, томат, майонез.'],['заправка','Заправка (дрессинг) — соус для салатов (уксус + масло + горчица + специи). Салатная заправка приготавливается эмульгированием. Также заправка для супа (сметана, майонез, зелень).'],['маринад','Маринад — кислая жидкость (уксус, лимонный сок, вино, кефир) со специями, в которой выдерживают мясо, рыбу, овощи для размягчения и аромата перед жаркой или консервации.'],['бульон','Бульон — отвар из мяса, птицы, рыбы или овощей с добавлением кореньев (морковь, лук, сельдерей) и специй. Основа для супов, соусов.'],['гарнир','Гарнир — дополнительная часть блюда (к мясу или рыбе): овощи, картофель, рис, макароны, каша. Придаёт законченный вид, насыщает.'],['сервировка','Сервировка стола — подготовка стола к приёму пищи: скатерть, тарелки, приборы (нож, вилка, ложка), бокалы, салфетки, декорирование. Порядок: от центра к краям.'],['дегустация','Дегустация — оценка вкусовых качеств продукта (вина, сыра, чая, блюд) профессиональными дегустаторами или потребителями по шкале (внешний вид, аромат, вкус, текстура, послевкусие).'],['консистенция','Консистенция — физическое состояние продукта (густота, вязкость, плотность, упругость, нежность). Примеры: жидкая (суп), кашицеобразная (каша), плотная (мякоть), хрустящая (свежий огурец).'],['текстура','Текстура — микроструктура продукта (равномерность, зернистость, волокнистость, слоистость). Воспринимается осязанием во рту. Пример: нежный творог, слоёное тесто.'],['вкус','Вкус — ощущение, возникающее при действии раствора химических веществ на вкусовые рецепторы языка (сладкое, солёное, кислое, горькое, умами). Формирует пищевое поведение.'],['умами','Умами (яп. — приятный вкус) — пятый вкус, открытый Икэдой (1908). Соответствует глутамату натрия (содержится в мясе, сыре, помидорах, грибах, соевом соусе). Ощущение «мясистого», «насыщенного» вкуса.'],['острота','Острота — ощущение жжения (триггер — капсаицин из перца чили) активирует рецепторы боли TRPV1, а не вкусовые рецепторы. Это не вкус, а болевая реакция.'],['кислотность','Кислотность — вкус, вызываемый кислотами (лимонная, уксусная, молочная). В кулинарии — pH блюда (низкий pH = кислый). Освежает, смягчает жир.'],['сладость','Сладость — вкус, вызываемый сахарами (глюкоза, фруктоза, сахароза), некоторыми аминокислотами (глицин) и спиртами. Сигнал о богатой энергии пище.'],['горечь','Горечь — вкус, вызываемый алкалоидами (кофеин, хинин, никотин), некоторыми гликозидами. Часто сигнализирует о токсичности, но малые дозы могут быть тонизирующими.'],['солёность','Солёность — вкус, вызываемый ионами натрия (Na⁺) через натриевые каналы вкусовых клеток. Физиологическая потребность в электролитах.'],['меренга','Меренга (безе) — кондитерское изделие из взбитых с сахаром яичных белков, запечённых при низкой температуре до хрустящей корочки и нежной середины. Бывает швейцарской, итальянской, французской.'],['глазурь','Глазурь — сахарная или шоколадная оболочка для покрытия выпечки (пряники, куличи, пончики). Состав: сахарная пудра, лимонный сок, вода (иногда белок, масло, какао).'],['социальная стратификация','Социальная стратификация — система неравенства, распределение социальных групп (страт) по иерархически расположенным слоям (доход, власть, престиж, образование). П. Сорокин, М. Вебер.'],['мобильность','Социальная мобильность — перемещение индивидов или групп между стратами (вертикальная — вверх/вниз, горизонтальная — без изменения статуса). Внутрипоколенная и межпоколенная.'],['класс','Класс — большая социальная группа, выделяемая по экономическому признаку (отношение к средствам производства, доход). К. Маркс: буржуазия и пролетариат. М. Вебер: класс, статус, партия.'],['сословие','Сословие — социальная группа в феодальном обществе с закреплёнными в законе правами и обязанностями (передача по наследству). Дворянство, духовенство, крестьянство, мещанство.'],['каста','Каста — эндогамная социальная группа (браки только внутри группы), с наследственным статусом и запретом на социальную мобильность. Классический пример — кастовая система в Индии (брахманы, кшатрии, вайшьи, шудры, неприкасаемые).'],['статус','Социальный статус — положение индивида в социальной системе (приписанный — по рождению: пол, раса, возраст; достигаемый — благодаря усилиям: профессия, образование).'],['роль','Социальная роль — ожидаемое поведение, связанное с определённым статусом (врач — лечит, отец — заботится). Ролевой конфликт — противоречие между ролями.'],['социализация','Социализация — процесс усвоения индивидом норм, ценностей, культурных образцов общества. Агенты социализации: семья, школа, сверстники, СМИ, армия. Первичная (детство) и вторичная (взрослая).'],['девиация','Девиантное поведение (от лат. deviatio — отклонение) — поведение, отклоняющееся от социальных норм (преступность, алкоголизм, наркомания, гениальность, новаторство). Позитивная и негативная девиация.'],['аномия','Аномия (Э. Дюркгейм, Р. Мертон) — состояние общества, при котором разрушаются социальные нормы и ценности (кризис, переходный период), ведёт к росту девиации, самоубийств, преступности.'],['конформизм','Конформизм — приспособленчество, пассивное принятие господствующих стандартов поведения, группового давления. Эксперименты Аша (линии) и Милгрэма (подчинение авторитету).'],['норма','Социальная норма — правило поведения, регулирующее отношения в обществе. Виды: правовые (законы), моральные, религиозные, корпоративные, обычаи, традиции, мода.'],['ценность','Социальная ценность — представление о желаемом, значимом (добро, справедливость, семья, здоровье, богатство, безопасность, красота). Ценности влияют на поведение через нормы.'],['институт','Социальный институт — устойчивая форма организации совместной деятельности (семья, государство, образование, религия, экономика, право). Удовлетворяет фундаментальные потребности общества.'],['семья','Семья — социальный институт и малая группа, основанная на браке или кровном родстве. Функции: репродуктивная, воспитательная, экономическая, эмоциональная, досуговая.'],['гендер','Гендер — социальный пол (социальные роли, нормы, ожидания, связанные с мужчинами и женщинами), в отличие от биологического пола (sex). Гендерные стереотипы, гендерная идентичность, гендерное неравенство.'],['этнос','Этнос (греч. ethnos — народ) — устойчивая группа людей, объединённых общим языком, культурой, происхождением, территорией, самосознанием. Виды: род, племя, народность, нация.'],['нация','Нация — высшая форма этноса (иногда — полиэтническая гражданская общность). Характерна: общность территории, экономики, языка, культуры, государственность, национальное самосознание.'],['меньшинство','Социальное меньшинство — группа, отличающаяся от большинства по этническому, расовому, религиозному, языковому, сексуальному признаку, часто подвергающаяся дискриминации (стигматизация).'],['миграция','Миграция населения — перемещение людей через границы территорий с переменой места жительства. Виды: внутренняя (село-город) и внешняя (эмиграция, иммиграция), временная, маятниковая, сезонная.'],['урбанизация','Урбанизация — процесс роста городов, увеличения доли городского населения, распространения городского образа жизни. Уровень урбанизации: высокий (развитые страны >80%), средний, низкий.'],['глобализация','Глобализация — процесс усиления экономических, политических, культурных связей между странами, углубления международного разделения труда, роста транснациональных корпораций, унификации культуры.'],['общественное мнение','Общественное мнение — совокупность суждений, оценок, разделяемых большинством населения (или его частью) по актуальным проблемам. Изучается социологическими опросами (Gallup, ВЦИОМ, Левада-центр).'],['толпа','Толпа — кратковременное, неорганизованное скопление людей, лишённое общих целей и структуры. Характеризуется анонимностью, внушаемостью, эмоциональностью (заражение). Типы: случайная, экспрессивная, конвенциональная, действующая (агрессивная, паническая).'],['масса','Масса (как социальная общность) — большая совокупность людей без личного контакта, объединённых общими интересами через СМИ (футбольные болельщики, читатели журнала).'],['элита','Элита — высший слой общества, обладающий властью, богатством, престижем (политическая, экономическая, интеллектуальная). Теории элит (Парето, Моска, Михельс) — о неизбежности деления на элиту и массу.'],['меритократия','Меритократия (лат. meritus — достойный + греч. kratos — власть) — принцип, согласно которому власть должна принадлежать наиболее талантливым, заслуженным и способным (по заслугам, а не по происхождению).'],['инженерия','Инженерия — область технической деятельности, направленная на создание, проектирование, изготовление и эксплуатацию машин, сооружений, систем. Разделы: строительная, механическая, электротехническая, химическая, программная.'],['проектирование','Проектирование — процесс разработки технической документации (чертежи, схемы, расчёты, спецификации) для создания объекта (здания, детали, моста, электронной платы).'],['чертёж','Чертёж — графический конструкторский документ, выполненный в масштабе с использованием проекционных методов (виды, разрезы, сечения), содержащий размеры, допуски, материал, шероховатость.'],['спецификация','Спецификация — документ, содержащий перечень составных частей изделия (детали, сборочные единицы, материалы) с указанием количества, обозначения, наименования.'],['допуск','Допуск (tolerance) — допустимое отклонение размера детали от номинального (верхнее и нижнее отклонение). Обеспечивает взаимозаменяемость при сборке. Система отверстия и вала.'],['посадка','Посадка — характер соединения двух деталей (подвижное или неподвижное), определяемый разностью размеров отверстия и вала (зазор или натяг). Виды: с зазором (скользящая), с натягом (прессовая), переходная.'],['стандарт','Стандарт — нормативно-технический документ, устанавливающий требования к продукции, процессам, единицам измерения, терминам (ГОСТ, ISO, IEC, ANSI). Единообразие, качество, безопасность.'],['нагрузка','Нагрузка в механике — внешнее воздействие на деталь или конструкцию (сила, давление, момент). Виды: статическая (постоянная), динамическая (переменная, ударная), циклическая (усталость).'],['прочность','Прочность — способность материала или конструкции сопротивляться разрушению под действием нагрузки. Характеристики: предел прочности при растяжении, сжатии, изгибе, кручении, срезе.'],['жёсткость','Жёсткость — способность детали или конструкции сопротивляться деформации (упругой) под нагрузкой. Чем больше модуль упругости (E) и момент инерции сечения, тем выше жёсткость.'],['устойчивость','Устойчивость — способность конструкции сохранять первоначальную форму равновесия при воздействии сжимающих нагрузок (потеря устойчивости — продольный изгиб, buckling). Эйлерова критическая сила.'],['усталость','Усталость материала (усталостная прочность) — процесс постепенного накопления повреждений (микротрещин) при циклических (переменных) нагрузках, приводящий к внезапному разрушению при напряжении ниже предела прочности.'],['коррозия','Коррозия — разрушение металлов в результате химического (газовая) или электрохимического взаимодействия с окружающей средой (ржавление железа). Способы защиты: покрытия (краска, цинк, хром), нержавеющие стали, протекторная защита.'],['сварка','Сварка — процесс получения неразъёмного соединения деталей путём местного сплавления (дуговая, газовая, лазерная, электрошлаковая) или пластической деформации (холодная сварка, сварка взрывом).'],['пайка','Пайка — процесс соединения металлов с помощью легкоплавкого припоя (олово-свинцовый, серебряный, медный). Основной металл не плавится (отличие от сварки). Капиллярный эффект.'],['клёпка','Клёпка — создание неразъёмного соединения с помощью заклёпок (стальных, алюминиевых, медных). Заклёпка вставляется в отверстие и расклёпывается (образуется головка). Применялась в мостах, самолётах, кораблях.'],['литьё','Литьё — технологический процесс изготовления заготовок (отливок) путём заливки расплавленного металла (чугуна, стали, алюминия, бронзы) в литейную форму (песчаная, оболочковая, кокиль, центробежное литьё).'],['ковка','Ковка — обработка металла давлением (молотом или прессом) в горячем (выше температуры рекристаллизации) или холодном состоянии для придания формы и улучшения структуры (измельчение зерна, упрочнение).'],['штамповка','Штамповка — обработка металла давлением с помощью штампа (на прессе). Листовая штамповка (вырубка, гибка, вытяжка). Объёмная штамповка (поковки, гайки, болты).'],['обработка','Обработка резанием — срезание лишнего слоя материала с заготовки для получения нужной формы, размера, шероховатости (точение, фрезерование, сверление, шлифование, строгание, долбление, протяжка).'],['фрезерование','Фрезерование — обработка заготовки вращающимся многолезвийным инструментом (фрезой) при поступательном движении стола. Плоскости, пазы, уступы, шпоночные канавки, фасонные поверхности, зубья шестерён.'],['точение','Точение — обработка наружных и внутренних поверхностей на токарном станке. Заготовка вращается (главное движение), резец перемещается (продольная, поперечная подача). Точение, растачивание, подрезка торца, нарезание резьбы.'],['эйнштейн','Альберт Эйнштейн (1879-1955) — гениальный физик-теоретик, создатель специальной (1905) и общей (1915) теории относительности. Вывел формулу E=mc², объяснил фотоэффект (Нобелевская премия 1921). Его работы изменили представления о пространстве, времени и гравитации.'],['луна','Луна — единственный естественный спутник Земли, пятый по величине в Солнечной системе. Расстояние от Земли — около 384 400 км. Диаметр — 3474 км. Гравитация Луны вызывает приливы и отливы на Земле. Первая высадка человека — 20 июля 1969 года (миссия «Аполлон-11», Нил Армстронг и Базз Олдрин).'],['днк','ДНК (дезоксирибонуклеиновая кислота) — молекула, носитель генетической информации. Имеет структуру двойной спирали (открыта Уотсоном и Криком в 1953 году). Состоит из нуклеотидов: аденин (А), тимин (Т), гуанин (Г), цитозин (Ц). Комплементарность: А=Т, Г≡Ц.'],['python','Python — высокоуровневый язык программирования общего назначения (Гвидо ван Россум, 1991). Отличается простым и читаемым синтаксисом (отступы), динамической типизацией. Широко применяется в веб-разработке (Django, Flask), анализе данных (Pandas, NumPy), машинном обучении (TensorFlow, PyTorch), автоматизации, научных вычислениях.'],['rust','Rust — язык системного программирования (Mozilla, 2010). Гарантирует безопасность памяти без сборщика мусора через систему владения (ownership), заимствования (borrowing) и времена жизни (lifetimes). Компилируется в быстрый машинный код. Используется в операционных системах, браузерах (Servo, Firefox), блокчейне, игровых движках.'],['конный спорт','Конный спорт — собирательное название видов спорта с участием лошадей. Олимпийские дисциплины: выездка (высшая школа верховой езды), конкур (преодоление препятствий), троеборье (выездка, кросс, конкур). Неолимпийские: скачки (бега), драйвинг (спортивные экипажи), вольтижировка (гимнастика на лошади), конное поло, рейнинг, вестерн-спорт.'],['шлифование','Шлифование — абразивная обработка (шлифовальный круг) для получения высокой точности (квалитеты) и низкой шероховатости (Ra) после предварительной обработки. Плоское, круглое (наружное, внутреннее), бесцентровое.'],['шекспир','Уильям Шекспир (1564-1616) — английский драматург и поэт, величайший писатель в мировой литературе. Автор 38 пьес (Гамлет, Ромео и Джульетта, Макбет, Король Лир, Отелло, Сон в летнюю ночь), 154 сонетов, нескольких поэм. Его произведения переведены на все основные языки мира.'],['аромат','Аромат (запах) — ощущение, воспринимаемое обонянием (нос). Сложные химические соединения (эфирные масла, органические кислоты). Важная характеристика вина, кофе, сыра, специй, жареного мяса.'],['бодибилдинг','Бодибилдинг (культуризм) — наращивание мышечной массы и формирование рельефа через тренировки с отягощениями и диету. Соревнования: позирование в категориях (бодибилдинг, классический, Mens Physique).'],['кюри','Мария Склодовская-Кюри (1867-1934) — физик и химик польского происхождения, дважды лауреат Нобелевской премии (1903 по физике, 1911 по химии). Открыла полоний и радий, ввела термин «радиоактивность».'],['дарвин','Чарльз Дарвин (1809-1882) — английский натуралист, создатель эволюционной теории происхождения видов путём естественного отбора. Главный труд — «Происхождение видов» (1859). Кругосветное путешествие на корабле «Бигль».'],['информатика','Информатика — наука о методах сбора, хранения, обработки и передачи информации с помощью компьютеров. Включает алгоритмы, структуры данных, программирование, архитектуру ЭВМ, сети, искусственный интеллект.'],['русский язык','Русский язык — восточнославянский язык, государственный язык России. Письменность на основе кириллицы. Один из шести официальных языков ООН. Язык Пушкина, Толстого, Достоевского.'],['кириллица','Кириллица — алфавит, созданный в IX веке Кириллом и Мефодием на основе греческого письма. Используется в русском, болгарском, сербском, украинском и других славянских языках. В русском 33 буквы.'],['части речи','Части речи — классы слов, объединённые общим грамматическим значением. В русском языке: существительное, прилагательное, числительное, местоимение, глагол, наречие, предлог, союз, частица, междометие, причастие, деепричастие.'],['демократия','Демократия — политический режим, при котором единственным источником власти признаётся народ. Характеризуется выборами, разделением властей, гарантиями прав человека, политическим плюрализмом.'],['республика','Республика — форма правления, при которой высшие органы власти избираются населением или представительными учреждениями. Виды: президентская, парламентская, смешанная.'],['монархия','Монархия — форма правления, при которой верховная власть принадлежит одному лицу (монарху) и передаётся по наследству. Бывает абсолютной (Оман, Саудовская Аравия) и конституционной (Великобритания, Япония, Испания).'],['гёте','Иоганн Вольфганг Гёте (1749-1832) — немецкий поэт, мыслитель, естествоиспытатель. Главное произведение — трагедия «Фауст». Один из лидеров движения «Буря и натиск».'],['бах','Иоганн Себастьян Бах (1685-1750) — немецкий композитор, органист. Вершина эпохи барокко, мастер полифонии. Произведения: «Токката и фуга ре минор», «Бранденбургские концерты», «Страсти по Матфею», «Хорошо темперированный клавир».'],['чайковский','Пётр Ильич Чайковский (1840-1893) — русский композитор. Балеты: «Лебединое озеро», «Щелкунчик», «Спящая красавица». Оперы: «Евгений Онегин», «Пиковая дама». Симфонии (6-я — «Патетическая»), концерты.'],['армия','Армия — вооружённые силы государства, предназначенные для обороны и ведения боевых действий. Включает сухопутные войска, военно-морской флот, военно-воздушные силы.'],['валюта','Валюта — денежная единица государства (рубль, доллар, евро, иена, юань). Также — международные платёжные средства. Валютный курс — цена одной валюты, выраженная в другой.'],['доллар','Доллар США (USD) — основная резервная валюта мира. Эмитируется Федеральной резервной системой США. Используется в большинстве международных расчётов.'],['евро','Евро (EUR) — единая валюта Европейского союза. Введена в безналичное обращение в 1999 году, в наличное — в 2002. Вторая по значимости резервная валюта.'],['рубль','Рубль — национальная валюта Российской Федерации. Код — RUB. В обращении с XIII века. Банкноты: 50, 100, 200, 500, 1000, 2000, 5000 рублей. Монеты: 1, 5, 10, 50 копеек и 1, 2, 5, 10 рублей.'],['христианство','Христианство — мировая религия, основанная на жизни и учении Иисуса Христа (Библия). Около 2,4 млрд верующих. Основные направления: православие, католицизм, протестантизм.'],['ислам','Ислам (мусульманство) — мировая религия, основанная пророком Мухаммедом в VII веке. Священная книга — Коран. 1,8 млрд верующих. Основные течения: суннизм и шиизм.'],['москва','Москва — столица России (с 1918), город федерального значения. Население около 13 млн (агломерация — 18 млн). Кремль, Красная площадь, МГУ, Большой театр. Политический, экономический, культурный центр.'],['лондон','Лондон — столица Великобритании и Англии. Основан римлянами как Лондиниум. Население около 9 млн. Биг-Бен, Тауэрский мост, Букингемский дворец, Британский музей. Финансовый центр мира.'],['париж','Париж — столица Франции. Население около 2,1 млн (агломерация — 11 млн). Эйфелева башня, Лувр, Нотр-Дам-де-Пари, Триумфальная арка, Версаль. Город моды, искусства, кулинарии.'],['нью-йорк','Нью-Йорк — крупнейший город США по населению (около 8,5 млн, агломерация — 20 млн). Статуя Свободы, Таймс-сквер, Бродвей, Центральный парк, Уолл-стрит. Штаб-квартира ООН.'],['спрос','Спрос — количество товара, которое потребители готовы и могут купить по определённой цене. Закон спроса: с ростом цены величина спроса падает, с падением — растёт.'],['предложение','Предложение — количество товара, которое производители готовы продать по определённой цене. Закон предложения: с ростом цены величина предложения растёт, с падением — снижается.'],['сократ','Сократ (ок. 470-399 до н.э.) — древнегреческий философ, учитель Платона. Разработал метод майевтики (диалектические споры). «Я знаю, что ничего не знаю». Приговорён к смерти за «развращение молодёжи».'],['платон','Платон (428/427-348/347 до н.э.) — древнегреческий философ, ученик Сократа, учитель Аристотеля. Создал теорию идей (эйдосов). Основал Академию в Афинах. Труды: «Государство», «Пир», «Федон».'],['стоицизм','Стоицизм — философская школа, основанная Зеноном Китийским в III веке до н.э. Высшее благо — жизнь в согласии с природой и разумом, добродетель как единственное благо. Представители: Сенека, Эпиктет, Марк Аврелий.'],['тесла','Никола Тесла (1856-1943) — изобретатель в области электротехники и радиотехники сербского происхождения (работал в США). Создал систему переменного тока, асинхронный двигатель, катушку Теслы. Его имя носит единица магнитной индукции (Тл).'],['плавание','Плавание — спортивная дисциплина в бассейне (50 м, 25 м). Стили: вольный (кроль), брасс, баттерфляй (дельфин), на спине. Дистанции от 50 до 1500 м. Олимпийский вид.'],['0000','Всегда рад отзывам и предложениям по почте gromhorse90022110@gmail.com'],['синхронное плавание','Синхронное плавание (артистическое плавание) — выполнение фигур и элементов в воде под музыку (соло, дуэт, группа). Судьи оценивают синхронность, сложность, артистизм. Олимпийский вид.'],['прыжки в воду','Прыжки в воду — прыжки с трамплина (1 м, 3 м) или вышки (5 м, 7,5 м, 10 м) в воду. Оцениваются сложность прыжка, чистота входа в воду и техника. Олимпийский вид.'],['академическая гребля','Академическая гребля — гребля на специальных лодках (одиночки, двойки, четвёрки, восьмёрки) с распашными вёслами (по одному на гребца) или парными (два весла). Заезд на 2000 м.'],['байдарка','Байдарка — гребля на байдарке (лодке с закрытой каютой) двухлопастным веслом. Гребцы сидят лицом вперёд. Дистанции: 200, 500, 1000 м. Олимпийский вид.'],['каноэ','Каноэ — гребля на каноэ (лодке с открытой кабиной) однолопастным веслом. Гребец стоит на одном колене. Дистанции: 200, 500, 1000 м. Олимпийский вид.'],['парусный спорт','Парусный спорт — гонки на яхтах. Классы: олимпийские (Finn, Laser, 470, 49er, Nacra 17). Управление ветром, тактика, стратегия. Олимпийский вид.'],['сёрфинг','Сёрфинг — катание на волнах на доске (лонгборд, шортборд). Оцениваются длина проезда, маневры, сложность волн. Олимпийский вид (с 2020). Родина — Гавайи.'],['виндсёрфинг','Виндсёрфинг — катание на доске с парусом (мачта универсальная). Виды: олимпийский класс (iQFOiL, ранее RS:X), фристайл, слалом, гонки с фойлом. Олимпийский вид.'],['дайвинг','Дайвинг — подводное плавание с аквалангом (SCUBA) для исследования морских глубин, пещер. Снаряжение: баллоны с сжатым воздухом, регулятор, BCD, гидрокостюм. Фридайвинг — без акваланга на задержке дыхания.'],['горные лыжи','Горные лыжи — спуск с гор на лыжах (жесткая фиксация пятки). Дисциплины: слалом (короткие ворота), гигантский слалом, супер-гигант, скоростной спуск (до 150 км/ч). Олимпийский вид.'],['беговые лыжи','Беговые лыжи — гонки на лыжах по пересечённой местности. Стили: классический (лыжня) и коньковый (отталкивание). Дистанции: 1,5-50 км. Олимпийский вид. Кубок мира (биатлон и лыжные гонки).'],['сноуборд','Сноуборд — спуск на одной широкой доске (горный сноуборд, фристайл, фрирайд). Дисциплины: слалом, гигантский слалом, параллельный слалом, хафпайп (полутруба), биг-эйр (трамплин). Олимпийский вид (с 1998).'],['фигурное катание','Фигурное катание — олимпийский вид спорта на льду. Дисциплины: мужское и женское одиночное, парное, танцы на льду. Короткая и произвольная программа. Оцениваются техника прыжков, вращений, дорожек и артистизм.'],['конькобежный спорт','Конькобежный спорт (скоростной бег на коньках) — забеги по ледовому овалу (400 м). Дистанции 500 м, 1000 м, 1500 м, 5000 м (женщины), 10000 м (мужчины). Коньки: с отрывом пятки (клап-скейт).'],['шорт-трек','Шорт-трек — бег на коньках на короткой дорожке (111,12 м — хоккейная площадка). Дистанции 500 м, 1000 м, 1500 м, эстафета. Отличается контактной борьбой и тактикой. Олимпийский вид (с 1992).'],['кёрлинг','Кёрлинг — командная игра (4×4) на льду с гранитными камнями (около 20 кг). Цель — попасть в «дом» (мишень) ближе к центру, чем соперник. «Щётки» для изменения скольжения камня. Зимний олимпийский вид.'],['бобслей','Бобслей — спуск по ледяному желобу на управляемых санях-бобах (2 или 4 человека). Скорость до 150 км/ч. Олимпийский вид. Самые известные трассы: Ванкувер, Пхёнчхан, Сочи.'],['санный спорт','Санный спорт — спуск по ледяному желобу на санях (одиночные, двойки). Лёжа на спине (ноги вперёд). Старт рывком рук. Олимпийский вид. Немцы доминируют.'],['скелетон','Скелетон — спуск по ледяному желобу на санях (лёжа на животе, головой вперёд). Скорость до 130 км/ч. Отличается от санного спорта положением тела. Олимпийский вид.'],['алгоритм','Алгоритм — конечная последовательность строго определённых инструкций для решения задачи (программирование, математика). Свойства: дискретность, детерминированность, конечность, результативность, массовость.'],['переменная','Переменная в программировании — именованная область памяти для хранения данных, значение которой может меняться в ходе программы. Имеет имя, тип (число, строка, bool), значение.'],['функция','Функция в программировании — именованный блок кода, выполняющий определённую задачу. Может принимать параметры (аргументы) и возвращать результат. Повторное использование, модульность.'],['цикл','Цикл — конструкция для многократного повторения блока кода. Виды: for (счётный, с известным числом повторений), while (с предусловием), do-while (с постусловием), foreach (для перебора коллекций).'],['массив','Массив — структура данных (индексированная коллекция) элементов одного типа. Индексы обычно начинаются с 0. Может быть одномерным (вектор) и многомерным (матрица).'],['строка','Строка (string) — тип данных, представляющий последовательность символов (букв, цифр, знаков). В разных языках: можно в двойных или одинарных кавычках. Операции: конкатенация, поиск подстроки, замена, сплит.'],['объект','Объект в ООП — экземпляр класса, сущность, обладающая состоянием (свойства, поля) и поведением (методы). Создаётся с помощью конструктора. Взаимодействуют через вызов методов.'],['класс','Класс — шаблон (чертёж) для создания объектов в ООП. Описывает свойства (поля) и методы (функции) будущих объектов. Класс — тип, объект — экземпляр этого типа.'],['наследование','Наследование — принцип ООП, при котором класс-потомок (подкласс) получает свойства и методы класса-родителя (суперкласса). Позволяет переопределять методы. Пример: класс «Собака» наследует от класса «Животное».'],['инкапсуляция','Инкапсуляция — принцип ООП, скрывающий внутреннюю реализацию объекта и обеспечивающий доступ к ней только через открытые методы (интерфейс). Модификаторы доступа: private, protected, public.'],['полиморфизм','Полиморфизм — принцип ООП, позволяющий использовать объекты разных классов через единый интерфейс. Один и тот же метод может вести себя по-разному в разных классах (переопределение).'],['абстракция','Абстракция — принцип ООП, выделение существенных характеристик объекта и игнорирование несущественных. Абстрактные классы и интерфейсы задают поведение, не реализуя его полностью.'],['интерфейс','Интерфейс — контракт (набор методов без реализации), который должен реализовать класс. Позволяет обеспечить полиморфизм без наследования (множественная реализация). В языках (Java, C#) — ключевое слово interface.'],['метафизика','Метафизика — раздел философии, изучающий сверхчувственные принципы бытия (душа, Бог, свобода воли, бессмертие). В марксизме — антипод диалектики («метафизический метод» — статика, отрицание развития).'],['диалектика','Диалектика — философский метод познания, рассматривающий явления в их развитии, взаимосвязи и противоречии. Гегелевская триада: тезис → антитезис → синтез. Материалистическая диалектика (Маркс, Энгельс) — законы развития природы и общества.'],['феноменология','Феноменология — философское направление (Эдмунд Гуссерль), изучающее феномены (явления сознания) «как они даны» субъекту, без предпосылок и теорий. Девиз: «Назад к самим вещам!».'],['экзистенциализм','Экзистенциализм (философия существования) — направление XX века (Хайдеггер, Ясперс, Сартр, Камю), ставящее во главу угла уникальность человеческого бытия (экзистенцию), свободу, выбор, ответственность перед лицом абсурда и смерти.'],['нигилизм','Нигилизм — мировоззрение, отрицающее общепринятые ценности, идеалы, нормы морали, культуры, религию. Роман Тургенева «Отцы и дети»: Базаров — нигилист. Философский нигилизм (Ницше) — «Бог умер».'],['позитивизм','Позитивизм — философское направление (Огюст Конт), признающее единственным источником истинного знания конкретные (позитивные) науки и отрицающее метафизику (спекулятивную философию). Неопозитивизм, логический позитивизм (Венский кружок).'],['постмодернизм','Постмодернизм — философское и культурное течение второй половины XX века, характеризующееся скептицизмом, иронией, отрицанием «великих нарративов» (идеологий, теорий прогресса), деконструкцией (Деррида), симулякрами (Бодрийяр).'],['скептицизм','Скептицизм — философская позиция, сомневающаяся в возможности достижения истинного знания. Скептики (Пиррон, Секст Эмпирик) рекомендовали «эпохе» (воздержание от суждений) для достижения атараксии (невозмутимости).'],['догматизм','Догматизм — способ мышления, оперирующий недоказуемыми положениями (догмами), принимаемыми на веру без критики. Характерен для религиозной схоластики и некоторых философских систем (марксизм-ленинизм, гегельянство).'],['дуализм','Дуализм — философское учение, утверждающее равноправие двух первоначал: материи и духа, тела и души, добра и зла (манихейство). Декарт — дуализм мыслящей (душа) и протяжённой (тело) субстанций.'],['монизм','Монизм — философское учение, признающее единую основу (субстанцию) всего существующего. Материалистический монизм (Маркс) — материя. Идеалистический монизм (Гегель) — абсолютная идея. Нейтральный монизм — ни материя, ни дух.'],['детерминизм','Детерминизм — учение о всеобщей взаимосвязи и причинной обусловленности явлений. Лапласовский детерминизм («Вселенная как часы») — знание всех начальных условий позволяет предсказать будущее (опровергнуто квантовой механикой).'],['индетерминизм','Индетерминизм — отрицание причинной обусловленности (объективной закономерности). Признаёт свободу воли, случайность, спонтанность. В квантовой механике — вероятностный характер явлений.'],['фатализм','Фатализм — вера в неотвратимую предопределённость судьбы (рок, судьба, карма), не зависящую от воли человека. Человек бессилен изменить предначертанное. Отличается от детерминизма (наличие выбора, но подчинение законам).'],['утилитаризм','Утилитаризм — этическое учение (Бентам, Милль), считающее критерием нравственности полезность (приношение наибольшего счастья наибольшему числу людей). Принцип «наибольшего счастья» — основа для оценки поступков.'],['категорический императив','Категорический императив Канта — основополагающий принцип морали: поступай так, чтобы максима твоего поведения могла стать всеобщим законом. Относись к человечеству (в себе и в других) всегда как к цели, и никогда — только как к средству.'],['архетип','Архетип (Юнг) — универсальные, врождённые психические структуры (образы, мотивы), составляющие коллективное бессознательное. Примеры архетипов: Мать, Отец, Ребёнок, Мудрец, Герой, Тень, Анима/Анимус, Самость.'],['сознание','Сознание — высшая форма психического отражения, свойственная человеку, включающая самосознание, целенаправленную деятельность, способность к абстрактному мышлению, речи, рефлексии. Соотносится с мозгом как субъективное с объективным.'],['бессознательное','Бессознательное — совокупность психических процессов, не осознаваемых субъектом. Фрейд: вытесненные желания и травмы (Оно). Юнг: коллективное бессознательное (архетипы). Участвует в сновидениях, оговорках, неврозах.'],['эго','Эго (Я) — структура психики по Фрейду, посредник между Оно (инстинкты) и Сверх-Я (мораль, запреты). Функции: восприятие реальности, планирование, защитные механизмы. Принцип реальности.'],['суперэго','Суперэго (Сверх-Я) — структура психики по Фрейду, интериоризованные моральные нормы, запреты, идеалы (совесть). Формируется в детстве через идентификацию с родителями и их требованиями.'],['либидо','Либидо — по Фрейду, психическая энергия полового влечения (инстинкта жизни, Эроса). В более широком смысле — энергия всех влечений. Юнг понимал либидо как общую жизненную энергию (не только сексуальную).'],['интроверсия','Интроверсия — направленность психической активности на внутренний мир (свои мысли, чувства, фантазии). Интроверты предпочитают одиночество или узкий круг общения, склонны к рефлексии. Термин Юнга.'],['экстраверсия','Экстраверсия — направленность психической активности на внешний мир (объекты, люди, деятельность). Экстраверты общительны, энергичны, ищут стимуляцию извне, легко заводят знакомства. Термин Юнга.'],['самоактуализация','Самоактуализация — стремление человека к максимально полному раскрытию своего потенциала, реализации своих способностей и талантов. Вершина пирамиды потребностей по Маслоу. Термин также у Гольдштейна, Роджерса.'],['аффилиация','Аффилиация — потребность человека в установлении, поддержании и укреплении эмоционально положительных (дружеских, любовных) отношений с другими людьми. Высокая аффилиация — стремление к общению, боязнь отвергания.'],['фрустрация','Фрустрация — психическое состояние, вызванное невозможностью удовлетворить актуальную потребность при наличии препятствий (внешних или внутренних). Сопровождается разочарованием, тревогой, агрессией (реакция фрустрации).'],['сублимация','Сублимация — защитный механизм психики (по Фрейду), преобразование энергии неудовлетворённых (часто сексуальных) влечений в социально приемлемые формы деятельности (творчество, наука, спорт, карьера).'],['вытеснение','Вытеснение — защитный механизм, при котором неприемлемые для сознания мысли, желания, воспоминания, травмы вытесняются в бессознательное. Является основой для других защит (по Фрейду). Неосознаваемо.'],['проекция','Проекция — защитный механизм, при котором собственные неприемлемые качества, чувства или мысли приписываются другому человеку («Не я злюсь, это он агрессивен»). Основа для паранойи.'],['рационализация','Рационализация — защитный механизм, при котором человек даёт логичное (но ложное) объяснение своим иррациональным поступкам, чтобы сохранить самооценку. «Зелёный виноград» (лиса не могла достать и сказала, что кислый).'],['копинг','Копинг-стратегии (coping, совладание) — способы преодоления стрессовых ситуаций и психологических трудностей. Продуктивные копинги: поиск поддержки, активное решение проблемы. Непродуктивные: избегание, самобичевание, алкоголь.'],['акцентуация','Акцентуация характера — чрезмерная выраженность отдельных черт характера (педантичность, замкнутость, демонстративность), находящаяся на грани нормы и патологии (психопатии). Типы по Личко: гипертимный, циклоидный, шизоидный, истероидный и др.'],['темперамент','Темперамент — врождённые свойства нервной системы, определяющие динамику психических процессов (скорость, интенсивность, ритм). Типы по Гиппократу-Галену: холерик (вспыльчивый), сангвиник (жизнерадостный), флегматик (спокойный), меланхолик (печальный).'],['невроз','Невроз — группа обратимых (функциональных) нервно-психических расстройств, вызванных внутриличностным конфликтом или психотравмой. Формы: неврастения (истощение), истерия, невроз навязчивых состояний. Критика личности сохранена.'],['психоз','Психоз — тяжёлое психическое расстройство с грубым нарушением отражения реальности (бред, галлюцинации, дезорганизация поведения), отсутствием критики к своему состоянию (анозогнозия). Примеры: шизофрения, маниакально-депрессивный психоз (биполярное расстройство).'],['бриз','Бриз — местный ветер на побережье морей и крупных озёр, меняющий направление дважды в сутки. Дневной бриз — с воды на сушу, ночной — с суши на воду.'],['циклон','Циклон — область пониженного атмосферного давления с вращением воздуха против часовой стрелки в Северном полушарии (по часовой — в Южном). Связан с облачностью, осадками, ветром. Тропические циклоны (ураганы, тайфуны) — разрушительны.'],['энергия связи','Энергия связи — энергия, необходимая для разрыва химической связи между атомами. Чем выше энергия, тем связь прочнее. Измеряется в кДж/моль.'],['угол связи','Угол связи — угол между линиями, соединяющими ядра атомов в молекуле. Определяется типом гибридизации (109,5° для sp³, 120° для sp², 180° для sp) и влиянием неподелённых пар.'],['колебания','Колебания — повторяющиеся движения вокруг положения равновесия. Пример: маятник, струна.'],['частота','Частота — число полных колебаний за секунду. Единица — герц (Гц). Связана с периодом: ν=1/T.'],['период','Период — время одного полного колебания. Единица — секунда (с). T=1/ν.'],['амплитуда','Амплитуда — максимальное отклонение от положения равновесия при колебаниях.'],['маятник','Маятник — система, совершающая колебания под действием силы тяжести. Пример: груз на нити.'],['траектория','Траектория — линия, по которой движется тело. Бывает прямолинейной и криволинейной.'],['перемещение','Перемещение — вектор, соединяющий начальную и конечную точки пути. Отличается от пройденного пути.'],['равновесие','Равновесие — состояние, когда сумма сил и сумма моментов сил равны нулю.'],['момент силы','Момент силы — произведение силы на плечо: M=F·l. Единица — ньютон-метр (Н·м). Характеризует вращательное действие.'],['кинетическая энергия','Кинетическая энергия — энергия движения тела: Eк=mv²/2. Зависит от массы и квадрата скорости.'],['потенциальная энергия','Потенциальная энергия — энергия взаимодействия тел. Для тела над Землёй: Eп=mgh.'],['закон сохранения энергии','Закон сохранения энергии — энергия не исчезает и не создаётся, только переходит из одной формы в другую.'],['закон сохранения импульса','Закон сохранения импульса — в замкнутой системе векторная сумма импульсов тел остаётся постоянной.'],['центр масс','Центр масс — точка, в которой сосредоточена вся масса системы. Движется как материальная точка под действием внешних сил.'],['плотность','Плотность — масса единицы объёма вещества: ρ=m/V. Единица — килограмм на кубометр (кг/м³).'],['деформация','Деформация — изменение формы или размера тела под действием нагрузки. Бывает упругой и пластической.'],['жёсткость','Жёсткость — способность тела сопротивляться деформации. В законе Гука: F=kx, где k — жёсткость.'],['сила тяжести','Сила тяжести — сила, с которой Земля (или другое небесное тело) притягивает тело: Fт=mg.'],['свободное падение','Свободное падение — движение тела только под действием силы тяжести. Ускорение равно g.'],['невесомость','Невесомость — состояние, когда вес тела равен нулю. Наступает при свободном падении или на орбите.'],['перегрузка','Перегрузка — превышение веса тела над силой тяжести. Возникает при ускоренном движении вверх или при поворотах.'],['реактивное движение','Реактивное движение — движение, возникающее при отделении от тела части его массы. Пример: ракета, кальмар.'],['абсолютно упругое тело','Абсолютно упругое тело — тело, полностью восстанавливающее форму и объём после снятия нагрузки.'],['абсолютно неупругое тело','Абсолютно неупругое тело — тело, не восстанавливающее форму после деформации. Пример: пластилин, глина.'],['механическая волна','Механическая волна — распространение колебаний в упругой среде. Переносит энергию, но не вещество.'],['длина волны','Длина волны — расстояние между двумя ближайшими точками, колеблющимися в одинаковой фазе. Обозначается λ.'],['звук','Звук — механические упругие волны, воспринимаемые ухом человека. Частота от 20 Гц до 20 кГц.'],['резонанс','Резонанс — резкое возрастание амплитуды колебаний при совпадении частоты вынуждающей силы с собственной частотой системы.'],['закон Гука','Закон Гука — сила упругости пропорциональна деформации: F=-kx, где k — жёсткость, x — удлинение.'],['законы ньютона','Законы Ньютона — три закона, основа классической механики: инерция, F=ma, действие равно противодействию.'],['кинематика','Кинематика — раздел механики, изучающий движение тел без учёта причин (сил).'],['динамика','Динамика — раздел механики, изучающий движение тел под действием приложенных сил.'],['статика','Статика — раздел механики, изучающий условия равновесия тел под действием сил.'],['гидростатика','Гидростатика — раздел физики, изучающий равновесие жидкостей и давление внутри них.'],['закон архимеда','Закон Архимеда — на тело, погружённое в жидкость или газ, действует выталкивающая сила, равная весу вытесненной жидкости.'],['закон Паскаля','Закон Паскаля — давление, производимое на жидкость или газ, передаётся одинаково во все стороны.'],['гироскоп','Гироскоп — устройство, сохраняющее ориентацию в пространстве благодаря моменту импульса. Используется в навигации.'],['линза','Линза — прозрачное тело из стекла или пластика, ограниченное двумя сферическими поверхностями. Бывает собирающей (выпуклой) и рассеивающей (вогнутой).'],['зеркало','Зеркало — гладкая поверхность, зеркально отражающая свет. Угол падения луча всегда равен углу отражения.'],['призма','Призма — оптическое тело из прозрачного материала, преломляющее свет. Разлагает белый свет в цветной спектр.'],['фазовая скорость','Фазовая скорость — скорость перемещения фазы волны (гребня или впадины). В вакууме для света равна с.'],['групповая скорость','Групповая скорость — скорость переноса энергии волной, скорость движения группы волн (пакета). Всегда меньше или равна фазовой скорости.'],['затухание','Затухание — постепенное уменьшение амплитуды колебаний или интенсивности волны из-за потери энергии (трение, поглощение).'],['рассеяние','Рассеяние — отклонение волн (света, звука) от первоначального направления при взаимодействии с частицами или неоднородностями среды.'],['отражательная способность','Отражательная способность (альбедо) — доля падающей энергии, отражённой поверхностью. У снега высокое альбедо, у асфальта низкое.'],['коэффициент преломления','Коэффициент преломления (показатель преломления) — отношение скорости света в вакууме к скорости света в среде. n=c/v.'],['угол Брюстера','Угол Брюстера — угол падения света, при котором отражённый луч полностью поляризован. tgθ = n₂/n₁.'],['энтропия','Энтропия — мера беспорядка или хаоса в системе. Во всех реальных процессах энтропия изолированной системы возрастает.'],['температура','Температура — физическая величина, характеризующая степень нагретости тела. Мера средней кинетической энергии частиц. Шкалы: Цельсия, Кельвина, Фаренгейта.'],['теплота','Теплота — форма передачи энергии от более нагретого тела к менее нагретому без совершения работы. Измеряется в джоулях или калориях.'],['конвекция','Конвекция — перенос теплоты потоками жидкости или газа. Тёплый воздух поднимается вверх, холодный опускается вниз.'],['теплопроводность','Теплопроводность — перенос теплоты через вещество при непосредственном контакте частиц. Металлы — хорошие проводники тепла, дерево и воздух — плохие.'],['излучение','Тепловое излучение — перенос теплоты электромагнитными волнами (инфракрасным излучением). Не требует среды, возможно в вакууме.'],['адиабата','Адиабатический процесс — процесс без теплообмена с окружающей средой (Q=0). При расширении газ охлаждается, при сжатии нагревается.'],['изотерма','Изотермический процесс — процесс при постоянной температуре (T=const). Для идеального газа pV = const.'],['изобара','Изобарный процесс — процесс при постоянном давлении (p=const). Для идеального газа V/T = const.'],['изохора','Изохорный процесс — процесс при постоянном объёме (V=const). Для идеального газа p/T = const.'],['цикл','Термодинамический цикл — последовательность процессов, в результате которых система возвращается в исходное состояние.'],['давление','Давление — сила, действующая на единицу площади поверхности. Измеряется в паскалях (Па). 1 Па = 1 Н/м².'],['объём','Объём — величина, характеризующая размер занимаемого телом пространства. Измеряется в м³, литрах.'],['энтальпия','Энтальпия — теплосодержание системы, сумма внутренней энергии и работы расширения (H=U+pV).'],['термодинамическое равновесие','Термодинамическое равновесие — состояние, при котором все параметры системы (температура, давление, концентрация) не меняются со временем.'],['точка росы','Точка росы — температура, при которой водяной пар в воздухе становится насыщенным и начинает конденсироваться в росу.'],['фазовый переход','Фазовый переход — переход вещества из одной фазы в другую (твёрдое-жидкое-газообразное). Сопровождается поглощением или выделением теплоты.'],['плавление','Плавление — фазовый переход из твёрдого состояния в жидкое. Происходит при температуре плавления с поглощением теплоты.'],['кристаллизация','Кристаллизация (отвердевание) — фазовый переход из жидкого состояния в твёрдое. Сопровождается выделением теплоты.'],['парообразование','Парообразование — переход из жидкого состояния в газообразное (пар). Бывает в виде испарения и кипения.'],['конденсация','Конденсация — фазовый переход из газообразного состояния в жидкое. Сопровождается выделением теплоты.'],['сублимация','Сублимация (возгонка) — фазовый переход из твёрдого состояния сразу в газообразное, минуя жидкое. Пример: сухой лёд.'],['десублимация','Десублимация — фазовый переход из газообразного состояния сразу в твёрдое, минуя жидкое. Пример: иней на ветках.'],['кипение','Кипение — интенсивное парообразование по всему объёму жидкости при достижении температуры кипения.'],['испарение','Испарение — парообразование только с поверхности жидкости. Происходит при любой температуре, усиливается с её повышением.'],['насыщенный пар','Насыщенный пар — пар, находящийся в динамическом равновесии со своей жидкостью. Давление зависит только от температуры.'],['перегретый пар','Перегретый пар — пар, нагретый выше температуры кипения при данном давлении. Используется в теплоэнергетике для повышения КПД.'],['влажность','Влажность воздуха — содержание водяного пара в воздухе. Абсолютная (г/м³) и относительная (в процентах от максимально возможного).'],['точка кипения','Точка кипения — температура, при которой давление насыщенного пара жидкости равно внешнему давлению. При нормальном давлении у воды 100°C.'],['тройная точка','Тройная точка — температура и давление, при которых вещество может существовать одновременно в трёх фазах: твёрдой, жидкой и газообразной.'],['критическая точка','Критическая точка — температура и давление, выше которых разница между жидкостью и газом исчезает (вещество становится сверхкритическим флюидом).'],['теплоёмкость','Теплоёмкость — количество теплоты, необходимое для нагревания тела на 1°C (или 1 К). Для воды она очень высокая.'],['теплопередача','Теплопередача — самопроизвольный процесс переноса теплоты от более нагретых тел к менее нагретым. Три способа: теплопроводность, конвекция, излучение.'],['тепловой двигатель','Тепловой двигатель — устройство, преобразующее теплоту в механическую работу. Состоит из нагревателя, рабочего тела и холодильника. КПД всегда меньше 100%.'],['цикл карно','Цикл Карно — идеальный термодинамический цикл, состоящий из двух изотерм и двух адиабат. Имеет максимально возможный КПД для теплового двигателя.'],['холодильник','Холодильник — устройство, отбирающее теплоту от более холодного тела и передающее её более нагретому за счёт совершения работы (обратный цикл Карно).'],['нагреватель','Нагреватель — источник теплоты в тепловом двигателе. Отдаёт теплоту рабочему телу, часть которой превращается в работу.'],['адиабатический процесс','Адиабатический процесс — термодинамический процесс без теплообмена с окружающей средой (Q=0). При расширении газ охлаждается, при сжатии нагревается.'],['политропный процесс','Политропный процесс — термодинамический процесс с постоянной теплоёмкостью. Описывается уравнением pVⁿ = const, где n — показатель политропы.'],['дросселирование','Дросселирование — расширение газа или жидкости без совершения внешней работы и без теплообмена, например при протекании через сужение трубы.'],['эффект джоуля-томсона','Эффект Джоуля-Томсона — изменение температуры реального газа при адиабатическом дросселировании. Используется для сжижения газов.'],['тепловое расширение','Тепловое расширение — увеличение объёма тела при нагревании. Для твёрдых тел описывается коэффициентом линейного расширения.'],['температурный коэффициент','Температурный коэффициент — величина, показывающая, на сколько изменяется свойство вещества (объём, сопротивление) при нагревании на 1°C.'],['абсолютный ноль','Абсолютный ноль — минимально возможная температура, при которой прекращается тепловое движение частиц. 0 К = -273,15°C. Достичь невозможно.'],['шкала Кельвина','Шкала Кельвина — абсолютная термодинамическая шкала, где 0 К = абсолютный ноль, а 1 К равен 1°C по величине.'],['шкала Цельсия','Шкала Цельсия — шкала, где 0°C — точка таяния льда, а 100°C — точка кипения воды при нормальном давлении.'],['шкала фаренгейта','Шкала Фаренгейта — шкала, где 32°F — точка таяния льда, а 212°F — точка кипения воды. Используется в США.'],['число авогадро','Число Авогадро — количество частиц (атомов, молекул) в одном моле вещества: NA = 6,022×10²³ моль⁻¹.'],['уравнение состояния','Уравнение состояния — уравнение, связывающее давление, объём и температуру. Для идеального газа: pV = νRT (уравнение Клапейрона-Менделеева).'],['идеальный газ','Идеальный газ — модель газа, где молекулы не взаимодействуют на расстоянии и имеют ничтожно малый собственный объём. Подчиняется уравнению pV = νRT.'],['заряд','Электрический заряд — свойство частиц, создающее электромагнитное поле. Бывает положительным и отрицательным. Единица — кулон (Кл).'],['электростатика','Электростатика — раздел физики, изучающий неподвижные электрические заряды и создаваемые ими электростатические
